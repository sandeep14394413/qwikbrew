server:
  port: 8081

spring:
  application:
    name: user-service
  datasource:
    url:      ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/userdb}
    username: ${SPRING_DATASOURCE_USERNAME:qwikbrew}
    password: ${SPRING_DATASOURCE_PASSWORD:qwikbrew}
    hikari:
      initialization-fail-timeout: -1  # never fail on pool init — retry in background
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
  jpa:
    defer-datasource-initialization: true  # defer until after context is ready
    hibernate:
      ddl-auto: none    # changed from validate — no DB contact at startup
    show-sql: false
    properties:
      hibernate:
        temp:
          use_jdbc_metadata_defaults: false  # prevents DB query for dialect detection
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: false   # disabled until real Aiven DB creds arrive via ESO
    locations: classpath:db/migration


jwt:
  secret:               ${JWT_SECRET:local-dev-secret-key-must-be-at-least-64-chars-long-for-hs512}
  access-expiry-minutes: ${JWT_ACCESS_EXPIRY_MINUTES:60}
  refresh-expiry-days:   ${JWT_REFRESH_EXPIRY_DAYS:30}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  health:
    readinessstate:
      enabled: true
    livenessstate:
      enabled: true
    db:
      enabled: false      # DB health DOWN won't affect liveness probe
    kafka:
      enabled: false      # Kafka health DOWN won't affect liveness probe
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true

---
spring:
  config:
    activate:
      on-profile: test
  datasource:
    url:      jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    defer-datasource-initialization: true  # defer until after context is ready
    hibernate:
      ddl-auto: create-drop
  flyway:
    enabled: false
