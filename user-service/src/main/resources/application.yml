server:
  port: 8081

spring:
  application:
    name: user-service
  datasource:
    url:      ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/userdb}
    username: ${SPRING_DATASOURCE_USERNAME:qwikbrew}
    password: ${SPRING_DATASOURCE_PASSWORD:qwikbrew}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: false   # disabled until real Aiven DB creds arrive via ESO
    locations: classpath:db/migration

eureka:
  client:
    enabled: false                  # disabled — no Eureka server in K8s; gateway routes directly
    register-with-eureka: false
    fetch-registry: false
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://service-discovery:8761/eureka/}

jwt:
  secret:               ${JWT_SECRET:local-dev-secret-key-must-be-at-least-64-chars-long-for-hs512}
  access-expiry-minutes: ${JWT_ACCESS_EXPIRY_MINUTES:60}
  refresh-expiry-days:   ${JWT_REFRESH_EXPIRY_DAYS:30}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

---
spring:
  config:
    activate:
      on-profile: test
  datasource:
    url:      jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
  flyway:
    enabled: false
