server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        # Auth routes — no JWT required
        - id: user-service-public
          uri: http://user-service:8081
          predicates:
            - Path=/api/v1/users/login,/api/v1/users/register,/api/v1/users/refresh-token

        # User service — JWT required
        - id: user-service
          uri: http://user-service:8081
          predicates:
            - Path=/api/v1/users/**
          filters:
            - JwtAuth

        # Menu — GET is public, write needs JWT
        - id: menu-service-read
          uri: http://menu-service:8082
          predicates:
            - Path=/api/v1/menu/**
            - Method=GET

        - id: menu-service-write
          uri: http://menu-service:8082
          predicates:
            - Path=/api/v1/menu/**
          filters:
            - JwtAuth

        # Order service
        - id: order-service
          uri: http://order-service:8083
          predicates:
            - Path=/api/v1/orders/**
          filters:
            - JwtAuth
            - name: CircuitBreaker
              args:
                name: orderCircuitBreaker
                fallbackUri: forward:/fallback/orders

        # Payment service
        - id: payment-service
          uri: http://payment-service:8084
          predicates:
            - Path=/api/v1/payments/**
          filters:
            - JwtAuth

        # Notification service
        - id: notification-service
          uri: http://notification-service:8085
          predicates:
            - Path=/api/v1/notifications/**
          filters:
            - JwtAuth

      globalcors:
        cors-configurations:
          "[/**]":
            allowedOriginPatterns: "*"
            allowedMethods: [GET, POST, PUT, PATCH, DELETE, OPTIONS]
            allowedHeaders: "*"
            allowCredentials: true

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://service-discovery:8761/eureka/}
    enabled: ${EUREKA_CLIENT_ENABLED:false}       # disabled until service-discovery is deployed
    register-with-eureka: false
    fetch-registry: false
  instance:
    prefer-ip-address: true

jwt:
  secret: ${JWT_SECRET:local-dev-secret-key-must-be-at-least-64-chars-long-for-hs512-algorithm}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

resilience4j:
  circuitbreaker:
    instances:
      orderCircuitBreaker:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s

---
spring:
  config:
    activate:
      on-profile: test
  cloud:
    gateway:
      routes: []   # no routes needed for context load test
    discovery:
      enabled: false

eureka:
  client:
    enabled: false

jwt:
  secret: test-secret-key-at-least-64-characters-long-for-hs512-algorithm-ok
