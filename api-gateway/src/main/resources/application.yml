server:
  port: 8080

spring:
  application:
    name: api-gateway
  autoconfigure:
    exclude:
      # Exclude ALL discovery-related autoconfiguration.
      # WeightCalculatorWebFilter crashes if any discovery client is partially initialized.
      - org.springframework.cloud.netflix.eureka.EurekaClientAutoConfiguration
      - org.springframework.cloud.netflix.eureka.EurekaDiscoveryClientAutoConfiguration
      - org.springframework.cloud.netflix.eureka.reactive.EurekaReactiveDiscoveryClientAutoConfiguration
      - org.springframework.cloud.client.discovery.simple.SimpleDiscoveryClientAutoConfiguration
      - org.springframework.cloud.gateway.discovery.GatewayDiscoveryClientAutoConfiguration
  cloud:
    discovery:
      enabled: false      # no service registry — routes use direct http://service-name:port
    gateway:
      discovery:
        locator:
          enabled: false  # do not auto-create routes from discovery
      routes:
        # Auth routes — no JWT required
        - id: user-service-public
          uri: http://user-service:8081
          predicates:
            - Path=/api/v1/users/login,/api/v1/users/register,/api/v1/users/refresh-token

        # User service — JWT required
        - id: user-service
          uri: http://user-service:8081
          predicates:
            - Path=/api/v1/users/**
          filters:
            - JwtAuth

        # Menu — GET is public, write needs JWT
        - id: menu-service-read
          uri: http://menu-service:8082
          predicates:
            - Path=/api/v1/menu/**
            - Method=GET

        - id: menu-service-write
          uri: http://menu-service:8082
          predicates:
            - Path=/api/v1/menu/**
          filters:
            - JwtAuth

        # Order service
        - id: order-service
          uri: http://order-service:8083
          predicates:
            - Path=/api/v1/orders/**
          filters:
            - JwtAuth
            - name: CircuitBreaker
              args:
                name: orderCircuitBreaker
                fallbackUri: forward:/fallback/orders

        # Payment service
        - id: payment-service
          uri: http://payment-service:8084
          predicates:
            - Path=/api/v1/payments/**
          filters:
            - JwtAuth

        # Notification service
        - id: notification-service
          uri: http://notification-service:8085
          predicates:
            - Path=/api/v1/notifications/**
          filters:
            - JwtAuth

      globalcors:
        cors-configurations:
          "[/**]":
            allowedOriginPatterns: "*"
            allowedMethods: [GET, POST, PUT, PATCH, DELETE, OPTIONS]
            allowedHeaders: "*"
            allowCredentials: true

# Eureka is excluded via spring.autoconfigure.exclude above.
# Config kept here as reference for when service-discovery is deployed.
# eureka:
#   client:
#     enabled: true
#     service-url:
#       defaultZone: http://service-discovery:8761/eureka/

jwt:
  secret: ${JWT_SECRET:local-dev-secret-key-must-be-at-least-64-chars-long-for-hs512-algorithm}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  health:
    readinessstate:
      enabled: true
    livenessstate:
      enabled: true
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true

resilience4j:
  circuitbreaker:
    instances:
      orderCircuitBreaker:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s

---
spring:
  config:
    activate:
      on-profile: test
  cloud:
    gateway:
      routes: []   # no routes needed for context load test
    discovery:
      enabled: false

eureka:
  client:
    enabled: false

jwt:
  secret: test-secret-key-at-least-64-characters-long-for-hs512-algorithm-ok
