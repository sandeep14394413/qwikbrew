<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
  <meta http-equiv="Pragma" content="no-cache"/>
  <meta http-equiv="Expires" content="0"/>
  <title>QwikCafe — Corporate Café</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.4/babel.min.js"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
    :root{
      --orange:#F26522;--orange-dark:#d4541a;--orange-light:#FFF3EC;--orange-mid:#FF8C42;
      --navy:#1A1A2E;--navy2:#16213E;--navy3:#0F3460;
      --veg:#27AE60;--nonveg:#E74C3C;
      --bg:#F5F5F5;--card:#FFFFFF;--text:#1A1A1A;--muted:#8A8A9A;
      --border:#EDEDED;--success:#27AE60;--warning:#F39C12;--info:#3B82F6;
      --gold:#FFB800;
      --r:14px;--r-sm:10px;--r-lg:22px;--r-xl:28px;
      --shadow:0 2px 14px rgba(0,0,0,0.07);
      --shadow-md:0 4px 20px rgba(0,0,0,0.10);
      --shadow-lg:0 8px 36px rgba(0,0,0,0.14);
    }
    html,body{height:100%;background:#D8D8D8;}
    body{font-family:'Poppins','Segoe UI',sans-serif;color:var(--text);}
    #root{height:100%;display:flex;justify-content:center;align-items:flex-start;}

    /* ── App Shell ── */
    .app-shell{width:100%;max-width:430px;min-height:100vh;background:var(--bg);position:relative;display:flex;flex-direction:column;box-shadow:0 0 80px rgba(0,0,0,.22);overflow:hidden;}
    .screen{flex:1;display:flex;flex-direction:column;overflow:hidden;padding-bottom:70px;}
    .scroll-area{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
    .scroll-area::-webkit-scrollbar{display:none;}

    /* ── Animations ── */
    @keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
    @keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
    @keyframes spin{to{transform:rotate(360deg);}}
    @keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.06);}}
    @keyframes shimmer{0%{background-position:-200px 0;}100%{background-position:200px 0;}}
    @keyframes slideUp{from{transform:translateX(-50%) translateY(20px);opacity:0;}to{transform:translateX(-50%) translateY(0);opacity:1;}}
    @keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(-12px);}to{opacity:1;transform:translateX(-50%) translateY(0);}}
    @keyframes slideDown{from{opacity:0;transform:translateY(-10px);}to{opacity:1;transform:translateY(0);}}
    @keyframes ribbon{from{opacity:0;transform:scale(.8);}to{opacity:1;transform:scale(1);}}
    @keyframes countUp{from{opacity:0;transform:scale(.8);}to{opacity:1;transform:scale(1);}}
    @keyframes progressGrow{from{width:0%;}to{width:100%;}}
    @keyframes logoPulse{0%,100%{box-shadow:0 0 0 0 rgba(242,101,34,.5);}70%{box-shadow:0 0 0 20px rgba(242,101,34,0);}}

    /* ── Splash ── */
    .splash{background:linear-gradient(160deg,#F26522 0%,#c94a12 55%,#1A1A2E 100%);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0;overflow:hidden;position:relative;}
    .splash::before{content:'';position:absolute;width:400px;height:400px;border-radius:50%;background:rgba(255,255,255,.04);top:-100px;right:-100px;}
    .splash::after{content:'';position:absolute;width:300px;height:300px;border-radius:50%;background:rgba(255,255,255,.04);bottom:-80px;left:-80px;}
    .splash-logo{width:96px;height:96px;background:#fff;border-radius:30px;display:flex;align-items:center;justify-content:center;box-shadow:0 16px 48px rgba(0,0,0,.25);margin-bottom:22px;animation:logoPulse 2s ease-in-out infinite;}
    .splash-logo i{font-size:44px;color:var(--orange);}
    .splash h1{color:#fff;font-size:34px;font-weight:900;letter-spacing:-0.5px;}
    .splash p{color:rgba(255,255,255,.7);font-size:13px;margin-top:6px;margin-bottom:52px;}
    .splash-progress-wrap{width:120px;height:3px;background:rgba(255,255,255,.2);border-radius:2px;overflow:hidden;margin-bottom:20px;}
    .splash-progress{height:100%;background:#fff;border-radius:2px;animation:progressGrow 2s ease-in-out forwards;}
    .splash-dots{display:flex;gap:8px;align-items:center;margin-bottom:auto;}
    .splash-dot{width:7px;height:7px;border-radius:50%;}
    .splash-tagline{color:rgba(255,255,255,.55);font-size:11px;padding-bottom:36px;letter-spacing:.5px;}
    .splash-version{position:absolute;bottom:60px;color:rgba(255,255,255,.35);font-size:10px;}

    /* ── Auth ── */
    .auth-screen{background:#fff;min-height:100vh;display:flex;flex-direction:column;}
    .auth-header{background:linear-gradient(135deg,#F26522 0%,#d4541a 100%);padding:52px 28px 36px;position:relative;overflow:hidden;}
    .auth-header::before{content:'';position:absolute;right:-30px;top:-30px;width:160px;height:160px;background:rgba(255,255,255,.09);border-radius:50%;}
    .auth-header::after{content:'';position:absolute;right:40px;bottom:-50px;width:120px;height:120px;background:rgba(255,255,255,.06);border-radius:50%;}
    .auth-brand{display:flex;align-items:center;gap:12px;margin-bottom:20px;}
    .auth-brand-icon{width:44px;height:44px;background:rgba(255,255,255,.22);border-radius:12px;display:flex;align-items:center;justify-content:center;}
    .auth-brand-icon i{color:#fff;font-size:20px;}
    .auth-brand-name{color:#fff;font-size:20px;font-weight:800;}
    .auth-header h2{color:#fff;font-size:26px;font-weight:700;line-height:1.2;}
    .auth-header p{color:rgba(255,255,255,.75);font-size:13px;margin-top:5px;}
    .auth-tabs{display:flex;margin:20px 20px 0;background:#F5F5F5;border-radius:var(--r-sm);padding:4px;}
    .auth-tab{flex:1;padding:11px;text-align:center;font-size:13px;font-weight:600;color:var(--muted);border:none;background:none;cursor:pointer;border-radius:7px;transition:all .2s;font-family:inherit;}
    .auth-tab.active{background:#fff;color:var(--orange);box-shadow:0 2px 10px rgba(0,0,0,.09);}
    .auth-form{padding:16px 20px 24px;}
    .form-group{margin-bottom:14px;position:relative;}
    .form-label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px;display:block;}
    .form-input{width:100%;padding:13px 16px;border:1.5px solid var(--border);border-radius:var(--r-sm);font-size:14px;font-family:inherit;outline:none;transition:all .2s;background:#fff;color:var(--text);}
    .form-input:focus{border-color:var(--orange);box-shadow:0 0 0 3px rgba(242,101,34,.1);}
    .form-input-icon{position:relative;}
    .form-input-icon .form-input{padding-right:44px;}
    .eye-btn{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--muted);font-size:14px;padding:4px;}
    .btn{padding:14px 20px;border:none;border-radius:var(--r-sm);cursor:pointer;font-size:14px;font-weight:700;font-family:inherit;transition:all .2s;letter-spacing:.2px;}
    .btn-primary{background:linear-gradient(135deg,var(--orange),var(--orange-dark));color:#fff;width:100%;box-shadow:0 6px 22px rgba(242,101,34,.38);}
    .btn-primary:hover{transform:translateY(-1px);box-shadow:0 10px 28px rgba(242,101,34,.44);}
    .btn-primary:active{transform:scale(.97);box-shadow:0 3px 12px rgba(242,101,34,.3);}
    .btn-outline{background:#fff;border:2px solid var(--orange);color:var(--orange);width:100%;}
    .btn-outline:hover{background:var(--orange-light);}
    .btn-ghost{background:none;border:none;color:var(--orange);font-size:12px;font-weight:700;font-family:inherit;cursor:pointer;padding:4px 8px;}
    .divider{text-align:center;color:var(--muted);font-size:11px;margin:14px 0;position:relative;}
    .divider::before,.divider::after{content:'';position:absolute;top:50%;width:38%;height:1px;background:var(--border);}
    .divider::before{left:0;}.divider::after{right:0;}

    /* ── App Header ── */
    .app-header{background:linear-gradient(135deg,#F26522 0%,#d4541a 100%);padding:0;position:sticky;top:0;z-index:50;overflow:hidden;}
    .app-header::before{content:'';position:absolute;right:-20px;top:-20px;width:120px;height:120px;background:rgba(255,255,255,.07);border-radius:50%;pointer-events:none;}
    .header-top{display:flex;align-items:center;justify-content:space-between;padding:14px 18px 8px;position:relative;z-index:1;}
    .header-left{display:flex;align-items:center;gap:10px;}
    .header-avatar{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.25);border:2px solid rgba(255,255,255,.5);display:flex;align-items:center;justify-content:center;font-size:15px;color:#fff;font-weight:700;}
    .header-greet-wrap{}
    .header-greeting{color:rgba(255,255,255,.75);font-size:11px;font-weight:500;}
    .header-name{color:#fff;font-size:16px;font-weight:700;margin-top:0px;line-height:1.2;}
    .header-right{display:flex;align-items:center;gap:8px;}
    .header-pts{display:flex;align-items:center;gap:4px;background:rgba(255,255,255,.18);border-radius:20px;padding:5px 10px;cursor:pointer;}
    .header-pts i{color:#FFD700;font-size:12px;}
    .header-pts span{color:#fff;font-size:11px;font-weight:700;}
    .header-icon-btn{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.18);border:none;color:#fff;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;position:relative;transition:background .2s;}
    .header-icon-btn:hover{background:rgba(255,255,255,.28);}
    .badge-dot{position:absolute;top:4px;right:4px;width:8px;height:8px;background:#FFD700;border-radius:50%;border:2px solid var(--orange);}
    .cart-badge{position:absolute;top:-4px;right:-4px;background:#fff;color:var(--orange);font-size:9px;font-weight:800;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 6px rgba(0,0,0,.15);}
    .location-bar{display:flex;align-items:center;gap:6px;padding:0 18px 12px;color:rgba(255,255,255,.82);font-size:11px;font-weight:500;position:relative;z-index:1;}
    .location-bar i{font-size:12px;}
    .location-change{color:rgba(255,255,255,.6);font-size:10px;margin-left:4px;}

    /* ── Search ── */
    .search-wrap{margin:14px 16px 0;position:relative;}
    .search-input{width:100%;padding:12px 16px 12px 44px;border:none;border-radius:var(--r);font-size:14px;font-family:inherit;outline:none;box-shadow:var(--shadow-md);background:#fff;transition:box-shadow .2s;}
    .search-input:focus{box-shadow:0 4px 20px rgba(242,101,34,.15);}
    .search-icon{position:absolute;left:15px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:15px;}
    .filter-btn{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:var(--orange-light);border:none;color:var(--orange);width:30px;height:30px;border-radius:8px;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;}

    /* ── Filter Bar ── */
    .filter-bar{display:flex;gap:8px;padding:10px 16px 4px;align-items:center;}
    .filter-chip{display:flex;align-items:center;gap:5px;padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;border:1.5px solid transparent;white-space:nowrap;}
    .filter-chip.veg-on{background:#E8F8EF;color:var(--veg);border-color:var(--veg);}
    .filter-chip.veg-off{background:#fff;color:var(--muted);border-color:var(--border);box-shadow:var(--shadow);}
    .sort-chip{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;background:#fff;color:var(--muted);border:1.5px solid var(--border);box-shadow:var(--shadow);display:flex;align-items:center;gap:5px;}

    /* ── Meal Tabs ── */
    .meal-tabs{display:flex;gap:8px;padding:10px 16px 6px;overflow-x:auto;scrollbar-width:none;}
    .meal-tabs::-webkit-scrollbar{display:none;}
    .meal-tab{display:flex;align-items:center;gap:6px;padding:8px 16px;border-radius:30px;font-size:12px;font-weight:600;white-space:nowrap;cursor:pointer;border:1.5px solid transparent;transition:all .2s;background:#fff;color:var(--muted);box-shadow:var(--shadow);}
    .meal-tab.active{background:var(--orange);color:#fff;border-color:var(--orange);box-shadow:0 4px 14px rgba(242,101,34,.3);}

    /* ── Banner Carousel ── */
    .carousel-wrap{margin:12px 16px 0;position:relative;overflow:hidden;border-radius:var(--r-lg);}
    .carousel-track{display:flex;transition:transform .4s cubic-bezier(.25,.46,.45,.94);}
    .carousel-slide{min-width:100%;border-radius:var(--r-lg);overflow:hidden;}
    .banner{padding:20px 22px;display:flex;justify-content:space-between;align-items:center;position:relative;min-height:130px;}
    .banner-1{background:linear-gradient(135deg,#1A1A2E 0%,#0F3460 100%);}
    .banner-2{background:linear-gradient(135deg,#27AE60 0%,#1E8449 100%);}
    .banner-3{background:linear-gradient(135deg,#8B5CF6 0%,#6D28D9 100%);}
    .banner-emoji{position:absolute;right:20px;top:50%;transform:translateY(-50%);font-size:68px;opacity:.18;}
    .banner-label{color:rgba(255,255,255,.65);font-size:10px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;}
    .banner-title{color:#fff;font-size:18px;font-weight:800;margin:4px 0 6px;line-height:1.25;max-width:180px;}
    .banner-sub{color:rgba(255,255,255,.7);font-size:11px;margin-bottom:10px;}
    .banner-cta{background:var(--orange);color:#fff;font-size:11px;font-weight:700;padding:6px 14px;border-radius:20px;display:inline-block;cursor:pointer;}
    .banner-cta-white{background:rgba(255,255,255,.22);color:#fff;font-size:11px;font-weight:700;padding:6px 14px;border-radius:20px;display:inline-block;}
    .carousel-dots{display:flex;gap:6px;justify-content:center;padding:10px 0 4px;}
    .c-dot{width:6px;height:6px;border-radius:3px;background:var(--border);transition:all .3s;cursor:pointer;}
    .c-dot.active{width:18px;background:var(--orange);}

    /* ── Quick Stats ── */
    .quick-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:14px 16px 4px;}
    .stat-card{background:#fff;border-radius:var(--r);padding:12px;text-align:center;box-shadow:var(--shadow);}
    .stat-val{font-size:20px;font-weight:800;color:var(--text);}
    .stat-label{font-size:10px;color:var(--muted);font-weight:600;margin-top:2px;}
    .stat-icon{font-size:16px;margin-bottom:4px;}

    /* ── Popular Section ── */
    .popular-scroll{display:flex;gap:12px;padding:0 16px 4px;overflow-x:auto;scrollbar-width:none;}
    .popular-scroll::-webkit-scrollbar{display:none;}
    .pop-card{min-width:130px;background:#fff;border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden;cursor:pointer;transition:transform .2s;}
    .pop-card:hover{transform:translateY(-3px);}
    .pop-card-emoji{height:80px;display:flex;align-items:center;justify-content:center;font-size:42px;background:linear-gradient(135deg,#fff7f0,#ffe8d6);}
    .pop-card-body{padding:8px 10px 10px;}
    .pop-card-name{font-size:12px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .pop-card-row{display:flex;align-items:center;justify-content:space-between;margin-top:4px;}
    .pop-card-price{font-size:13px;font-weight:800;color:var(--orange);}
    .pop-card-rating{display:flex;align-items:center;gap:3px;font-size:10px;font-weight:700;color:var(--muted);}
    .pop-card-rating i{color:var(--gold);font-size:10px;}

    /* ── Section Header ── */
    .section-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 8px;}
    .section-title{font-size:15px;font-weight:700;color:var(--text);}
    .section-link{font-size:12px;font-weight:600;color:var(--orange);border:none;background:none;cursor:pointer;font-family:inherit;}

    /* ── Category Chips ── */
    .cat-scroll{display:flex;gap:10px;padding:0 16px 10px;overflow-x:auto;scrollbar-width:none;}
    .cat-scroll::-webkit-scrollbar{display:none;}
    .cat-chip{display:flex;flex-direction:column;align-items:center;gap:5px;min-width:60px;cursor:pointer;transition:transform .2s;}
    .cat-chip:active{transform:scale(.92);}
    .cat-icon{width:52px;height:52px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:24px;transition:all .2s;position:relative;}
    .cat-chip.active .cat-icon{background:var(--orange-light);box-shadow:0 4px 16px rgba(242,101,34,.28);}
    .cat-chip:not(.active) .cat-icon{background:#fff;box-shadow:var(--shadow);}
    .cat-label{font-size:10px;font-weight:600;color:var(--muted);text-align:center;}
    .cat-chip.active .cat-label{color:var(--orange);}

    /* ── Menu Item Card ── */
    .menu-list{padding:0 16px 8px;display:flex;flex-direction:column;gap:12px;}
    .menu-item-card{background:#fff;border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden;display:flex;position:relative;transition:box-shadow .2s,transform .2s;}
    .menu-item-card:active{transform:scale(.99);}
    .menu-item-img-placeholder{width:108px;min-width:108px;height:108px;display:flex;align-items:center;justify-content:center;font-size:44px;flex-shrink:0;position:relative;}
    .menu-item-img-placeholder.cat-bg-breakfast{background:linear-gradient(135deg,#FFF8E1,#FFECB3);}
    .menu-item-img-placeholder.cat-bg-lunch{background:linear-gradient(135deg,#E8F5E9,#C8E6C9);}
    .menu-item-img-placeholder.cat-bg-snacks{background:linear-gradient(135deg,#FBE9E7,#FFCCBC);}
    .menu-item-img-placeholder.cat-bg-beverages{background:linear-gradient(135deg,#E3F2FD,#BBDEFB);}
    .menu-item-img-placeholder.cat-bg-desserts{background:linear-gradient(135deg,#FCE4EC,#F8BBD9);}
    .bestseller-ribbon{position:absolute;top:0;right:0;background:var(--orange);color:#fff;font-size:8px;font-weight:800;padding:3px 7px;border-radius:0 0 0 8px;letter-spacing:.3px;text-transform:uppercase;animation:ribbon .3s ease;}
    .new-ribbon{position:absolute;top:0;right:0;background:var(--success);color:#fff;font-size:8px;font-weight:800;padding:3px 7px;border-radius:0 0 0 8px;}
    .menu-item-body{flex:1;padding:11px 12px 10px;display:flex;flex-direction:column;justify-content:space-between;}
    .menu-item-top{display:flex;align-items:flex-start;gap:6px;margin-bottom:3px;}
    .fssai-dot{width:15px;height:15px;border-radius:2px;border:1.5px solid;flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-top:2px;}
    .fssai-dot.veg{border-color:var(--veg);}
    .fssai-dot.veg::after{content:'';width:7px;height:7px;border-radius:50%;background:var(--veg);}
    .fssai-dot.nonveg{border-color:var(--nonveg);}
    .fssai-dot.nonveg::after{content:'';width:0;height:0;border-left:4px solid transparent;border-right:4px solid transparent;border-bottom:7px solid var(--nonveg);margin-top:1px;}
    .menu-item-name{font-size:13px;font-weight:700;color:var(--text);line-height:1.3;flex:1;}
    .menu-item-rating{display:flex;align-items:center;gap:3px;font-size:10px;color:var(--muted);font-weight:600;margin-bottom:4px;}
    .menu-item-rating i{color:var(--gold);font-size:10px;}
    .menu-item-rating span{color:#333;font-weight:700;}
    .menu-tags{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:5px;}
    .tag{font-size:9px;font-weight:700;padding:2px 7px;border-radius:4px;background:#F0F4FF;color:#3B5BDB;letter-spacing:.2px;}
    .tag-cal{background:#FFF8E1;color:#E65100;}
    .tag-hot{background:#FEECEC;color:var(--nonveg);}
    .menu-item-footer{display:flex;align-items:center;justify-content:space-between;}
    .item-price{font-size:15px;font-weight:800;color:var(--text);}
    .add-btn{width:32px;height:32px;border-radius:var(--r-sm);background:linear-gradient(135deg,var(--orange),var(--orange-dark));color:#fff;border:none;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 14px rgba(242,101,34,.32);transition:transform .15s;}
    .add-btn:active{transform:scale(.88);}
    .qty-ctrl{display:flex;align-items:center;background:linear-gradient(135deg,var(--orange),var(--orange-dark));border-radius:var(--r-sm);overflow:hidden;}
    .qty-btn{width:28px;height:32px;background:none;border:none;color:#fff;font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s;}
    .qty-btn:active{background:rgba(0,0,0,.15);}
    .qty-num{color:#fff;font-size:13px;font-weight:700;min-width:24px;text-align:center;}
    .sold-out-overlay{position:absolute;inset:0;background:rgba(255,255,255,.72);display:flex;align-items:center;justify-content:center;z-index:2;}

    /* ── Profile Screen ── */

// ── Countdown Timer ───────────────────────────────────────────────
function CountdownTimer({initialSecs}){
  var _s = useState(initialSecs); var secs = _s[0]; var setSecs = _s[1];
  useEffect(function(){
    if(secs <= 0) return;
    var t = setInterval(function(){setSecs(function(s){return s > 0 ? s-1 : 0;});}, 1000);
    return function(){clearInterval(t);};
  }, []);
  var m = Math.floor(secs/60); var s = secs%60;
  return <span className="countdown-timer">{m}m {s < 10 ? '0'+s : s}s</span>;
}

  var _lo = useState(null); var latestOrder = _lo[0]; var setLatestOrder = _lo[1];
  var _np = useState(false); var notifOpen = _np[0]; var setNotifOpen = _np[1];

  function showToast(msg, type){ setToast({msg:msg, type:type||'success'}); }

  function addItem(id){
    setCart(function(c){var n=Object.assign({},c);n[id]=1;return n;});
    showToast('Added to cart!', 'success');
  }
  function incItem(id){setCart(function(c){var n=Object.assign({},c);n[id]=(c[id]||0)+1;return n;});}
  function decItem(id){
    setCart(function(c){
      var n=Object.assign({},c);
      if(n[id] <= 1) delete n[id];
      else n[id]--;
      return n;
    });
  }

  var cartCount = 0;
  Object.values(cart).forEach(function(v){cartCount += v;});
  var cartTotal = MENU_ITEMS.filter(function(i){return cart[i.id] > 0;}).reduce(function(s,i){return s + i.price*(cart[i.id]||0);}, 0);

  function onOrderPlaced(){
    var id = 'ORD'+Math.floor(2900+Math.random()*99);
    setLatestOrder({id:id,items:MENU_ITEMS.filter(function(i){return cart[i.id]>0;})});
    setCart({});
    setTab('orders');
    showToast('Order placed! Preparing now... 🎉', 'success');
  }

  if(phase === 'splash') return <div className="app-shell"><SplashScreen onDone={function(){setPhase('auth');}}/></div>;
  if(phase === 'auth' || !user) return <div className="app-shell"><AuthScreen onLogin={function(u){setUser(u);setPhase('app');}}/></div>;

  var NAV = [
    {id:'home',icon:'fa-home',label:'Home'},
    {id:'menu',icon:'fa-utensils',label:'Menu'},
    {id:'orders',icon:'fa-receipt',label:'Orders'},
    {id:'wallet',icon:'fa-wallet',label:'Wallet'},
    {id:'profile',icon:'fa-user',label:'Profile'},
  ];

  return (
    <div className="app-shell">
      <div className="screen">
        {(tab === 'home' || tab === 'menu') && <HomeTab user={user} cart={cart} onAdd={addItem} onInc={incItem} onDec={decItem} setTab={setTab} showNotif={function(){setNotifOpen(true);}}/>}
        {tab === 'cart' && <CartTab cart={cart} onInc={incItem} onDec={decItem} user={user} onOrderPlaced={onOrderPlaced} setTab={setTab} showToast={showToast}/>}
        {tab === 'orders' && <OrdersTab latestOrder={latestOrder} showToast={showToast}/>}
        {tab === 'wallet' && <WalletTab/>}
        {tab === 'profile' && <ProfileTab user={user} onLogout={function(){setUser(null);setPhase('auth');setCart({});}}/>}
      </div>

      {cartCount > 0 && (tab === 'home' || tab === 'menu') && (
        <div className="cart-fab" onClick={function(){setTab('cart');}}>
          <div className="cart-fab-left">
            <div className="cart-count-badge">{cartCount}</div>
            <span className="cart-fab-label">{cartCount} item{cartCount > 1 ? 's' : ''} in cart</span>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:4}}>
            <span className="cart-fab-price">{fmt(cartTotal)}</span>
            <i className="fas fa-chevron-right cart-fab-arrow"/>
          </div>
        </div>
      )}

      <div className="bottom-nav">
        {NAV.map(function(n){
          return (
            <button key={n.id} className={'nav-item'+(tab === n.id ? ' active' : '')} onClick={function(){setTab(n.id);}}>
              <div className="nav-indicator"/>
              <i className={'fas '+n.icon}/>
              <span>{n.label}</span>
            </button>
          );
        })}
      </div>

      {notifOpen && <NotifPanel onClose={function(){setNotifOpen(false);}}/>}
      {toast && <Toast msg={toast.msg} type={toast.type} onDone={function(){setToast(null);}}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
