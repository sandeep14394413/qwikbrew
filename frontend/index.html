    .btn-primary{background:var(--primary);color:#fff;}
    .btn-primary:hover{background:var(--primary-dark);}
    .btn-outline{background:transparent;border:2px solid var(--primary);color:var(--primary);}
    .btn-outline:hover{background:var(--primary);color:#fff;}
    .btn-sm{padding:6px 14px;font-size:12px;}

    .badge{padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;}
    .badge-veg{background:#e8f5e9;color:#2e7d32;}

    .toast-error{background:var(--danger);}
    @keyframes slideIn{from{transform:translateX(100%);opacity:0;}to{transform:translateX(0);opacity:1;}}
    .spinner{border:3px solid #f3f3f3;border-top:3px solid var(--primary);border-radius:50%;width:32px;height:32px;animation:spin .8s linear infinite;margin:40px auto;}

    .order-card{padding:20px;margin-bottom:16px;}
    .order-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;}
    .order-id{font-weight:700;font-size:15px;}
    .order-date{color:var(--muted);font-size:12px;}
    .order-status{padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700;}
    .status-delivered{background:#e8f5e9;color:#2e7d32;}
    .status-preparing{background:#fff3e0;color:#e65100;}
    .status-ready{background:#e3f2fd;color:#1565c0;}

    .avatar{width:80px;height:80px;border-radius:50%;background:var(--primary);display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto 16px;}
    .wallet-card{background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#fff;border-radius:16px;padding:24px;margin:20px;}
    .wallet-balance{font-size:36px;font-weight:800;}
    /* Bottom nav */
    .bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #e0e0e0;z-index:100;box-shadow:0 -6px 24px rgba(17,24,39,.08);}

      .mcard-img-wrap{height:130px;}
      .cart-sidebar{width:100%;}
    }
  </style>
</head>

async function api(path, opts={}){
  const token=localStorage.getItem('token');
  const res=await fetch(BASE+path,{
    headers:{'Content-Type':'application/json',...(token?{Authorization:`Bearer ${token}`}:{}),...(opts.headers||{})},
    ...opts
  });
  if(res.status===401){localStorage.clear();window.location.reload();}
  const data=await res.json().catch(()=>({}));
  if(!res.ok)throw new Error(data.message||'Something went wrong');
  return data;
}

  samosa:'https://images.unsplash.com/photo-1601050690597-df0568f70950?auto=format&fit=crop&w=900&q=80',
  'gulab jamun':'https://images.unsplash.com/photo-1611293388250-580b08c4a145?auto=format&fit=crop&w=900&q=80'
};

function resolveFoodImage(item) {
  if (item.image) return item.image;
  const normalized = (item.name || '').toLowerCase().trim();
  if (FOOD_IMAGE_MAP[normalized]) return FOOD_IMAGE_MAP[normalized];
  const partialMatch = Object.keys(FOOD_IMAGE_MAP).find(key => normalized.includes(key) || key.includes(normalized));
  if (partialMatch) return FOOD_IMAGE_MAP[partialMatch];
  const query = encodeURIComponent(`${item.name || item.category || 'indian food'} plated food`);
  return `https://source.unsplash.com/900x600/?${query}`;
}

function decorateMenuItems(list) {
  return list.map((item, index) => ({
    ...item,
    id: item.id ?? index + 1,
    rating: item.rating ?? (4.2 + (index % 6) * 0.1).toFixed(1),
    preparationTime: item.preparationTime ?? (8 + (index % 5) * 3),
    image: resolveFoodImage(item)
  }));
}

function mergeWithFeaturedDishes(list) {
  const byName = new Map(list.map(item => [(item.name || '').toLowerCase(), item]));
  SAMPLE_MENU.forEach(item => {
    const key = (item.name || '').toLowerCase();
    if (!byName.has(key)) byName.set(key, item);
  });
  return Array.from(byName.values());
}

// ── Cart Sidebar ──────────────────────────────────────────────────────────────
function CartSidebar({ cart, setCart, open, onClose, showToast, user }) {
  const [placing, setPlacing] = useState(false);
  const [paymentMethod, setPaymentMethod] = useState('WALLET');
  const [gatewayOpen, setGatewayOpen] = useState(false);
  const [gatewayValue, setGatewayValue] = useState('');
  const [upiCollectSent, setUpiCollectSent] = useState(false);
  const [upiCollectReference, setUpiCollectReference] = useState('');
  const [upiIntentLink, setUpiIntentLink] = useState('');
  const [gpayIntentLink, setGpayIntentLink] = useState('');
  const [rechargeAmount, setRechargeAmount] = useState('');
  const [rechargeMethod, setRechargeMethod] = useState('CARD');
  const [recharging, setRecharging] = useState(false);
  const [cardDetails, setCardDetails] = useState({ number:'', expiry:'', cvv:'' });
  const [walletBalance, setWalletBalance] = useState(() => {
    const stored = Number(localStorage.getItem('qb_wallet_balance'));
    if (!Number.isNaN(stored) && stored >= 0) return stored;
    return Number(user?.walletBalance || 500);
  });
  const total = cart.reduce((s, i) => s + i.price * i.qty, 0);

  useEffect(() => {
    localStorage.setItem('qb_wallet_balance', String(walletBalance));
  }, [walletBalance]);

  useEffect(() => {
    if (paymentMethod === 'UPI') setGatewayValue(MERCHANT_UPI_ID);
  }, [paymentMethod]);

  const add = id => setCart(c => c.map(x => x.id===id ? {...x,qty:x.qty+1} : x));
  const rem = id => setCart(c => c.map(x => x.id===id ? {...x,qty:x.qty-1} : x).filter(x => x.qty>0));

  const submit=async(method=payMethod,ref=`QB-${Date.now()}`)=>{
    setPlacing(true);
    const txnId = `TXN-${Date.now()}`;
    const payload = { items: cart.map(i => ({ menuItemId: i.id, menuItemName: i.name, quantity: i.qty, unitPrice: i.price })), totalAmount: total, paymentMethod: method };
    let paymentRes = null;
    let txnStatus = null;
    try {
      paymentRes = await api('/api/v1/payments/charge', {
        method:'POST',
        body: JSON.stringify({ userId: user?.id || user?.email || 'demo-user', amount: total, paymentMethod: method, reference, transactionId: txnId })
      });
      txnStatus = await api(`/api/v1/payments/transactions/status?transactionId=${encodeURIComponent(paymentRes.transactionId || '')}&reference=${encodeURIComponent(reference)}`);
      await api('/api/v1/orders', { method:'POST', body: JSON.stringify(payload) });
    } catch(e) { /* demo fallback */ }
    if (method === 'WALLET') setWalletBalance(b => Math.max(0, b - total));
    const statusObj = txnStatus || { transactionId: paymentRes?.transactionId || txnId, reference, status:'SUCCESS', amount: total };
    localStorage.setItem('qb_last_txn', JSON.stringify(statusObj));
    showToast(`Paid via ${method.replace('_',' ')} • ${statusObj.status} • ₹${total}`, 'success');
    setCart([]); onClose(); setPlacing(false);
    setGatewayOpen(false); setGatewayValue(''); setUpiCollectSent(false); setUpiCollectReference(''); setUpiIntentLink(''); setGpayIntentLink('');
  };

  const placeOrder = async () => {
    if (paymentMethod === 'WALLET') {
      if (walletBalance < total) { showToast(`Insufficient wallet balance. Available ₹${walletBalance}`, 'error'); return; }
      return submitOrder('WALLET');
    }
    setGatewayOpen(true);
  };

  const confirmGatewayPayment = async () => {
    if (!gatewayValue.trim()) { showToast('Please complete payment details', 'error'); return; }
    if (paymentMethod === 'CARD') {
      if (!/^\d{16}$/.test(cardDetails.number.replace(/\s+/g,''))) { showToast('Enter valid 16-digit card number', 'error'); return; }
      if (!/^\d{2}\/\d{2}$/.test(cardDetails.expiry)) { showToast('Enter expiry as MM/YY', 'error'); return; }
      if (!/^\d{3}$/.test(cardDetails.cvv)) { showToast('Enter 3-digit CVV', 'error'); return; }
      setGatewayValue(cardDetails.number.slice(-4));
    }
    if (paymentMethod === 'UPI' && !upiCollectSent) {
      try {
        const res = await api('/api/v1/payments/upi/collect', {
          method:'POST',
          body: JSON.stringify({
            userId: user?.id || user?.email || 'demo-user',
            amount: total,
            upiId: MERCHANT_UPI_ID,
            reference: `UPI-${Date.now()}`
          })
        });
        setUpiCollectReference(res.reference || MERCHANT_UPI_ID);
      } catch {
        setUpiCollectReference(MERCHANT_UPI_ID);
      }
      const intent = `upi://pay?pa=${encodeURIComponent(MERCHANT_UPI_ID)}&pn=${encodeURIComponent('QwikBrew')}&am=${encodeURIComponent(total)}&cu=INR&tn=${encodeURIComponent('QwikBrew order payment')}`;
      const gpayIntent = `tez://upi/pay?pa=${encodeURIComponent(MERCHANT_UPI_ID)}&pn=${encodeURIComponent('QwikBrew')}&am=${encodeURIComponent(total)}&cu=INR&tn=${encodeURIComponent('QwikBrew order payment')}`;
      setUpiIntentLink(intent);
      setGpayIntentLink(gpayIntent);
      setUpiCollectSent(true);
      window.location.href = gpayIntent;
      showToast(`Opening Google Pay request for ${MERCHANT_UPI_ID}. Complete payment, then click confirm.`, 'success');
      return;
    }
    submitOrder(paymentMethod, upiCollectReference || gatewayValue.trim());
  };

  const rechargeWallet = async () => {
    const amount = Number(rechargeAmount);
    if (!amount || amount < 1) { showToast('Enter valid recharge amount', 'error'); return; }
    setRecharging(true);
    try {
      const res = await api('/api/v1/payments/wallet/topup', {
        method:'POST',
        body: JSON.stringify({
          userId: user?.id || user?.email || 'demo-user',
          amount,
          paymentMethod: rechargeMethod
        })
      });
      const newBalance = Number(res?.balance ?? (walletBalance + amount));
      setWalletBalance(newBalance);
      setRechargeAmount('');
      showToast(`Wallet recharged ₹${amount} via ${rechargeMethod}`, 'success');
    } catch {
      setWalletBalance(b => b + amount);
      setRechargeAmount('');
      showToast(`Wallet recharged ₹${amount} (demo mode)`, 'success');
    } finally {
      setRecharging(false);
    }
  };

  const METHODS=[{id:'WALLET',icon:'👛',label:'Wallet'},{id:'UPI',icon:'📱',label:'UPI'},{id:'CARD',icon:'💳',label:'Card'},{id:'NET_BANKING',icon:'🏦',label:'NetBanking'}];

  return <>
    {open && <div className="overlay" onClick={onClose}/>}
    <div className={`cart-sidebar ${open?'open':''}`}>
      <div className="cart-header">
        <div className="cart-title">Your Cart ({cart.length})</div>
        <button className="close-btn" onClick={onClose}>✕</button>
      </div>
      <div className="cart-items">
        {cart.length===0
          ? <div className="cart-empty"><div className="cart-empty-icon">🛒</div><p>Your cart is empty</p></div>
          : cart.map(item=><div key={item.id} className="cart-item">
              <div className="cart-item-emoji">{item.emoji||'🍽️'}</div>
              <div className="cart-item-info">
                <div className="cart-item-name">{item.name}</div>
                <div className="cart-item-price">₹{item.price} × {item.qty} = ₹{item.price*item.qty}</div>
              </div>
              <div className="qty-ctrl">
                <button className="qty-btn" style={{width:28,height:28,fontSize:14}} onClick={()=>remItem(item.id)}>−</button>
                <span className="qty-num" style={{fontSize:13}}>{item.qty}</span>
                <button className="qty-btn" style={{width:28,height:28,fontSize:14}} onClick={()=>addItem(item.id)}>+</button>
              </div>
            </div>)
        }
      </div>
      {cart.length>0 && <div className="cart-footer">
        <div className="wallet-badge">💰 Wallet Balance: ₹{walletBal}</div>
        <div className="total-row"><span>Total</span><span className="total-amount">₹{total}</span></div>
        <div className="pay-methods">
          {METHODS.map(m=><div key={m.id} className={`pay-method ${payMethod===m.id?'active':''}`} onClick={()=>setPayMethod(m.id)}>
            <span className="pay-method-icon">{m.icon}</span>{m.label}
          </div>)}
        </div>
        {cart.length > 0 && (
          <div className="cart-footer">
            <div className="cart-total"><span>Total</span><span style={{color:'var(--primary)'}}>₹{total}</span></div>
            <div style={{fontSize:12,background:'#f0fdf4',border:'1px solid #bbf7d0',color:'#166534',padding:'8px 10px',borderRadius:10,marginBottom:10,fontWeight:600}}>
              Wallet Balance: ₹{walletBalance}
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr auto auto',gap:8,marginBottom:10}}>
              <input
                placeholder="Recharge wallet amount"
                type="number"
                min="1"
                value={rechargeAmount}
                onChange={e => setRechargeAmount(e.target.value)}
              />
              <select value={rechargeMethod} onChange={e => setRechargeMethod(e.target.value)} style={{width:120}}>
                <option value="CARD">Card</option>
                <option value="UPI">UPI</option>
              </select>
              <button className="btn btn-outline btn-sm" onClick={rechargeWallet} disabled={recharging}>
                {recharging ? '...' : 'Recharge'}
              </button>
            </div>
            <div className="payment-methods">
              {[{id:'WALLET',label:'Wallet',icon:'fa-wallet'},{id:'UPI',label:'UPI',icon:'fa-mobile-screen'},{id:'CARD',label:'Card',icon:'fa-credit-card'},{id:'NET_BANKING',label:'NetBanking',icon:'fa-building-columns'}].map(m => (
                <button key={m.id} className={`payment-method ${paymentMethod===m.id?'active':''}`} onClick={() => setPaymentMethod(m.id)}>
                  <i className={`fa ${m.icon}`}/> {m.label}
                </button>
              ))}
            </div>
            <button className="close-btn" style={{color:'#fff',borderColor:'rgba(255,255,255,.3)',background:'rgba(255,255,255,.08)'}} onClick={()=>{setGatewayOpen(false);setUpiSent(false);}}>✕</button>
          </div>
          <div className="modal-body">
            <p style={{fontSize:13,color:'var(--muted)',marginBottom:10}}>
              {payMethod==='UPI'?`Pay to: ${MERCHANT_UPI}`:payMethod==='CARD'?'Enter card last 4 digits':'Enter transaction reference'}
            </p>
            <input className="modal-input" placeholder={payMethod==='UPI'?MERCHANT_UPI:payMethod==='CARD'?'1234':'Reference'} value={gwVal} onChange={e=>setGwVal(e.target.value)} readOnly={payMethod==='UPI'}/>
            {payMethod==='UPI'&&upiSent&&<>
              <div className="collect-info">Collect request sent. Approve in your UPI app, then confirm.</div>
              <div className="upi-qr"><img src={`https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=${encodeURIComponent(upiLink||`upi://pay?pa=${MERCHANT_UPI}&am=${total}&cu=INR`)}`} alt="QR Code"/></div>
              {upiLink&&<a href={upiLink} className="upi-open-btn" style={{display:'block',textAlign:'center',textDecoration:'none',lineHeight:'1.6'}}>Open UPI App</a>}
            </>}
            <button className="place-btn" onClick={confirmGateway} disabled={placing}>
              {placing?'Processing…':payMethod==='UPI'&&!upiSent?`Send collect request · ₹${total}`:`Confirm payment · ₹${total}`}
            </button>
          </div>
        </div>
      </div>
      {gatewayOpen && (
        <>
          <div className="overlay" onClick={() => { setGatewayOpen(false); setUpiCollectSent(false); setUpiCollectReference(''); setUpiIntentLink(''); setGpayIntentLink(''); }}/>
          <div className="gateway-modal">
            <div className="gateway-header">
              <div>
                <h3 style={{fontSize:16}}>QwikPay Gateway</h3>
                <p style={{fontSize:11,opacity:.85}}>Method: {paymentMethod.replace('_',' ')}</p>
              </div>
              <button className="btn btn-sm btn-outline" onClick={() => { setGatewayOpen(false); setUpiCollectSent(false); setUpiCollectReference(''); setUpiIntentLink(''); setGpayIntentLink(''); }} style={{color:'#fff',borderColor:'rgba(255,255,255,.5)'}}>✕</button>
            </div>
            <div className="gateway-body">
              <p style={{fontSize:13,color:'var(--muted)',marginBottom:10}}>
                {paymentMethod === 'UPI' ? `Pay to merchant UPI ID: ${MERCHANT_UPI_ID}` : paymentMethod === 'CARD' ? 'Enter card last 4 digits' : 'Enter bank reference'}
              </p>
              <input
                placeholder={paymentMethod === 'UPI' ? MERCHANT_UPI_ID : paymentMethod === 'CARD' ? '1234' : 'Transaction reference'}
                value={gatewayValue}
                onChange={e => setGatewayValue(e.target.value)}
                readOnly={paymentMethod === 'UPI'}
                style={{marginBottom:12}}
              />
              {paymentMethod === 'CARD' && (
                <div style={{display:'grid',gap:8,marginBottom:10}}>
                  <input placeholder="Card number (16 digits)" value={cardDetails.number} onChange={e => setCardDetails({...cardDetails, number:e.target.value.replace(/\D/g,'').slice(0,16)})}/>
                  <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
                    <input placeholder="MM/YY" value={cardDetails.expiry} onChange={e => setCardDetails({...cardDetails, expiry:e.target.value.replace(/[^\d/]/g,'').slice(0,5)})}/>
                    <input placeholder="CVV" type="password" value={cardDetails.cvv} onChange={e => setCardDetails({...cardDetails, cvv:e.target.value.replace(/\D/g,'').slice(0,3)})}/>
                  </div>
                </div>
              )}
              {paymentMethod === 'UPI' && upiCollectSent && (
                <div style={{fontSize:12,marginBottom:10,padding:'8px 10px',borderRadius:8,background:'#eff6ff',color:'#1d4ed8',border:'1px solid #bfdbfe'}}>
                  Collect request sent. Open your UPI app and approve, then click confirm.
                </div>
              )}
              {paymentMethod === 'UPI' && upiCollectSent && (
                <div style={{display:'flex',justifyContent:'center',marginBottom:10}}>
                  <img
                    src={`https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=${encodeURIComponent(upiIntentLink || `upi://pay?pa=${MERCHANT_UPI_ID}&am=${total}&cu=INR`)}`}
                    alt="Scan to pay using UPI"
                    style={{width:150,height:150,borderRadius:10,border:'1px solid #e5e7eb'}}
                  />
                </div>
              )}
              {paymentMethod === 'UPI' && upiCollectSent && upiIntentLink && (
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:10}}>
                  <a href={gpayIntentLink || upiIntentLink} className="btn btn-primary" style={{textAlign:'center',display:'block'}}>Open Google Pay</a>
                  <a href={upiIntentLink} className="btn btn-outline" style={{textAlign:'center',display:'block'}}>Other UPI Apps</a>
                </div>
              )}
              <button className="btn btn-primary" style={{width:'100%'}} onClick={confirmGatewayPayment} disabled={placing}>
                {placing ? 'Processing...' : paymentMethod === 'UPI' && !upiCollectSent ? `Send collect request ₹${total}` : `Confirm payment ₹${total}`}
              </button>
            </div>
          </div>
        </div>
        <div className="auth-version">Build {BUILD}</div>
      </div>
      <div className="auth-form-side">
        <div className="auth-logo">
          <div className="auth-logo-cup">☕</div>
          <h1><em>Qwik</em>Brew</h1>
          <p>Corporate Café — Order smart, eat well</p>
        </div>
        <div className="tab-row">
          {['login','register'].map(m=><button key={m} className={`tab ${mode===m?'active':''}`} onClick={()=>setMode(m)}>{m==='login'?'Sign In':'Register'}</button>)}
        </div>
        <form onSubmit={handle}>
          {mode==='register'&&<>
            <div className="form-group"><label className="form-label">Full Name</label><input className="form-input" placeholder="Your name" value={form.name} onChange={e=>setForm({...form,name:e.target.value})} required/></div>
            <div className="form-group"><label className="form-label">Phone</label><input className="form-input" placeholder="10-digit mobile" value={form.phone} onChange={e=>setForm({...form,phone:e.target.value})} required/></div>
          </>}
          <div className="form-group"><label className="form-label">Email</label><input className="form-input" type="email" placeholder="work@company.in" value={form.email} onChange={e=>setForm({...form,email:e.target.value})} required/></div>
          <div className="form-group"><label className="form-label">Password</label><input className="form-input" type="password" placeholder="••••••••" value={form.password} onChange={e=>setForm({...form,password:e.target.value})} required/></div>
          {error&&<p className="form-error">{error}</p>}
          <button type="submit" className="place-btn" disabled={loading}>{loading?'Processing…':mode==='login'?'Sign In →':'Create Account →'}</button>
        </form>
        <div className="auth-switch">
          {mode==='login'?'New here? ':'Already registered? '}
          <span onClick={()=>setMode(mode==='login'?'register':'login')}>{mode==='login'?'Create account':'Sign in'}</span>
        </div>
      </div>
    </div>
  </div>;
}

/* ── App ───────────────────────────────────────────────── */
function App(){
  const [page,setPage]=useState('menu');
  const [cart,setCart]=useState([]);
  const [cartOpen,setCartOpen]=useState(false);
  const [toast,setToast]=useState(null);
  const [user,setUser]=useState(()=>{try{return JSON.parse(localStorage.getItem('user')||'null')}catch{return null}});

  useEffect(() => {
    const previousVersion = localStorage.getItem('qb_ui_version');
    if (previousVersion !== BUILD_VERSION) {
      localStorage.setItem('qb_ui_version', BUILD_VERSION);
      if (!sessionStorage.getItem('qb_ui_reloaded')) {
        sessionStorage.setItem('qb_ui_reloaded', '1');
        window.location.reload();
      }
    }
  }, []);

  useEffect(() => {
    document.title = `QwikBrew — Corporate Café (${BUILD_VERSION})`;
  }, []);

  const showToast = useCallback((msg, type='success') => {
    setToast({ msg, type }); clearTimeout(toastTimer); toastTimer = setTimeout(() => setToast(null), 3000);
  }, []);

  const logout=()=>{localStorage.clear();setUser(null);setCart([]);};
  const totalQty=cart.reduce((s,i)=>s+i.qty,0);

  useEffect(()=>{document.title=`QwikBrew — Corporate Café`;},[]);

  if(!user)return <AuthScreen onLogin={d=>{setUser(d.user||JSON.parse(localStorage.getItem('user')));} }/>;

  const navItems=[{id:'menu',icon:'🍽️',label:'Menu'},{id:'orders',icon:'📋',label:'Orders'},{id:'profile',icon:'👤',label:'Profile'}];

  return (
    <div id="root">
      {toast && <Toast msg={toast.msg} type={toast.type}/>}
      <nav>
        <div className="nav-brand">☕ <span>Qwik</span>Brew <span style={{fontSize:11,fontWeight:700,background:'rgba(249,115,22,.22)',padding:'2px 8px',borderRadius:999}}>NEW UI</span></div>
        <div className="nav-right">
          <div style={{background:'rgba(249,115,22,.2)',color:'#fdba74',fontSize:10,padding:'4px 8px',borderRadius:999,fontWeight:700}}>
            UI {BUILD_VERSION}
          </div>
          <div style={{color:'rgba(255,255,255,.7)',fontSize:13}}>Hi, {(user.name||'').split(' ')[0]} 👋</div>
          <div className="nav-icon" onClick={() => setCartOpen(true)}>
            <i className="fa fa-shopping-cart"/>
            {totalQty > 0 && <span className="nav-badge">{totalQty}</span>}
          </div>
        </div>
      </nav>
      <div style={{flex:1}}>
        {page==='menu' && <MenuScreen cart={cart} setCart={setCart} showToast={showToast}/>}
        {page==='orders' && <OrdersScreen/>}
        {page==='profile' && <ProfileScreen user={user} onLogout={logout} showToast={showToast}/>}
      </div>
      <div className="nav-right">
        <span className="nav-greeting">Hi, {(user.name||'').split(' ')[0]} 👋</span>
        <button className="cart-btn" onClick={()=>setCartOpen(true)}>
          🛒
          {totalQty>0 && <span className="cart-badge" key={totalQty}>{totalQty}</span>}
        </button>
      </div>
    </nav>

    <div style={{flex:1,position:'relative',zIndex:1}}>
      {page==='menu' && <MenuScreen cart={cart} setCart={setCart} showToast={showToast}/>}
      {page==='orders' && <OrdersScreen/>}
      {page==='profile' && <ProfileScreen user={user} onLogout={logout} showToast={showToast}/>}
    </div>

    <CartSidebar cart={cart} setCart={setCart} open={cartOpen} onClose={()=>setCartOpen(false)} showToast={showToast} user={user}/>

    <div className="bottom-nav">
      <div className="bnav-inner">
        {navItems.map(n=><div key={n.id} className={`bnav-item ${page===n.id?'active':''}`} onClick={()=>setPage(n.id)}>
          <div className="bnav-icon">{n.icon}</div>
          <span>{n.label}</span>
        </div>)}
        <div className="bnav-item" onClick={()=>setCartOpen(true)}>
          <div className="bnav-icon" style={{position:'relative'}}>
            🛒
            {totalQty>0&&<span style={{position:'absolute',top:-6,right:-6,background:'var(--brand)',color:'#fff',borderRadius:'50%',width:16,height:16,fontSize:9,display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700}}>{totalQty}</span>}
          </div>
          <span>Cart</span>
        </div>
      </div>
    </div>
  </>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
