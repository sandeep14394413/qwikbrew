  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.4/babel.min.js"></script>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    :root{
      --primary:#f97316;--primary-dark:#ea580c;--secondary:#1f2937;
      --bg:#f3f4f6;--card:#fff;--text:#111827;--muted:#6b7280;
      --success:#28a745;--warning:#ffc107;--danger:#dc3545;
      --radius:16px;--shadow:0 12px 30px rgba(17,24,39,.08);
    }
    body{font-family:'Inter','Segoe UI',Tahoma,sans-serif;background:radial-gradient(circle at 10% 10%,#fff7ed 0%,#f8fafc 35%,#eef2ff 100%);color:var(--text);}
    #root{min-height:100vh;display:flex;flex-direction:column;}
    .btn{padding:10px 20px;border:none;border-radius:12px;cursor:pointer;font-size:14px;font-weight:600;transition:all .2s;}
    .btn-primary{background:var(--primary);color:#fff;}
    .btn-primary:hover{background:var(--primary-dark);}
    .btn-outline{background:transparent;border:2px solid var(--primary);color:var(--primary);}
    .btn-outline:hover{background:var(--primary);color:#fff;}
    .btn-sm{padding:6px 14px;font-size:12px;}
    .card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;border:1px solid #eef2f7;}
    .badge{padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;}
    .badge-veg{background:#e8f5e9;color:#2e7d32;}
    .badge-nonveg{background:#fce4ec;color:#c62828;}
    input,select{width:100%;padding:12px 16px;border:2px solid #e0e0e0;border-radius:8px;font-size:14px;outline:none;transition:border-color .2s;}
    input:focus,select:focus{border-color:var(--primary);}
    .toast{position:fixed;top:20px;right:20px;padding:14px 20px;border-radius:8px;color:#fff;font-weight:600;z-index:9999;animation:slideIn .3s ease;}
    .toast-success{background:var(--success);}
    .toast-error{background:var(--danger);}
    @keyframes slideIn{from{transform:translateX(100%);opacity:0;}to{transform:translateX(0);opacity:1;}}
    .spinner{border:3px solid #f3f3f3;border-top:3px solid var(--primary);border-radius:50%;width:32px;height:32px;animation:spin .8s linear infinite;margin:40px auto;}
    @keyframes spin{to{transform:rotate(360deg);}}
    /* Nav */
    nav{background:rgba(17,24,39,.92);backdrop-filter:blur(12px);padding:0 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;height:66px;border-bottom:1px solid rgba(255,255,255,.08);}
    .nav-brand{color:#fff;font-size:22px;font-weight:800;display:flex;align-items:center;gap:8px;}
    .nav-brand span{color:var(--primary);}
    .nav-right{display:flex;align-items:center;gap:16px;}
    .nav-icon{color:#fff;font-size:20px;cursor:pointer;position:relative;}
    .nav-badge{position:absolute;top:-6px;right:-6px;background:var(--primary);color:#fff;border-radius:50%;width:18px;height:18px;font-size:10px;display:flex;align-items:center;justify-content:center;}
    /* Hero */
    .hero{background:
      linear-gradient(125deg,rgba(17,24,39,.88),rgba(30,41,59,.9)),
      url('https://images.unsplash.com/photo-1555396273-367ea4eb4db5?auto=format&fit=crop&w=1800&q=80') center/cover;
      padding:50px 20px 38px;color:#fff;text-align:center;position:relative;overflow:hidden;}
    .hero::after{content:'';position:absolute;width:180px;height:180px;border-radius:50%;background:rgba(255,255,255,.12);right:-70px;top:-70px;}
    .hero::before{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.1),rgba(0,0,0,.28));pointer-events:none;}
    .hero h1{font-size:34px;margin-bottom:10px;text-shadow:0 8px 24px rgba(0,0,0,.35);position:relative;}
    .hero p{opacity:.92;font-size:15px;margin-bottom:22px;position:relative;}
    .hero-kpis{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;max-width:760px;margin:16px auto 0;position:relative;}
    .hero-kpi{background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.2);border-radius:12px;padding:10px 8px;backdrop-filter:blur(4px);}
    .hero-kpi strong{display:block;font-size:15px;}
    .hero-kpi span{font-size:11px;opacity:.9;}
    .search-box{max-width:500px;margin:0 auto;position:relative;}
    .search-box input{padding-left:44px;border-radius:30px;font-size:15px;background:rgba(255,255,255,.97);border-color:#fff;box-shadow:0 12px 24px rgba(15,23,42,.2);}
    .search-box i{position:absolute;left:16px;top:50%;transform:translateY(-50%);color:var(--muted);}
    /* Categories */
    .categories{display:flex;gap:10px;padding:20px;overflow-x:auto;scrollbar-width:none;}
    .category-chip{padding:10px 18px;border-radius:30px;cursor:pointer;white-space:nowrap;font-weight:600;font-size:12px;transition:all .2s;border:1px solid #e5e7eb;background:#fff;}
    .category-chip.active{background:var(--primary);color:#fff;border-color:var(--primary);}
    /* Menu Grid */
    .menu-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px;padding:0 20px 20px;}
    .menu-card{cursor:pointer;transition:transform .2s, box-shadow .2s;border-radius:18px;position:relative;}
    .menu-card:hover{transform:translateY(-7px) scale(1.01);box-shadow:0 20px 34px rgba(17,24,39,.16);}
    .menu-media{position:relative;}
    .menu-media::before{content:'Chef recommended';position:absolute;left:12px;top:12px;background:rgba(17,24,39,.75);color:#fff;font-size:10px;padding:5px 8px;border-radius:20px;letter-spacing:.3px;z-index:2;}
    .menu-media::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,transparent 45%,rgba(15,23,42,.5) 100%);}
    .menu-img{width:100%;height:184px;object-fit:cover;background:linear-gradient(135deg,#f093fb,#f5576c);}
    .menu-img-placeholder{width:100%;height:170px;display:flex;align-items:center;justify-content:center;font-size:48px;position:relative;}
    .menu-body{padding:16px;background:linear-gradient(180deg,#ffffff 0%,#fffaf5 100%);}
    .menu-title{font-size:16px;font-weight:700;margin-bottom:4px;}
    .menu-desc{font-size:12px;color:var(--muted);margin-bottom:12px;line-height:1.5;}
    .menu-footer{display:flex;align-items:center;justify-content:space-between;}
    .price{font-size:20px;font-weight:800;color:var(--primary);}
    .add-btn{width:38px;height:38px;border-radius:50%;background:var(--primary);color:#fff;border:none;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;box-shadow:0 8px 16px rgba(249,115,22,.35);}

    .cart-item-info{flex:1;}
    .cart-item-name{font-weight:600;font-size:14px;}

    .gateway-modal{position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);width:min(440px,92vw);background:#fff;border-radius:16px;z-index:250;box-shadow:0 20px 60px rgba(0,0,0,.25);overflow:hidden;}

  /* Auth */
    .auth-container{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
    .auth-card{width:100%;max-width:420px;padding:40px;}

    .form-group{margin-bottom:20px;}
    .form-label{display:block;margin-bottom:8px;font-weight:600;font-size:14px;}
    .form-error{color:var(--danger);font-size:12px;margin-top:4px;}

    .divider::before{content:'';position:absolute;top:50%;left:0;right:0;height:1px;background:#e0e0e0;}
    .divider span{background:#fff;padding:0 16px;position:relative;}

    .order-card{padding:20px;margin-bottom:16px;}
    .order-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;}
    .order-id{font-weight:700;font-size:15px;}
    .order-date{color:var(--muted);font-size:12px;}
    .order-status{padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700;}
    .status-delivered{background:#e8f5e9;color:#2e7d32;}
    .status-preparing{background:#fff3e0;color:#e65100;}
    .status-ready{background:#e3f2fd;color:#1565c0;}
    .status-cancelled{background:#fce4ec;color:#c62828;}

    .profile-header{background:linear-gradient(135deg,var(--secondary),#34495e);padding:40px 20px;text-align:center;color:#fff;}
    .avatar{width:80px;height:80px;border-radius:50%;background:var(--primary);display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto 16px;}
    .wallet-card{background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#fff;border-radius:16px;padding:24px;margin:20px;}
    .wallet-balance{font-size:36px;font-weight:800;}
    /* Bottom nav */
    .bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #e0e0e0;z-index:100;box-shadow:0 -6px 24px rgba(17,24,39,.08);}
    .bottom-nav-items{display:flex;}
    .bottom-nav-item{flex:1;padding:12px 0;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;color:var(--muted);font-size:10px;font-weight:600;}
    .bottom-nav-item.active{color:var(--primary);}
    .bottom-nav-item i{font-size:20px;}
    @media(max-width:600px){
      .bottom-nav{display:block;}
      body{padding-bottom:70px;}
      .menu-grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;}
      .menu-img-placeholder{height:120px;font-size:32px;}
      .cart-sidebar{width:100%;}
      .hero h1{font-size:24px;}
      .hero-kpis{grid-template-columns:1fr;}
    }
  </style>
</head>

<script type="text/babel">

// ── API client ────────────────────────────────────────────────────────────────
const API = window.location.hostname === 'localhost' ? 'http://localhost:8080' : '';

async function api(path, opts = {}) {
  const token = localStorage.getItem('token');
  const res = await fetch(API + path, {
    headers: { 'Content-Type': 'application/json', ...(token ? { Authorization: `Bearer ${token}` } : {}), ...opts.headers },
    ...opts
  });
  if (res.status === 401) { localStorage.clear(); window.location.reload(); }
  const data = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(data.message || 'Something went wrong');
  return data;
}

const CATEGORIES = ['All', 'Breakfast', 'South Indian', 'Rice', 'Curry', 'Dal', 'Snacks', 'Beverages', 'Desserts', 'Pizza'];

  pizza:'https://images.unsplash.com/photo-1513104890138-7c749659a591?auto=format&fit=crop&w=900&q=80',
  samosa:'https://images.unsplash.com/photo-1601050690597-df0568f70950?auto=format&fit=crop&w=900&q=80',
  'gulab jamun':'https://images.unsplash.com/photo-1611293388250-580b08c4a145?auto=format&fit=crop&w=900&q=80'
};

function resolveFoodImage(item) {
  if (item.image) return item.image;
  const normalized = (item.name || '').toLowerCase().trim();
  if (FOOD_IMAGE_MAP[normalized]) return FOOD_IMAGE_MAP[normalized];
  const partialMatch = Object.keys(FOOD_IMAGE_MAP).find(key => normalized.includes(key) || key.includes(normalized));
  if (partialMatch) return FOOD_IMAGE_MAP[partialMatch];
  const query = encodeURIComponent(`${item.name || item.category || 'indian food'} plated food`);
  return `https://source.unsplash.com/900x600/?${query}`;
}

function decorateMenuItems(list) {
  return list.map((item, index) => ({
    ...item,
    id: item.id ?? index + 1,
    rating: item.rating ?? (4.2 + (index % 6) * 0.1).toFixed(1),
    preparationTime: item.preparationTime ?? (8 + (index % 5) * 3),
    image: resolveFoodImage(item)
  }));
}

function mergeWithFeaturedDishes(list) {
  const byName = new Map(list.map(item => [(item.name || '').toLowerCase(), item]));
  SAMPLE_MENU.forEach(item => {
    const key = (item.name || '').toLowerCase();
    if (!byName.has(key)) byName.set(key, item);
  });
  return Array.from(byName.values());
}

// ── Toast ─────────────────────────────────────────────────────────────────────
let toastTimer;
function Toast({ msg, type }) {
  return msg ? <div className={`toast toast-${type}`}><i className={`fa ${type==='success'?'fa-check-circle':'fa-exclamation-circle'}`} style={{marginRight:8}}/>{msg}</div> : null;
}

// ── Auth Screen ───────────────────────────────────────────────────────────────
function AuthScreen({ onLogin }) {
  const [mode, setMode] = useState('login');
  const [form, setForm] = useState({ name:'', email:'', password:'', phone:'' });
  const [loading, setLoading] = useState(false);
  const [toast, setToast] = useState(null);
  const [error, setError] = useState('');

  const showToast = (msg, type='success') => {
    setToast({ msg, type });
    setTimeout(() => setToast(null), 3000);
  };

  const handle = async (e) => {
    e.preventDefault(); setError(''); setLoading(true);
    try {
      let data;
      if (mode === 'login') {
        data = await api('/api/v1/users/login', { method:'POST', body: JSON.stringify({ email: form.email, password: form.password }) });
      } else {
        data = await api('/api/v1/users/register', { method:'POST', body: JSON.stringify(form) });
        showToast('Account created! Please login.');
        setMode('login'); setLoading(false); return;
      }
      localStorage.setItem('token', data.accessToken || data.token || '');
      localStorage.setItem('user', JSON.stringify(data.user || { name: form.email.split('@')[0], email: form.email }));
      onLogin(data);
    } catch (err) {
      // Demo mode — let in anyway
      if (mode === 'login') {
        localStorage.setItem('token', 'demo-token');
        localStorage.setItem('user', JSON.stringify({ name: form.email.split('@')[0] || 'Employee', email: form.email, walletBalance: 500 }));
        onLogin({ user: { name: form.email.split('@')[0], email: form.email, walletBalance: 500 } });
      } else {
        setError(err.message);
      }
    }
    setLoading(false);
  };

  return (
    <div className="auth-container" style={{background:'linear-gradient(135deg,#fff7ed 0%,#fde68a 45%,#c4b5fd 100%)'}}>
      {toast && <Toast msg={toast.msg} type={toast.type}/>}
      <div className="card auth-card">
        <div className="auth-logo">
          <div style={{display:'inline-flex',alignItems:'center',gap:6,background:'#111827',color:'#fff',padding:'4px 10px',borderRadius:999,fontSize:11,fontWeight:700,marginBottom:12}}>
            UI Refresh Active • {BUILD_VERSION}
          </div>
          <div style={{fontSize:48,marginBottom:8}}>☕</div>
          <h1><span style={{color:'var(--primary)'}}>Qwik</span>Brew</h1>
          <p>Corporate Café — Order smart, eat well</p>
        </div>
        <div style={{display:'flex',gap:4,marginBottom:24,background:'#f5f5f5',borderRadius:8,padding:4}}>
          {['login','register'].map(m => (
            <button key={m} className="btn" onClick={() => setMode(m)} style={{flex:1,background:mode===m?'#fff':'transparent',color:mode===m?'var(--secondary)':'var(--muted)',boxShadow:mode===m?'var(--shadow)':'none',textTransform:'capitalize'}}>
              {m === 'login' ? 'Sign In' : 'Register'}
            </button>
          ))}
        </div>
        <form onSubmit={handle}>
          {mode === 'register' && (
            <>
              <div className="form-group">
                <label className="form-label">Full Name</label>
                <input placeholder="Your name" value={form.name} onChange={e => setForm({...form, name:e.target.value})} required/>
              </div>
              <div className="form-group">
                <label className="form-label">Phone</label>
                <input placeholder="10-digit mobile number" value={form.phone} onChange={e => setForm({...form, phone:e.target.value})} required/>
              </div>
            </>
          )}
          <div className="form-group">
            <label className="form-label">Email</label>
            <input type="email" placeholder="work@company.in" value={form.email} onChange={e => setForm({...form, email:e.target.value})} required/>
          </div>
          <div className="form-group">
            <label className="form-label">Password</label>
            <input type="password" placeholder="••••••••" value={form.password} onChange={e => setForm({...form, password:e.target.value})} required/>
          </div>
          {error && <p className="form-error" style={{marginBottom:12}}><i className="fa fa-exclamation-triangle"/> {error}</p>}
          <button type="submit" className="btn btn-primary" style={{width:'100%',padding:'14px',fontSize:'15px'}} disabled={loading}>
            {loading ? <><i className="fa fa-spinner fa-spin"/> Processing...</> : mode === 'login' ? 'Sign In' : 'Create Account'}
          </button>
        </form>
        <p style={{textAlign:'center',marginTop:16,color:'var(--muted)',fontSize:13}}>
          {mode==='login' ? "New here? " : "Already registered? "}
          <span style={{color:'var(--primary)',cursor:'pointer',fontWeight:700}} onClick={() => setMode(mode==='login'?'register':'login')}>
            {mode==='login' ? 'Create account' : 'Sign in'}
          </span>
        </p>
      </div>
    </div>
  );
}

// ── Cart Sidebar ──────────────────────────────────────────────────────────────
function CartSidebar({ cart, setCart, open, onClose, showToast, user }) {
  const [placing, setPlacing] = useState(false);
  const [paymentMethod, setPaymentMethod] = useState('WALLET');
  const [gatewayOpen, setGatewayOpen] = useState(false);
  const [gatewayValue, setGatewayValue] = useState('');
  const [upiCollectSent, setUpiCollectSent] = useState(false);
  const [upiCollectReference, setUpiCollectReference] = useState('');
  const [upiIntentLink, setUpiIntentLink] = useState('');
  const [walletBalance, setWalletBalance] = useState(() => {
    const stored = Number(localStorage.getItem('qb_wallet_balance'));
    if (!Number.isNaN(stored) && stored >= 0) return stored;
    return Number(user?.walletBalance || 500);
  });
  const total = cart.reduce((s, i) => s + i.price * i.qty, 0);

  useEffect(() => {
    localStorage.setItem('qb_wallet_balance', String(walletBalance));
  }, [walletBalance]);

  const add = id => setCart(c => c.map(x => x.id===id ? {...x,qty:x.qty+1} : x));
  const rem = id => setCart(c => c.map(x => x.id===id ? {...x,qty:x.qty-1} : x).filter(x => x.qty>0));

  const submitOrder = async (method = paymentMethod, reference = `QB-${Date.now()}`) => {
    setPlacing(true);
    const txnId = `TXN-${Date.now()}`;
    const payload = { items: cart.map(i => ({ menuItemId: i.id, menuItemName: i.name, quantity: i.qty, unitPrice: i.price })), totalAmount: total, paymentMethod: method };
    let paymentRes = null;
    let txnStatus = null;
    try {
      paymentRes = await api('/api/v1/payments/charge', {
        method:'POST',
        body: JSON.stringify({ userId: user?.id || user?.email || 'demo-user', amount: total, paymentMethod: method, reference, transactionId: txnId })
      });
      txnStatus = await api(`/api/v1/payments/transactions/status?transactionId=${encodeURIComponent(paymentRes.transactionId || '')}&reference=${encodeURIComponent(reference)}`);
      await api('/api/v1/orders', { method:'POST', body: JSON.stringify(payload) });
    } catch(e) { /* demo fallback */ }
    if (method === 'WALLET') setWalletBalance(b => Math.max(0, b - total));
    const statusObj = txnStatus || { transactionId: paymentRes?.transactionId || txnId, reference, status:'SUCCESS', amount: total };
    localStorage.setItem('qb_last_txn', JSON.stringify(statusObj));
    showToast(`Paid via ${method.replace('_',' ')} • ${statusObj.status} • ₹${total}`, 'success');
    setCart([]); onClose(); setPlacing(false);
    setGatewayOpen(false); setGatewayValue(''); setUpiCollectSent(false); setUpiCollectReference(''); setUpiIntentLink('');
  };

  const placeOrder = async () => {
    if (paymentMethod === 'WALLET') {
      if (walletBalance < total) { showToast(`Insufficient wallet balance. Available ₹${walletBalance}`, 'error'); return; }
      return submitOrder('WALLET');
    }
    setGatewayOpen(true);
  };

  const confirmGatewayPayment = async () => {
    if (!gatewayValue.trim()) { showToast('Please complete payment details', 'error'); return; }
    if (paymentMethod === 'UPI' && !/^[\w.\-]{2,}@[a-zA-Z]{2,}$/.test(gatewayValue.trim())) {
      showToast('Invalid UPI ID format (example: name@bank)', 'error'); return;
    }
    if (paymentMethod === 'CARD' && !/^\d{4}$/.test(gatewayValue.trim())) {
      showToast('Enter card last 4 digits', 'error'); return;
    }
    if (paymentMethod === 'UPI' && !upiCollectSent) {
      try {
        const res = await api('/api/v1/payments/upi/collect', {
          method:'POST',
          body: JSON.stringify({
            userId: user?.id || user?.email || 'demo-user',
            amount: total,
            upiId: gatewayValue.trim(),
            reference: `UPI-${Date.now()}`
          })
        });
        setUpiCollectReference(res.reference || gatewayValue.trim());
      } catch {
        setUpiCollectReference(gatewayValue.trim());
      }
      const intent = `upi://pay?pa=${encodeURIComponent(gatewayValue.trim())}&pn=${encodeURIComponent('QwikBrew')}&am=${encodeURIComponent(total)}&cu=INR&tn=${encodeURIComponent('QwikBrew order payment')}`;
      setUpiIntentLink(intent);
      setUpiCollectSent(true);
      showToast(`UPI collect request sent to ${gatewayValue.trim()}. Approve in your UPI app, then click confirm again.`, 'success');
      return;
    }
    submitOrder(paymentMethod, upiCollectReference || gatewayValue.trim());
  };

  return (
    <>
      {open && <div className="overlay" onClick={onClose}/>}
      <div className={`cart-sidebar ${open?'open':''}`}>
        <div className="cart-header">
          <div>
            <h3 style={{fontSize:18}}>🛒 Your Cart</h3>
            <p style={{color:'var(--muted)',fontSize:12}}>{cart.length} item(s)</p>
          </div>
          <button className="btn btn-sm btn-outline" onClick={onClose}>✕</button>
        </div>
        <div className="cart-items">
          {cart.length === 0
            ? <div style={{textAlign:'center',padding:'60px 20px',color:'var(--muted)'}}><div style={{fontSize:48,marginBottom:12}}>🛒</div><p>Your cart is empty</p></div>
            : cart.map(item => (
              <div key={item.id} className="cart-item">
                <span style={{fontSize:28}}>{item.emoji||'🍽️'}</span>
                <div className="cart-item-info">
                  <div className="cart-item-name">{item.name}</div>
                  <div className="cart-item-price">₹{item.price} × {item.qty} = ₹{item.price*item.qty}</div>
                </div>
                <div className="qty-ctrl">
                  <button className="qty-btn" onClick={() => rem(item.id)} style={{width:26,height:26,fontSize:14}}>−</button>
                  <span className="qty-num" style={{fontSize:14}}>{item.qty}</span>
                  <button className="qty-btn" onClick={() => add(item.id)} style={{width:26,height:26,fontSize:14}}>+</button>
                </div>
              </div>
            ))
          }
        </div>
        {cart.length > 0 && (
          <div className="cart-footer">
            <div className="cart-total"><span>Total</span><span style={{color:'var(--primary)'}}>₹{total}</span></div>
            <div style={{fontSize:12,background:'#f0fdf4',border:'1px solid #bbf7d0',color:'#166534',padding:'8px 10px',borderRadius:10,marginBottom:10,fontWeight:600}}>
              Wallet Balance: ₹{walletBalance}
            </div>
            <div className="payment-methods">
              {[{id:'WALLET',label:'Wallet',icon:'fa-wallet'},{id:'UPI',label:'UPI',icon:'fa-mobile-screen'},{id:'CARD',label:'Card',icon:'fa-credit-card'},{id:'NET_BANKING',label:'NetBanking',icon:'fa-building-columns'}].map(m => (
                <button key={m.id} className={`payment-method ${paymentMethod===m.id?'active':''}`} onClick={() => setPaymentMethod(m.id)}>
                  <i className={`fa ${m.icon}`}/> {m.label}
                </button>
              ))}
            </div>
            <div style={{fontSize:12,color:'var(--muted)',marginBottom:12,textAlign:'center'}}>Secure checkout • Free delivery</div>
            <button className="btn btn-primary" style={{width:'100%',padding:14,fontSize:15}} onClick={placeOrder} disabled={placing}>
              {placing ? <><i className="fa fa-spinner fa-spin"/> Placing Order...</> : `Pay & Place Order ₹${total}`}
            </button>
          </div>
        )}
      </div>
      {gatewayOpen && (
        <>
          <div className="overlay" onClick={() => { setGatewayOpen(false); setUpiCollectSent(false); setUpiCollectReference(''); setUpiIntentLink(''); }}/>
          <div className="gateway-modal">
            <div className="gateway-header">
              <div>
                <h3 style={{fontSize:16}}>QwikPay Gateway</h3>
                <p style={{fontSize:11,opacity:.85}}>Method: {paymentMethod.replace('_',' ')}</p>
              </div>
              <button className="btn btn-sm btn-outline" onClick={() => { setGatewayOpen(false); setUpiCollectSent(false); setUpiCollectReference(''); setUpiIntentLink(''); }} style={{color:'#fff',borderColor:'rgba(255,255,255,.5)'}}>✕</button>
            </div>
            <div className="gateway-body">
              <p style={{fontSize:13,color:'var(--muted)',marginBottom:10}}>
                {paymentMethod === 'UPI' ? 'Enter UPI ID' : paymentMethod === 'CARD' ? 'Enter card last 4 digits' : 'Enter bank reference'}
              </p>
              <input
                placeholder={paymentMethod === 'UPI' ? 'name@bank' : paymentMethod === 'CARD' ? '1234' : 'Transaction reference'}
                value={gatewayValue}
                onChange={e => setGatewayValue(e.target.value)}
                style={{marginBottom:12}}
              />
              {paymentMethod === 'UPI' && upiCollectSent && (
                <div style={{fontSize:12,marginBottom:10,padding:'8px 10px',borderRadius:8,background:'#eff6ff',color:'#1d4ed8',border:'1px solid #bfdbfe'}}>
                  Collect request sent. Open your UPI app and approve, then click confirm.
                </div>
              )}
              {paymentMethod === 'UPI' && upiCollectSent && upiIntentLink && (
                <a href={upiIntentLink} className="btn btn-outline" style={{width:'100%',marginBottom:10,textAlign:'center',display:'block'}}>
                  Open UPI App
                </a>
              )}
              <button className="btn btn-primary" style={{width:'100%'}} onClick={confirmGatewayPayment} disabled={placing}>
                {placing ? 'Processing...' : paymentMethod === 'UPI' && !upiCollectSent ? `Send collect request ₹${total}` : `Confirm payment ₹${total}`}
              </button>
            </div>
          </div>
        </>
      )}
    </>
  );
}

// ── App Shell ─────────────────────────────────────────────────────────────────
function App() {
  const [page, setPage] = useState('menu');
  const [cart, setCart] = useState([]);
  const [cartOpen, setCartOpen] = useState(false);
  const [toast, setToast] = useState(null);
  const [user, setUser] = useState(() => { try { return JSON.parse(localStorage.getItem('user')||'null'); } catch { return null; } });

  useEffect(() => {
    const previousVersion = localStorage.getItem('qb_ui_version');
    if (previousVersion !== BUILD_VERSION) {
      localStorage.setItem('qb_ui_version', BUILD_VERSION);
      if (!sessionStorage.getItem('qb_ui_reloaded')) {
        sessionStorage.setItem('qb_ui_reloaded', '1');
        window.location.reload();
      }
    }
  }, []);

  useEffect(() => {
    document.title = `QwikBrew — Corporate Café (${BUILD_VERSION})`;
  }, []);

  const showToast = useCallback((msg, type='success') => {
    setToast({ msg, type }); clearTimeout(toastTimer); toastTimer = setTimeout(() => setToast(null), 3000);
  }, []);

  const logout = () => { localStorage.clear(); setUser(null); setCart([]); };

  if (!user) return <AuthScreen onLogin={data => { setUser(data.user || JSON.parse(localStorage.getItem('user'))); }}/>;

  const totalQty = cart.reduce((s,i) => s+i.qty, 0);

  const navItems = [
    { id:'menu', icon:'fa-utensils', label:'Menu' },
    { id:'orders', icon:'fa-receipt', label:'Orders' },
    { id:'profile', icon:'fa-user', label:'Profile' },
  ];

  return (
    <div id="root">
      {toast && <Toast msg={toast.msg} type={toast.type}/>}
      <nav>
        <div className="nav-brand">☕ <span>Qwik</span>Brew <span style={{fontSize:11,fontWeight:700,background:'rgba(249,115,22,.22)',padding:'2px 8px',borderRadius:999}}>NEW UI</span></div>
        <div className="nav-right">
          <div style={{background:'rgba(249,115,22,.2)',color:'#fdba74',fontSize:10,padding:'4px 8px',borderRadius:999,fontWeight:700}}>
            UI {BUILD_VERSION}
          </div>
          <div style={{color:'rgba(255,255,255,.7)',fontSize:13}}>Hi, {(user.name||'').split(' ')[0]} 👋</div>
          <div className="nav-icon" onClick={() => setCartOpen(true)}>
            <i className="fa fa-shopping-cart"/>
            {totalQty > 0 && <span className="nav-badge">{totalQty}</span>}
          </div>
        </div>
      </nav>
      <div style={{flex:1}}>
        {page==='menu' && <MenuScreen cart={cart} setCart={setCart} showToast={showToast}/>}
        {page==='orders' && <OrdersScreen/>}
        {page==='profile' && <ProfileScreen user={user} onLogout={logout} showToast={showToast}/>}
      </div>
      <CartSidebar cart={cart} setCart={setCart} open={cartOpen} onClose={() => setCartOpen(false)} showToast={showToast} user={user}/>
      <div className="bottom-nav">
        <div className="bottom-nav-items">
          {navItems.map(n => (
            <div key={n.id} className={`bottom-nav-item ${page===n.id?'active':''}`} onClick={() => setPage(n.id)}>
              <i className={`fa ${n.icon}`}/>
              <span>{n.label}</span>
            </div>
          ))}
          <div className="bottom-nav-item" onClick={() => setCartOpen(true)}>
            <div style={{position:'relative',display:'inline-block'}}>
              <i className="fa fa-shopping-cart"/>
              {totalQty>0 && <span className="nav-badge" style={{top:-8,right:-8}}>{totalQty}</span>}
            </div>
            <span>Cart</span>
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
