<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
  <title>QwikBrew — Corporate Café</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.4/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}

    :root{
      --brand:#f97316;--brand-dark:#c2410c;--brand-glow:rgba(249,115,22,.25);
      --bg:#fafaf8;--surface:#ffffff;--text:#111;--muted:#777;--border:#eee;
      --radius:18px;--radius-sm:10px;
      --ease-spring:cubic-bezier(.34,1.56,.64,1);
      --ease-smooth:cubic-bezier(.25,.46,.45,.94);
    }

    html{scroll-behavior:smooth;}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden;}
    #root{min-height:100vh;display:flex;flex-direction:column;}

    /* ── Particles canvas ── */
    #particles{position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.45;}

    /* ── Global fade-in ── */
    @keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:none}}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    @keyframes scaleIn{from{opacity:0;transform:scale(.88)}to{opacity:1;transform:scale(1)}}
    @keyframes slideRight{from{opacity:0;transform:translateX(-28px)}to{opacity:1;transform:none}}
    @keyframes slideLeft{from{opacity:0;transform:translateX(28px)}to{opacity:1;transform:none}}
    @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes shimmer{0%{background-position:-600px 0}100%{background-position:600px 0}}
    @keyframes floatBob{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
    @keyframes ripple{0%{transform:scale(0);opacity:.6}100%{transform:scale(4);opacity:0}}
    @keyframes toastSlide{from{opacity:0;transform:translateX(120%)}to{opacity:1;transform:none}}
    @keyframes badgePop{0%{transform:scale(0)}70%{transform:scale(1.25)}100%{transform:scale(1)}}
    @keyframes gradientShift{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
    @keyframes orbit{from{transform:rotate(0deg) translateX(40px) rotate(0deg)}to{transform:rotate(360deg) translateX(40px) rotate(-360deg)}}

    .animate-fadeUp{animation:fadeUp .6s var(--ease-smooth) both}
    .animate-scaleIn{animation:scaleIn .5s var(--ease-spring) both}
    .animate-slideRight{animation:slideRight .5s var(--ease-smooth) both}
    .animate-slideLeft{animation:slideLeft .5s var(--ease-smooth) both}

    /* ── Nav ── */
    nav{
      position:sticky;top:0;z-index:200;
      background:rgba(17,17,17,.92);
      backdrop-filter:blur(18px);
      border-bottom:1px solid rgba(255,255,255,.07);
      padding:0 24px;height:64px;
      display:flex;align-items:center;justify-content:space-between;
      animation:fadeIn .5s ease both;
    }
    .nav-brand{
      display:flex;align-items:center;gap:10px;
      font-family:'DM Serif Display',serif;font-size:22px;color:#fff;
    }
    .nav-brand .cup{
      width:36px;height:36px;background:var(--brand);border-radius:10px;
      display:flex;align-items:center;justify-content:center;font-size:18px;
      animation:floatBob 3s ease-in-out infinite;
    }
    .nav-pill{
      background:rgba(249,115,22,.18);border:1px solid rgba(249,115,22,.35);
      color:#fb923c;font-size:10px;font-weight:600;letter-spacing:.5px;
      padding:3px 9px;border-radius:999px;
    }
    .nav-right{display:flex;align-items:center;gap:16px;}
    .nav-greeting{color:rgba(255,255,255,.6);font-size:13px;}
    .cart-btn{
      position:relative;width:42px;height:42px;border-radius:12px;
      background:rgba(249,115,22,.15);border:1px solid rgba(249,115,22,.3);
      color:#fb923c;cursor:pointer;display:flex;align-items:center;justify-content:center;
      font-size:18px;transition:all .2s var(--ease-spring);
      overflow:visible;
    }
    .cart-btn:hover{background:rgba(249,115,22,.28);transform:scale(1.08);}
    .cart-btn:active{transform:scale(.96);}
    .cart-badge{
      position:absolute;top:-6px;right:-6px;
      background:var(--brand);color:#fff;
      border-radius:50%;width:20px;height:20px;
      font-size:11px;font-weight:700;
      display:flex;align-items:center;justify-content:center;
      border:2px solid #111;
      animation:badgePop .4s var(--ease-spring) both;
    }

    /* ── Hero ── */
    .hero{
      position:relative;z-index:1;
      background:linear-gradient(-45deg,#111,#1f1f1f,#1a0f05,#111);
      background-size:400% 400%;
      animation:gradientShift 10s ease infinite;
      padding:52px 24px 44px;color:#fff;overflow:hidden;
    }
    .hero-orbs{position:absolute;inset:0;pointer-events:none;}
    .orb{
      position:absolute;border-radius:50%;filter:blur(70px);opacity:.25;
    }
    .orb1{width:320px;height:320px;background:var(--brand);top:-80px;right:-60px;animation:floatBob 6s ease-in-out infinite;}
    .orb2{width:200px;height:200px;background:#7c3aed;bottom:-40px;left:10%;animation:floatBob 8s ease-in-out infinite reverse;}
    .hero-content{position:relative;z-index:2;max-width:700px;margin:0 auto;text-align:center;}
    .hero-badge{
      display:inline-flex;align-items:center;gap:6px;
      background:rgba(249,115,22,.15);border:1px solid rgba(249,115,22,.35);
      color:#fb923c;font-size:12px;font-weight:600;padding:5px 14px;border-radius:999px;
      margin-bottom:18px;animation:fadeUp .6s ease both;
    }
    .hero-badge-dot{
      width:7px;height:7px;background:#fb923c;border-radius:50%;
      animation:pulse 1.4s ease-in-out infinite;
    }
    .hero h1{
      font-family:'DM Serif Display',serif;font-size:clamp(28px,5vw,48px);
      line-height:1.15;margin-bottom:12px;
      animation:fadeUp .6s .1s ease both;
    }
    .hero h1 em{color:var(--brand);font-style:italic;}
    .hero p{color:rgba(255,255,255,.7);font-size:15px;margin-bottom:28px;animation:fadeUp .6s .2s ease both;}

    .search-wrap{
      max-width:480px;margin:0 auto;position:relative;
      animation:fadeUp .6s .3s ease both;
    }
    .search-wrap input{
      width:100%;padding:14px 20px 14px 48px;
      border-radius:999px;border:none;
      background:rgba(255,255,255,.97);
      font-size:15px;font-family:'DM Sans',sans-serif;
      box-shadow:0 8px 32px rgba(0,0,0,.25),0 0 0 2px transparent;
      transition:box-shadow .25s;outline:none;
    }
    .search-wrap input:focus{box-shadow:0 8px 32px rgba(249,115,22,.3),0 0 0 2px var(--brand);}
    .search-icon{
      position:absolute;left:18px;top:50%;transform:translateY(-50%);
      color:#999;font-size:16px;
    }

    .hero-stats{
      display:grid;grid-template-columns:repeat(3,1fr);gap:12px;
      max-width:520px;margin:24px auto 0;
      animation:fadeUp .6s .4s ease both;
    }
    .stat-card{
      background:rgba(255,255,255,.07);
      border:1px solid rgba(255,255,255,.12);
      border-radius:14px;padding:12px 8px;
      backdrop-filter:blur(6px);
      transition:transform .2s var(--ease-spring),background .2s;
    }
    .stat-card:hover{transform:translateY(-3px);background:rgba(255,255,255,.12);}
    .stat-num{font-size:18px;font-weight:700;color:#fff;}
    .stat-label{font-size:11px;color:rgba(255,255,255,.55);margin-top:2px;}

    /* ── Categories ── */
    .cats-wrap{
      padding:20px 20px 8px;display:flex;gap:10px;
      overflow-x:auto;scrollbar-width:none;
      background:var(--bg);position:sticky;top:64px;z-index:100;
      border-bottom:1px solid var(--border);
    }
    .cats-wrap::-webkit-scrollbar{display:none;}
    .cat-chip{
      padding:8px 18px;border-radius:999px;
      font-size:12px;font-weight:600;white-space:nowrap;
      cursor:pointer;border:1.5px solid var(--border);
      background:var(--surface);color:var(--muted);
      transition:all .22s var(--ease-spring);
      user-select:none;position:relative;overflow:hidden;
    }
    .cat-chip::after{
      content:'';position:absolute;inset:0;background:var(--brand);
      transform:scaleX(0);transform-origin:left;
      transition:transform .22s var(--ease-smooth);
      border-radius:inherit;z-index:-1;
    }
    .cat-chip.active{color:#fff;border-color:var(--brand);background:var(--brand);}
    .cat-chip:not(.active):hover{border-color:var(--brand);color:var(--brand);transform:translateY(-2px);}

    /* ── Menu grid ── */
    .menu-section{padding:20px 20px 120px;position:relative;z-index:1;}
    .section-header{
      display:flex;align-items:center;justify-content:space-between;
      margin-bottom:16px;animation:fadeUp .5s ease both;
    }
    .section-title{font-size:13px;color:var(--muted);font-weight:500;}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:18px;}

    /* ── Menu card ── */
    .mcard{
      background:var(--surface);border-radius:var(--radius);
      border:1px solid var(--border);overflow:hidden;
      cursor:pointer;transition:transform .25s var(--ease-spring),box-shadow .25s;
      animation:fadeUp .5s ease both;
      position:relative;
    }
    .mcard:hover{transform:translateY(-6px) scale(1.01);box-shadow:0 16px 40px rgba(0,0,0,.1);}
    .mcard:hover .card-img{transform:scale(1.06);}
    .mcard-img-wrap{overflow:hidden;height:170px;position:relative;}
    .card-img{
      width:100%;height:100%;object-fit:cover;
      transition:transform .4s var(--ease-smooth);
    }
    .card-img-placeholder{
      width:100%;height:100%;display:flex;align-items:center;justify-content:center;
      font-size:44px;background:linear-gradient(135deg,#f5f5f0,#eee);
      transition:transform .4s var(--ease-smooth);
    }
    .card-ribbon{
      position:absolute;top:10px;left:10px;z-index:2;
      display:flex;gap:6px;
    }
    .ribbon-tag{
      font-size:10px;font-weight:700;padding:4px 9px;border-radius:999px;
      backdrop-filter:blur(8px);letter-spacing:.3px;
    }
    .veg-tag{background:rgba(21,128,61,.85);color:#fff;}
    .nonveg-tag{background:rgba(185,28,28,.85);color:#fff;}
    .featured-tag{background:rgba(249,115,22,.9);color:#fff;}

    .mcard-body{padding:14px 16px 16px;}
    .mcard-meta{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
    .rating{font-size:12px;color:#f59e0b;font-weight:600;}
    .prep-time{font-size:11px;color:var(--muted);}
    .mcard-name{font-size:15px;font-weight:700;margin-bottom:4px;line-height:1.3;}
    .mcard-desc{font-size:12px;color:var(--muted);margin-bottom:12px;line-height:1.5;}
    .mcard-footer{display:flex;align-items:center;justify-content:space-between;}
    .price{font-size:21px;font-weight:800;color:var(--text);}
    .price span{font-size:13px;color:var(--brand);font-weight:600;}

    .add-btn{
      width:38px;height:38px;border-radius:50%;
      background:var(--brand);color:#fff;border:none;
      cursor:pointer;font-size:22px;line-height:1;
      display:flex;align-items:center;justify-content:center;
      transition:all .22s var(--ease-spring);
      box-shadow:0 6px 16px var(--brand-glow);
      position:relative;overflow:hidden;
    }
    .add-btn::before{
      content:'';position:absolute;inset:0;background:rgba(255,255,255,.3);
      border-radius:50%;transform:scale(0);
    }
    .add-btn:hover{transform:scale(1.14);box-shadow:0 8px 22px var(--brand-glow);}
    .add-btn:active{transform:scale(.92);}
    .add-btn:active::before{animation:ripple .4s ease-out;}

    .qty-ctrl{display:flex;align-items:center;gap:10px;}
    .qty-btn{
      width:32px;height:32px;border-radius:50%;
      background:var(--brand);color:#fff;border:none;
      cursor:pointer;font-size:18px;
      display:flex;align-items:center;justify-content:center;
      transition:all .2s var(--ease-spring);
      box-shadow:0 4px 10px var(--brand-glow);
    }
    .qty-btn:hover{transform:scale(1.12);}
    .qty-num{font-weight:800;font-size:15px;min-width:22px;text-align:center;}

    /* ── Spinner ── */
    .spinner-wrap{display:flex;align-items:center;justify-content:center;padding:80px 20px;}
    .spinner{
      width:44px;height:44px;border-radius:50%;
      border:3px solid var(--border);border-top-color:var(--brand);
      animation:spin .75s linear infinite;
    }

    /* ── Cart sidebar ── */
    .overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:300;backdrop-filter:blur(2px);animation:fadeIn .25s ease both;}
    .cart-sidebar{
      position:fixed;right:0;top:0;width:380px;height:100vh;
      background:var(--surface);z-index:400;
      display:flex;flex-direction:column;
      transform:translateX(100%);transition:transform .35s var(--ease-spring);
      border-left:1px solid var(--border);
    }
    .cart-sidebar.open{transform:translateX(0);}
    .cart-header{
      padding:20px 22px;border-bottom:1px solid var(--border);
      display:flex;align-items:center;justify-content:space-between;
    }
    .cart-title{font-family:'DM Serif Display',serif;font-size:20px;}
    .close-btn{
      width:36px;height:36px;border-radius:10px;border:1.5px solid var(--border);
      background:transparent;cursor:pointer;font-size:16px;
      display:flex;align-items:center;justify-content:center;
      transition:all .2s;
    }
    .close-btn:hover{background:var(--bg);border-color:var(--brand);color:var(--brand);}
    .cart-items{flex:1;overflow-y:auto;padding:16px 22px;}
    .cart-empty{text-align:center;padding:60px 20px;color:var(--muted);}
    .cart-empty-icon{font-size:56px;margin-bottom:14px;animation:floatBob 3s ease-in-out infinite;}
    .cart-item{
      display:flex;align-items:center;gap:12px;
      padding:12px 0;border-bottom:1px solid var(--border);
      animation:slideRight .35s ease both;
    }
    .cart-item-emoji{font-size:28px;flex-shrink:0;}
    .cart-item-info{flex:1;}
    .cart-item-name{font-weight:600;font-size:14px;}
    .cart-item-price{font-size:13px;color:var(--brand);font-weight:700;margin-top:2px;}
    .cart-footer{padding:18px 22px;border-top:1px solid var(--border);}
    .wallet-badge{
      background:#f0fdf4;border:1px solid #bbf7d0;
      color:#166534;font-size:12px;font-weight:600;
      padding:8px 12px;border-radius:10px;margin-bottom:12px;
    }
    .total-row{display:flex;justify-content:space-between;font-size:18px;font-weight:800;margin-bottom:14px;}
    .total-amount{color:var(--brand);}

    .pay-methods{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
    .pay-method{
      border:1.5px solid var(--border);border-radius:12px;
      padding:10px 8px;cursor:pointer;
      font-size:12px;font-weight:600;color:var(--muted);
      display:flex;align-items:center;justify-content:center;gap:6px;
      transition:all .2s var(--ease-spring);background:var(--surface);
    }
    .pay-method:hover{border-color:var(--brand);color:var(--brand);transform:translateY(-1px);}
    .pay-method.active{border-color:var(--brand);background:#fff7ed;color:var(--brand-dark);}
    .pay-method-icon{font-size:14px;}

    .place-btn{
      width:100%;padding:15px;border-radius:14px;
      background:linear-gradient(135deg,var(--brand),var(--brand-dark));
      color:#fff;border:none;cursor:pointer;
      font-size:15px;font-weight:700;font-family:'DM Sans',sans-serif;
      transition:all .22s var(--ease-spring);
      box-shadow:0 8px 24px var(--brand-glow);
      position:relative;overflow:hidden;
    }
    .place-btn::after{
      content:'';position:absolute;inset:0;
      background:linear-gradient(90deg,transparent,rgba(255,255,255,.15),transparent);
      transform:translateX(-100%);transition:transform .5s;
    }
    .place-btn:hover::after{transform:translateX(100%);}
    .place-btn:hover{transform:translateY(-2px);box-shadow:0 12px 28px var(--brand-glow);}
    .place-btn:active{transform:scale(.97);}
    .place-btn:disabled{opacity:.7;cursor:not-allowed;transform:none;}

    /* ── Gateway modal ── */
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:500;backdrop-filter:blur(3px);display:flex;align-items:center;justify-content:center;animation:fadeIn .2s ease both;}
    .modal{
      width:min(440px,92vw);background:var(--surface);
      border-radius:22px;overflow:hidden;
      animation:scaleIn .3s var(--ease-spring) both;
    }
    .modal-head{
      padding:18px 22px;
      background:linear-gradient(135deg,#111,#1f1f1f);
      color:#fff;display:flex;justify-content:space-between;align-items:center;
    }
    .modal-title{font-size:16px;font-weight:700;}
    .modal-sub{font-size:11px;opacity:.65;margin-top:2px;}
    .modal-body{padding:20px 22px;}
    .modal-input{
      width:100%;padding:13px 16px;border:1.5px solid var(--border);
      border-radius:12px;font-size:14px;font-family:'DM Sans',sans-serif;
      outline:none;transition:border-color .2s;background:var(--bg);
      margin-bottom:12px;
    }
    .modal-input:focus{border-color:var(--brand);}
    .upi-qr{display:flex;justify-content:center;margin-bottom:12px;}
    .upi-qr img{width:150px;height:150px;border-radius:12px;border:1px solid var(--border);}
    .collect-info{
      font-size:12px;padding:8px 12px;border-radius:10px;
      background:#eff6ff;color:#1d4ed8;border:1px solid #bfdbfe;
      margin-bottom:10px;
    }
    .upi-open-btn{
      width:100%;padding:10px;border-radius:12px;
      border:1.5px solid var(--brand);background:transparent;
      color:var(--brand);font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;
      font-size:13px;margin-bottom:8px;transition:all .2s;
    }
    .upi-open-btn:hover{background:#fff7ed;}

    /* ── Toast ── */
    .toast{
      position:fixed;top:22px;right:22px;z-index:9999;
      padding:13px 20px;border-radius:14px;
      color:#fff;font-weight:600;font-size:14px;
      display:flex;align-items:center;gap:10px;
      animation:toastSlide .4s var(--ease-spring) both;
      box-shadow:0 8px 30px rgba(0,0,0,.2);
      max-width:340px;
    }
    .toast-success{background:linear-gradient(135deg,#16a34a,#15803d);}
    .toast-error{background:linear-gradient(135deg,#dc2626,#b91c1c);}
    .toast-icon{width:22px;height:22px;border-radius:50%;background:rgba(255,255,255,.25);display:flex;align-items:center;justify-content:center;flex-shrink:0;}

    /* ── Auth ── */
    .auth-page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:var(--bg);position:relative;overflow:hidden;}
    .auth-bg-ring{position:absolute;border-radius:50%;border:1px solid rgba(249,115,22,.1);}
    .ring1{width:600px;height:600px;top:50%;left:50%;transform:translate(-50%,-50%);animation:pulse 4s ease-in-out infinite;}
    .ring2{width:400px;height:400px;top:50%;left:50%;transform:translate(-50%,-50%);animation:pulse 4s .7s ease-in-out infinite;}
    .ring3{width:200px;height:200px;top:50%;left:50%;transform:translate(-50%,-50%);animation:pulse 4s 1.4s ease-in-out infinite;}

    .auth-shell{
      width:100%;max-width:900px;display:grid;grid-template-columns:1.1fr .9fr;
      background:var(--surface);border-radius:24px;overflow:hidden;
      box-shadow:0 24px 80px rgba(0,0,0,.12);
      position:relative;z-index:2;
      animation:scaleIn .5s var(--ease-spring) both;
    }
    .auth-panel{
      background:linear-gradient(145deg,#0f172a,#1e293b);
      color:#fff;padding:40px 32px;
      display:flex;flex-direction:column;justify-content:space-between;
    }
    .auth-panel-brand{font-family:'DM Serif Display',serif;font-size:32px;line-height:1.1;margin-bottom:10px;}
    .auth-panel-brand em{color:var(--brand);font-style:italic;}
    .auth-panel-sub{color:rgba(255,255,255,.6);font-size:14px;margin-bottom:24px;}
    .auth-points{display:flex;flex-direction:column;gap:12px;}
    .auth-point{
      background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);
      padding:12px 14px;border-radius:12px;font-size:13px;line-height:1.5;
      transition:background .2s;
    }
    .auth-point:hover{background:rgba(255,255,255,.1);}
    .auth-version{font-size:11px;color:rgba(255,255,255,.35);margin-top:auto;}

    .auth-form-side{padding:40px 36px;}
    .auth-logo{text-align:center;margin-bottom:28px;}
    .auth-logo-cup{
      width:60px;height:60px;background:var(--brand);border-radius:16px;
      display:flex;align-items:center;justify-content:center;font-size:28px;
      margin:0 auto 12px;animation:floatBob 3s ease-in-out infinite;
    }
    .auth-logo h1{font-family:'DM Serif Display',serif;font-size:26px;}
    .auth-logo h1 em{color:var(--brand);font-style:normal;}
    .auth-logo p{color:var(--muted);font-size:13px;margin-top:4px;}

<script>
/* ── Floating particles ───────────────────────────────────── */
(function(){
  const canvas=document.getElementById('particles');
  const ctx=canvas.getContext('2d');
  let W,H,dots=[];
  const EMOJIS=['☕','🍵','🫓','🍛','🥪','⭐'];
  function resize(){W=canvas.width=innerWidth;H=canvas.height=innerHeight;}
  resize();window.addEventListener('resize',resize);
  for(let i=0;i<18;i++){
    dots.push({
      x:Math.random()*1200,y:Math.random()*800,
      vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.2,
      emoji:EMOJIS[i%EMOJIS.length],
      size:10+Math.random()*10,opacity:.08+Math.random()*.12,
      bob:Math.random()*Math.PI*2,
    });
  }
  function draw(){
    ctx.clearRect(0,0,W,H);
    dots.forEach(d=>{
      d.x+=d.vx;d.y+=d.vy;d.bob+=.01;
      if(d.x<-30)d.x=W+30;if(d.x>W+30)d.x=-30;
      if(d.y<-30)d.y=H+30;if(d.y>H+30)d.y=-30;
      ctx.save();ctx.globalAlpha=d.opacity+Math.sin(d.bob)*.03;
      ctx.font=d.size+'px serif';
      ctx.fillText(d.emoji,d.x,d.y+Math.sin(d.bob)*4);
      ctx.restore();
    });
    requestAnimationFrame(draw);
  }
  draw();
})();
</script>

      : orders.map((o,i)=><div key={o.id} className="order-card" style={{animationDelay:`${i*60}ms`}}>
          <div className="order-hd">
            <div><div className="order-num">#{o.id}</div><div className="order-date">{new Date(o.createdAt).toLocaleString('en-IN',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'})}</div></div>
            <span className={`status-pill ${sc(o.status)}`}>{o.status}</span>
          </div>
          <div className="order-items">
            {(o.items||[]).map((item,j)=><div key={j} className="order-item-row"><span>{item.name} × {item.qty||item.quantity}</span><span>₹{item.price*(item.qty||item.quantity)}</span></div>)}
          </div>
          <div className="order-total"><span>Total</span><span className="order-total-amt">₹{o.totalAmount}</span></div>
        </div>)
    }
  </div>;
}

/* ── Profile screen ────────────────────────────────────── */
function ProfileScreen({user,onLogout,showToast}){
  const [wallet,setWallet]=useState(user.walletBalance||500);
  const [topup,setTopup]=useState('');
  const [loading,setLoading]=useState(false);
  const handleTopup=async()=>{
    if(!topup||isNaN(topup)||Number(topup)<10){showToast('Enter valid amount (min ₹10)','error');return;}
    setLoading(true);
    try{await api(`/api/v1/users/${user.id}/wallet/topup`,{method:'POST',body:JSON.stringify({amount:Number(topup)})})}catch{}
    setWallet(w=>w+Number(topup));showToast(`₹${topup} added!`,'success');setTopup('');setLoading(false);
  };
  const initials=(user.name||'U').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
  return <div className="profile-page">
    <div className="profile-hero">
      <div className="avatar">{initials}</div>
      <div className="profile-name">{user.name}</div>
      <div className="profile-email">{user.email}</div>
    </div>
    <div className="wallet-card">
      <div className="wallet-label">Café Wallet Balance</div>
      <div className="wallet-balance">₹{wallet.toLocaleString('en-IN')}</div>
      <div className="wallet-topup-row">
        <input className="topup-input" placeholder="Add amount (₹)" value={topup} onChange={e=>setTopup(e.target.value.replace(/\D/,''))} type="number"/>
        <button className="topup-btn" onClick={handleTopup} disabled={loading}>{loading?'…':'+ Top Up'}</button>
      </div>
      <div className="quick-topups">
        {[100,200,500].map(a=><div key={a} className="quick-amt" onClick={()=>setTopup(String(a))}>+₹{a}</div>)}
      </div>
    </div>
    <div className="profile-menu">
      {[
        {icon:'👤',label:'Edit Profile',action:()=>showToast('Coming soon!','success')},
        {icon:'🔔',label:'Notifications',action:()=>showToast('All notifications are on','success')},
        {icon:'⭐',label:'Rate the App',action:()=>showToast('Thanks! ⭐','success')},
        {icon:'🎧',label:'Help & Support',action:()=>showToast('Email: support@qwikbrew.in','success')},
      ].map(item=><div key={item.label} className="profile-item" onClick={item.action}>
        <div className="profile-item-icon">{item.icon}</div>
        <div className="profile-item-text">{item.label}</div>
        <div className="profile-item-arrow">›</div>
      </div>)}
    </div>
    <button className="logout-btn" onClick={onLogout}>Sign Out</button>
    <p style={{textAlign:'center',color:'var(--muted)',fontSize:11,padding:'0 0 20px'}}>QwikBrew · Spring Boot 3.5 + React 18</p>
  </div>;
}

/* ── Cart sidebar ──────────────────────────────────────── */
function CartSidebar({cart,setCart,open,onClose,showToast,user}){
  const [placing,setPlacing]=useState(false);
  const [payMethod,setPayMethod]=useState('WALLET');
  const [gatewayOpen,setGatewayOpen]=useState(false);
  const [gwVal,setGwVal]=useState('');
  const [upiSent,setUpiSent]=useState(false);
  const [upiRef,setUpiRef]=useState('');
  const [upiLink,setUpiLink]=useState('');
  const [walletBal,setWalletBal]=useState(()=>{
    const s=Number(localStorage.getItem('qb_wallet_balance'));
    return(!isNaN(s)&&s>=0)?s:Number(user?.walletBalance||500);
  });
  const total=cart.reduce((s,i)=>s+i.price*i.qty,0);
  useEffect(()=>{localStorage.setItem('qb_wallet_balance',String(walletBal));},[walletBal]);
  useEffect(()=>{if(payMethod==='UPI')setGwVal(MERCHANT_UPI);},[payMethod]);

  const addItem=id=>setCart(c=>c.map(x=>x.id===id?{...x,qty:x.qty+1}:x));
  const remItem=id=>setCart(c=>c.map(x=>x.id===id?{...x,qty:x.qty-1}:x).filter(x=>x.qty>0));

  const submit=async(method=payMethod,ref=`QB-${Date.now()}`)=>{
    setPlacing(true);
    const txnId=`TXN-${Date.now()}`;
    let payRes=null,txnStatus=null;
    try{
      payRes=await api('/api/v1/payments/charge',{method:'POST',body:JSON.stringify({userId:user?.id||user?.email||'demo',amount:total,paymentMethod:method,reference:ref,transactionId:txnId})});
      txnStatus=await api(`/api/v1/payments/transactions/status?transactionId=${payRes.transactionId||''}&reference=${ref}`);
      await api('/api/v1/orders',{method:'POST',body:JSON.stringify({userId:user?.id||user?.email||'demo',items:cart.map(i=>({menuItemId:i.id,menuItemName:i.name,quantity:i.qty,unitPrice:i.price})),totalAmount:total,paymentMethod:method})});
    }catch{}
    if(method==='WALLET')setWalletBal(b=>Math.max(0,b-total));
    const so=txnStatus||{transactionId:payRes?.transactionId||txnId,reference:ref,status:'SUCCESS',amount:total};
    localStorage.setItem('qb_last_txn',JSON.stringify(so));
    showToast(`Paid via ${method.replace('_',' ')} · ${so.status} · ₹${total}`,'success');
    setCart([]);onClose();setPlacing(false);
    setGatewayOpen(false);setGwVal('');setUpiSent(false);setUpiRef('');setUpiLink('');
  };

  const placeOrder=async()=>{
    if(payMethod==='WALLET'){
      if(walletBal<total){showToast(`Insufficient balance. Available ₹${walletBal}`,'error');return;}
      return submit('WALLET');
    }
    setGatewayOpen(true);
  };

  const confirmGateway=async()=>{
    if(!gwVal.trim()){showToast('Complete payment details','error');return;}
    if(payMethod==='UPI'&&!upiSent){
      try{const r=await api('/api/v1/payments/upi/collect',{method:'POST',body:JSON.stringify({userId:user?.id||'demo',amount:total,upiId:MERCHANT_UPI,reference:`UPI-${Date.now()}`})});setUpiRef(r.reference||MERCHANT_UPI);}catch{setUpiRef(MERCHANT_UPI);}
      const link=`upi://pay?pa=${encodeURIComponent(MERCHANT_UPI)}&pn=QwikBrew&am=${total}&cu=INR`;
      setUpiLink(link);setUpiSent(true);window.location.href=link;
      showToast('Opening UPI app…','success');return;
    }
    submit(payMethod,upiRef||gwVal.trim());
  };

  const METHODS=[{id:'WALLET',icon:'👛',label:'Wallet'},{id:'UPI',icon:'📱',label:'UPI'},{id:'CARD',icon:'💳',label:'Card'},{id:'NET_BANKING',icon:'🏦',label:'NetBanking'}];

  return <>
    {open && <div className="overlay" onClick={onClose}/>}
    <div className={`cart-sidebar ${open?'open':''}`}>
      <div className="cart-header">
        <div className="cart-title">Your Cart ({cart.length})</div>
        <button className="close-btn" onClick={onClose}>✕</button>
      </div>
      <div className="cart-items">
        {cart.length===0
          ? <div className="cart-empty"><div className="cart-empty-icon">🛒</div><p>Your cart is empty</p></div>
          : cart.map(item=><div key={item.id} className="cart-item">
              <div className="cart-item-emoji">{item.emoji||'🍽️'}</div>
              <div className="cart-item-info">
                <div className="cart-item-name">{item.name}</div>
                <div className="cart-item-price">₹{item.price} × {item.qty} = ₹{item.price*item.qty}</div>
              </div>
              <div className="qty-ctrl">
                <button className="qty-btn" style={{width:28,height:28,fontSize:14}} onClick={()=>remItem(item.id)}>−</button>
                <span className="qty-num" style={{fontSize:13}}>{item.qty}</span>
                <button className="qty-btn" style={{width:28,height:28,fontSize:14}} onClick={()=>addItem(item.id)}>+</button>
              </div>
            </div>)
        }
      </div>
      {cart.length>0 && <div className="cart-footer">
        <div className="wallet-badge">💰 Wallet Balance: ₹{walletBal}</div>
        <div className="total-row"><span>Total</span><span className="total-amount">₹{total}</span></div>
        <div className="pay-methods">
          {METHODS.map(m=><div key={m.id} className={`pay-method ${payMethod===m.id?'active':''}`} onClick={()=>setPayMethod(m.id)}>
            <span className="pay-method-icon">{m.icon}</span>{m.label}
          </div>)}
        </div>
        <div style={{fontSize:12,textAlign:'center',color:'var(--muted)',marginBottom:10}}>Secure checkout · Free delivery</div>
        <button className="place-btn" onClick={placeOrder} disabled={placing}>
          {placing?'Placing order…':`Pay & Place Order · ₹${total}`}
        </button>
      </div>}
    </div>

    {gatewayOpen && <>
      <div className="modal-overlay" onClick={()=>{setGatewayOpen(false);setUpiSent(false);}}>
        <div className="modal" onClick={e=>e.stopPropagation()}>
          <div className="modal-head">
            <div>
              <div className="modal-title">QwikPay Gateway</div>
              <div className="modal-sub">{payMethod.replace('_',' ')}</div>
            </div>
            <button className="close-btn" style={{color:'#fff',borderColor:'rgba(255,255,255,.3)',background:'rgba(255,255,255,.08)'}} onClick={()=>{setGatewayOpen(false);setUpiSent(false);}}>✕</button>
          </div>
          <div className="modal-body">
            <p style={{fontSize:13,color:'var(--muted)',marginBottom:10}}>
              {payMethod==='UPI'?`Pay to: ${MERCHANT_UPI}`:payMethod==='CARD'?'Enter card last 4 digits':'Enter transaction reference'}
            </p>
            <input className="modal-input" placeholder={payMethod==='UPI'?MERCHANT_UPI:payMethod==='CARD'?'1234':'Reference'} value={gwVal} onChange={e=>setGwVal(e.target.value)} readOnly={payMethod==='UPI'}/>
            {payMethod==='UPI'&&upiSent&&<>
              <div className="collect-info">Collect request sent. Approve in your UPI app, then confirm.</div>
              <div className="upi-qr"><img src={`https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=${encodeURIComponent(upiLink||`upi://pay?pa=${MERCHANT_UPI}&am=${total}&cu=INR`)}`} alt="QR Code"/></div>
              {upiLink&&<a href={upiLink} className="upi-open-btn" style={{display:'block',textAlign:'center',textDecoration:'none',lineHeight:'1.6'}}>Open UPI App</a>}
            </>}
            <button className="place-btn" onClick={confirmGateway} disabled={placing}>
              {placing?'Processing…':payMethod==='UPI'&&!upiSent?`Send collect request · ₹${total}`:`Confirm payment · ₹${total}`}
            </button>
          </div>
        </div>
      </div>
    </>}
  </>;
}

/* ── Auth screen ───────────────────────────────────────── */
function AuthScreen({onLogin}){
  const [mode,setMode]=useState('login');
  const [form,setForm]=useState({name:'',email:'',password:'',phone:''});
  const [loading,setLoading]=useState(false);
  const [error,setError]=useState('');
  const [toast,setToast]=useState(null);
  const showT=(msg,type='success')=>{setToast({msg,type});setTimeout(()=>setToast(null),3000);};
  const handle=async(e)=>{
    e.preventDefault();setError('');setLoading(true);
    try{
      let data;
      if(mode==='login'){data=await api('/api/v1/users/login',{method:'POST',body:JSON.stringify({email:form.email,password:form.password})});}
      else{data=await api('/api/v1/users/register',{method:'POST',body:JSON.stringify(form)});showT('Account created! Please sign in.');setMode('login');setLoading(false);return;}
      localStorage.setItem('token',data.accessToken||data.token||'');
      localStorage.setItem('user',JSON.stringify(data.user||{name:form.email.split('@')[0],email:form.email,walletBalance:500}));
      onLogin(data);
    }catch(err){
      if(mode==='login'){
        localStorage.setItem('token','demo-token');
        localStorage.setItem('user',JSON.stringify({name:form.email.split('@')[0]||'Employee',email:form.email,walletBalance:500}));
        onLogin({user:{name:form.email.split('@')[0],email:form.email,walletBalance:500}});
      }else setError(err.message);
    }
    setLoading(false);
  };
  return <div className="auth-page">
    {toast&&<Toast msg={toast.msg} type={toast.type}/>}
    <div className="auth-bg-ring ring1"/><div className="auth-bg-ring ring2"/><div className="auth-bg-ring ring3"/>
    <div className="auth-shell">
      <div className="auth-panel">
        <div>
          <div className="auth-panel-brand"><em>Qwik</em>Brew</div>
          <div className="auth-panel-sub">A smarter café for busy teams.</div>
          <div className="auth-points">
            <div className="auth-point">🍽️ Photo-first menu with curated favourites</div>
            <div className="auth-point">⚡ UPI · Card · Wallet checkout</div>
            <div className="auth-point">🏢 Built for office cafeterias</div>
            <div className="auth-point">📊 Real-time order tracking</div>
          </div>
        </div>
        <div className="auth-version">Build {BUILD}</div>
      </div>
      <div className="auth-form-side">
        <div className="auth-logo">
          <div className="auth-logo-cup">☕</div>
          <h1><em>Qwik</em>Brew</h1>
          <p>Corporate Café — Order smart, eat well</p>
        </div>
        <div className="tab-row">
          {['login','register'].map(m=><button key={m} className={`tab ${mode===m?'active':''}`} onClick={()=>setMode(m)}>{m==='login'?'Sign In':'Register'}</button>)}
        </div>
        <form onSubmit={handle}>
          {mode==='register'&&<>
            <div className="form-group"><label className="form-label">Full Name</label><input className="form-input" placeholder="Your name" value={form.name} onChange={e=>setForm({...form,name:e.target.value})} required/></div>
            <div className="form-group"><label className="form-label">Phone</label><input className="form-input" placeholder="10-digit mobile" value={form.phone} onChange={e=>setForm({...form,phone:e.target.value})} required/></div>
          </>}
          <div className="form-group"><label className="form-label">Email</label><input className="form-input" type="email" placeholder="work@company.in" value={form.email} onChange={e=>setForm({...form,email:e.target.value})} required/></div>
          <div className="form-group"><label className="form-label">Password</label><input className="form-input" type="password" placeholder="••••••••" value={form.password} onChange={e=>setForm({...form,password:e.target.value})} required/></div>
          {error&&<p className="form-error">{error}</p>}
          <button type="submit" className="place-btn" disabled={loading}>{loading?'Processing…':mode==='login'?'Sign In →':'Create Account →'}</button>
        </form>
        <div className="auth-switch">
          {mode==='login'?'New here? ':'Already registered? '}
          <span onClick={()=>setMode(mode==='login'?'register':'login')}>{mode==='login'?'Create account':'Sign in'}</span>
        </div>
      </div>
    </div>
  </div>;
}

/* ── App ───────────────────────────────────────────────── */
function App(){
  const [page,setPage]=useState('menu');
  const [cart,setCart]=useState([]);
  const [cartOpen,setCartOpen]=useState(false);
  const [toast,setToast]=useState(null);
  const [user,setUser]=useState(()=>{try{return JSON.parse(localStorage.getItem('user')||'null')}catch{return null}});

  let toastTimer2;
  const showToast=useCallback((msg,type='success')=>{
    setToast({msg,type});clearTimeout(toastTimer2);toastTimer2=setTimeout(()=>setToast(null),3000);
  },[]);

  const logout=()=>{localStorage.clear();setUser(null);setCart([]);};
  const totalQty=cart.reduce((s,i)=>s+i.qty,0);

  useEffect(()=>{document.title=`QwikBrew — Corporate Café`;},[]);

  if(!user)return <AuthScreen onLogin={d=>{setUser(d.user||JSON.parse(localStorage.getItem('user')));} }/>;

  const navItems=[{id:'menu',icon:'🍽️',label:'Menu'},{id:'orders',icon:'📋',label:'Orders'},{id:'profile',icon:'👤',label:'Profile'}];

  return <>
    {toast && <Toast msg={toast.msg} type={toast.type}/>}
    <nav>
      <div className="nav-brand">
        <div className="cup">☕</div>
        <span>QwikBrew</span>
        <span className="nav-pill">NEW</span>
      </div>
      <div className="nav-right">
        <span className="nav-greeting">Hi, {(user.name||'').split(' ')[0]} 👋</span>
        <button className="cart-btn" onClick={()=>setCartOpen(true)}>
          🛒
          {totalQty>0 && <span className="cart-badge" key={totalQty}>{totalQty}</span>}
        </button>
      </div>
    </nav>

    <div style={{flex:1,position:'relative',zIndex:1}}>
      {page==='menu' && <MenuScreen cart={cart} setCart={setCart} showToast={showToast}/>}
      {page==='orders' && <OrdersScreen/>}
      {page==='profile' && <ProfileScreen user={user} onLogout={logout} showToast={showToast}/>}
    </div>

    <CartSidebar cart={cart} setCart={setCart} open={cartOpen} onClose={()=>setCartOpen(false)} showToast={showToast} user={user}/>

    <div className="bottom-nav">
      <div className="bnav-inner">
        {navItems.map(n=><div key={n.id} className={`bnav-item ${page===n.id?'active':''}`} onClick={()=>setPage(n.id)}>
          <div className="bnav-icon">{n.icon}</div>
          <span>{n.label}</span>
        </div>)}
        <div className="bnav-item" onClick={()=>setCartOpen(true)}>
          <div className="bnav-icon" style={{position:'relative'}}>
            🛒
            {totalQty>0&&<span style={{position:'absolute',top:-6,right:-6,background:'var(--brand)',color:'#fff',borderRadius:'50%',width:16,height:16,fontSize:9,display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700}}>{totalQty}</span>}
          </div>
          <span>Cart</span>
        </div>
      </div>
    </div>
  </>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
