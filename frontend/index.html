const LOCAL_HOSTS = new Set(['localhost','127.0.0.1','::1']);
const API = LOCAL_HOSTS.has(window.location.hostname) ? 'http://localhost:8080' : '';
const BASE = API;

async function api(path, opts={}){
  const token = localStorage.getItem('token');
  const res = await fetch(BASE+path,{
    headers:{'Content-Type':'application/json',...(token?{Authorization:`Bearer ${token}`}:{}),...(opts.headers||{})},
    ...opts
  });
  if(res.status===401){localStorage.clear();window.location.reload();}
  const data = await res.json().catch(()=>({}));
  if(!res.ok) throw new Error(data.message||'Error');
  return data;
}

function Toast({msg,type}){
  if(!msg)return null;
  const cls=type==='success'?'ts':type==='error'?'te':'ti';
  const ico=type==='success'?'✓':type==='error'?'✕':'i';
  return <div className={`toast ${cls}`}><div className="tico">{ico}</div>{msg}</div>;
}

function Cart({cart,setCart,open,onClose,showToast,walletBal,setWalletBal,onOpenWallet}){
  const [payMethod,setPayMethod]=useState('WALLET');
  const [gwOpen,setGwOpen]=useState(false);
  const [placing,setPlacing]=useState(false);
  const [success,setSuccess]=useState(null);
  const total=cart.reduce((s,i)=>s+i.price*i.qty,0);
  const add=id=>setCart(c=>c.map(x=>x.id===id?{...x,qty:x.qty+1}:x));
  const rem=id=>setCart(c=>c.map(x=>x.id===id?{...x,qty:x.qty-1}:x).filter(x=>x.qty>0));
  const placeOrder=async()=>{
    if(payMethod==='WALLET'){
      if(walletBal<total){showToast(`Insufficient balance. Have ₹${walletBal}`,'error');return;}
      setPlacing(true);
      try{await api('/api/v1/orders',{method:'POST',body:JSON.stringify({userId:'demo',items:cart.map(i=>({menuItemId:i.id,menuItemName:i.name,quantity:i.qty,unitPrice:i.price})),totalAmount:total,paymentMethod:'WALLET'})});}catch{}
      const txnId=`TXN-${Date.now()}`;
      setWalletBal(b=>b-total);
      localStorage.setItem('qb_last_txn',JSON.stringify({status:'SUCCESS',transactionId:txnId,amount:total,method:'WALLET'}));
      setPlacing(false);setSuccess({type:'order',amount:total,method:'WALLET',transactionId:txnId});setCart([]);
    }else setGwOpen(true);
  };
  const onGWS=d=>{setGwOpen(false);localStorage.setItem('qb_last_txn',JSON.stringify({status:'SUCCESS',...d}));setSuccess({type:'order',...d});setCart([]);};
  const PMS=[{id:'WALLET',ico:'👛',lbl:'Wallet'},{id:'UPI',ico:'📱',lbl:'UPI'},{id:'CARD',ico:'💳',lbl:'Card'},{id:'NET_BANKING',ico:'🏦',lbl:'NetBanking'}];
  return <>
    {open&&<div className="overlay" onClick={onClose}/>}
    <div className={`cside ${open?'open':''}`}>
      <div className="cshd"><h3 className="csttl fd">Your Cart<span className="cscnt">({cart.length})</span></h3><button className="xbtn" onClick={onClose}>✕</button></div>
      <div className="csbody">
        {cart.length===0?<div className="csempty"><span>🛒</span><p>Your cart is empty.<br/>Add something delicious!</p></div>
          :cart.map(item=><div key={item.id} className="ci">
            <div className="ciem">{item.emoji||'🍽️'}</div>
            <div className="ciinfo"><div className="ciname">{item.name}</div><div className="ciprice">₹{item.price} × {item.qty} = ₹{item.price*item.qty}</div></div>
            <div className="qrow">
              <button className="qbtn" style={{width:26,height:26,fontSize:13}} onClick={()=>rem(item.id)}>−</button>
              <span className="qnum" style={{fontSize:12}}>{item.qty}</span>
              <button className="qbtn" style={{width:26,height:26,fontSize:13}} onClick={()=>add(item.id)}>+</button>
            </div>
          </div>)
        }
      </div>
      {cart.length>0&&<div className="csfoot">
        <div className="wm">
          <div><div className="wml">Wallet Balance</div><div className="wmbal fd">₹{walletBal.toLocaleString('en-IN')}</div></div>
          <div className="wmbtn" onClick={()=>{onClose();onOpenWallet();}}>+ Recharge</div>
        </div>
        <div className="cstotal"><span style={{color:'var(--muted)',fontSize:13}}>Total</span><span className="cstamt fd">₹{total}</span></div>
        <div className="pmg">{PMS.map(m=><div key={m.id} className={`pm ${payMethod===m.id?'on':''}`} onClick={()=>setPayMethod(m.id)}><span className="pmico">{m.ico}</span>{m.lbl}</div>)}</div>
        <button className="obtn fd" onClick={placeOrder} disabled={placing}>{placing?'Placing order…':`Pay & Order · ₹${total}`}</button>
      </div>}
    </div>
    {gwOpen&&<PayGateway total={total} method={payMethod} onClose={()=>setGwOpen(false)} onSuccess={onGWS} showToast={showToast}/>}
    {success&&<SuccessOverlay data={success} onClose={()=>{setSuccess(null);onClose();}}/>}
  </>;
}

function ProfileScreen({user,onLogout,showToast,walletBal,setWalletBal}){
  const [walletOpen,setWalletOpen]=useState(false);
  const [success,setSuccess]=useState(null);
  const ini=(user.name||'U').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
  return <div className="ppage">
    <div className="phbg">
      <div className="avwrap"><div className="avring"/><div className="avinner fd">{ini}</div></div>
      <div className="phname fd">{user.name}</div>
      <div className="phemail">{user.email}</div>
    </div>
    <div className="wb">
      <div className="wbtop"><div className="wblbl">Café Wallet</div><div className="wbbal fd">₹{walletBal.toLocaleString('en-IN')}</div><div className="wbusr">{user.name}</div></div>
      <div className="wbbot">
        <button className="wbrcbtn fd" onClick={()=>setWalletOpen(true)}><span>＋</span> Recharge Wallet</button>
        <div className="wbstats">
          <div className="wbstat"><div className="wbsv fd">₹500</div><div className="wbsl">Total spent</div></div>
          <div className="wbstat"><div className="wbsv fd">12</div><div className="wbsl">Orders placed</div></div>
        </div>
      </div>
    </div>
    <div className="plist">
      {[{ico:'👤',lbl:'Edit Profile',act:()=>showToast('Coming soon!','info')},{ico:'🔔',lbl:'Notifications',act:()=>showToast('All on','success')},{ico:'📜',lbl:'Transaction History',act:()=>showToast('Coming soon!','info')},{ico:'⭐',lbl:'Rate QwikBrew',act:()=>showToast('Thanks! ⭐','success')},{ico:'🎧',lbl:'Help & Support',act:()=>showToast('support@qwikbrew.in','info')}]
        .map(item=><div key={item.lbl} className="pi" onClick={item.act}><div className="piico">{item.ico}</div><div className="pitxt">{item.lbl}</div><div className="piarr">›</div></div>)}
    </div>
    <button className="logoutbtn fd" onClick={onLogout}>Sign Out</button>
    <p style={{textAlign:'center',color:'var(--hint)',fontSize:10,paddingBottom:18}}>QwikBrew · Spring Boot 3.5 + React 18 · {BUILD}</p>
    {walletOpen&&<WalletModal showToast={showToast} onClose={()=>setWalletOpen(false)} onSuccess={amt=>{setWalletBal(b=>b+amt);setWalletOpen(false);setSuccess({type:'recharge',amount:amt,transactionId:`TXN-${Date.now()}`});}}/>}
    {success&&<SuccessOverlay data={success} onClose={()=>setSuccess(null)}/>}
  </div>;
}

function AuthScreen({onLogin}){
  const [mode,setMode]=useState('login');
  const [form,setForm]=useState({name:'',email:'',password:'',phone:''});
  const [loading,setLoading]=useState(false);
  const [error,setError]=useState('');
  const [toast,setToast]=useState(null);
  const showT=(m,t='success')=>{setToast({msg:m,type:t});setTimeout(()=>setToast(null),3000);};
  const handle=async e=>{
    e.preventDefault();setError('');setLoading(true);
    try{
      let data;
      if(mode==='login'){data=await api('/api/v1/users/login',{method:'POST',body:JSON.stringify({email:form.email,password:form.password})});}
      else{data=await api('/api/v1/users/register',{method:'POST',body:JSON.stringify(form)});showT('Account created! Sign in.');setMode('login');setLoading(false);return;}
      localStorage.setItem('qb_token',data.accessToken||data.token||'');
      localStorage.setItem('qb_user',JSON.stringify(data.user||{name:form.email.split('@')[0],email:form.email,walletBalance:500}));
      onLogin(data);
    }catch(err){
      if(mode==='login'){localStorage.setItem('qb_token','demo');localStorage.setItem('qb_user',JSON.stringify({name:form.email.split('@')[0]||'Employee',email:form.email,walletBalance:500}));onLogin({user:{name:form.email.split('@')[0],email:form.email,walletBalance:500}});}
      else setError(err.message);
    }
    setLoading(false);
  };
  return <div className="authpage">
    {toast&&<Toast msg={toast.msg} type={toast.type}/>}
    <div className="authblob ab1"/><div className="authblob ab2"/>
    <div className="authbox">
      <div className="authlogo">
        <div className="authmark">☕</div>
        <h1 className="fd"><span>Qwik</span>Brew</h1>
        <p>Corporate Café — Order smart, eat well</p>
      </div>
      <div className="auth-tabs">
        {['login','register'].map(m=><button type="button" key={m} className={`auth-tab btn ${mode===m?'active':''}`} onClick={()=>setMode(m)}>{m==='login'?'Sign In':'Register'}</button>)}
      </div>
      <form onSubmit={handle}>
        {mode==='register' && <>
          <div className="form-g"><label>FULL NAME</label><input placeholder="Your full name" value={form.name} onChange={e=>setForm({...form,name:e.target.value})} required/></div>
          <div className="form-g"><label>PHONE</label><input placeholder="10-digit mobile" value={form.phone} onChange={e=>setForm({...form,phone:e.target.value})} required/></div>
        </>}
        <div className="form-g"><label>EMAIL</label><input type="email" placeholder="work@company.in" value={form.email} onChange={e=>setForm({...form,email:e.target.value})} required/></div>
        <div className="form-g"><label>PASSWORD</label><input type="password" placeholder="••••••••" value={form.password} onChange={e=>setForm({...form,password:e.target.value})} required/></div>
        {error && <p className="form-err">{error}</p>}
        <button type="submit" className="auth-submit btn btn-primary font-display" disabled={loading}>{loading?'Processing…':mode==='login'?'Sign In →':'Create Account →'}</button>
      </form>
      <div className="authswitch">{mode==='login'?'New here? ':'Already registered? '}<a onClick={()=>setMode(mode==='login'?'register':'login')}>{mode==='login'?'Create account':'Sign in'}</a></div>
    </div>
  </div>;
}

function App(){
  const [page,setPage]=useState('menu');
  const [cart,setCart]=useState([]);
  const [cartOpen,setCartOpen]=useState(false);
  const [walletOpen,setWalletOpen]=useState(false);
  const [toast,setToast]=useState(null);
  const [success,setSuccess]=useState(null);
  const [user,setUser]=useState(()=>{try{return JSON.parse(localStorage.getItem('qb_user')||'null')}catch{return null}});
  const [walletBal,setWalletBal]=useState(()=>{const s=Number(localStorage.getItem('qb_wallet'));return(!isNaN(s)&&s>=0)?s:500;});
  useEffect(()=>{localStorage.setItem('qb_wallet',String(walletBal));},[walletBal]);
  const tRef=useRef(null);
  const showToast=useCallback((msg,type='success')=>{setToast({msg,type});clearTimeout(tRef.current);tRef.current=setTimeout(()=>setToast(null),3000);},[]);
  const logout=()=>{localStorage.clear();setUser(null);setCart([]);};
  const totalQty=cart.reduce((s,i)=>s+i.qty,0);
  if(!user)return <AuthScreen onLogin={d=>{setUser(d.user||JSON.parse(localStorage.getItem('qb_user')));}} />;
  const NAV=[{id:'menu',ico:'🍽️',lbl:'Menu'},{id:'orders',ico:'📋',lbl:'Orders'},{id:'profile',ico:'👤',lbl:'Profile'}];
  return <>
    {toast&&<Toast msg={toast.msg} type={toast.type}/>}
    <nav>
      <div className="nl">
        <div className="nm">☕</div>
        <div className="nname fd"><span>Qwik</span>Brew</div>
        <div className="nbadge">Live</div>
      </div>
      <div className="nr">
        <div className="nwallet" onClick={()=>setWalletOpen(true)}><div className="nwdot"/><span className="fd" style={{fontSize:13}}>₹{walletBal.toLocaleString('en-IN')}</span></div>
        <span className="nhi">Hi, {(user.name||'').split(' ')[0]} 👋</span>
        <div className="ncart" onClick={()=>setCartOpen(true)}>🛒{totalQty>0&&<span className="ncb" key={totalQty}>{totalQty}</span>}</div>
      </div>
    </nav>
    <div style={{flex:1,position:'relative',zIndex:1}}>
      {page==='menu'&&<MenuScreen cart={cart} setCart={setCart} showToast={showToast}/>}
      {page==='orders'&&<OrdersScreen/>}
      {page==='profile'&&<ProfileScreen user={user} onLogout={logout} showToast={showToast} walletBal={walletBal} setWalletBal={setWalletBal}/>}
    </div>
    <Cart cart={cart} setCart={setCart} open={cartOpen} onClose={()=>setCartOpen(false)} showToast={showToast} walletBal={walletBal} setWalletBal={setWalletBal} onOpenWallet={()=>setWalletOpen(true)}/>
    {walletOpen&&<WalletModal showToast={showToast} onClose={()=>setWalletOpen(false)} onSuccess={amt=>{setWalletBal(b=>b+amt);setWalletOpen(false);setSuccess({type:'recharge',amount:amt,transactionId:`TXN-${Date.now()}`});}}/>}
    {success&&<SuccessOverlay data={success} onClose={()=>setSuccess(null)}/>}
    <div className="bnav">
      <div className="bnavrow">
        {NAV.map(n=><div key={n.id} className={`bi ${page===n.id?'on':''}`} onClick={()=>setPage(n.id)}><div className="biico">{n.ico}</div><span>{n.lbl}</span></div>)}
        <div className="bi" onClick={()=>setCartOpen(true)}>
          <div className="biico" style={{position:'relative'}}>🛒{totalQty>0&&<span style={{position:'absolute',top:-6,right:-6,background:'var(--brand)',color:'#fff',borderRadius:'50%',width:14,height:14,fontSize:8,display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700,border:'2px solid var(--bg)'}}>{totalQty}</span>}</div>
          <span>Cart</span>
        </div>
      </div>
    </div>
  </>;
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
