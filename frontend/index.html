<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>QwikBrew — Corporate Café</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.4/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --brand:#FF6B35;--brand2:#FF8C42;--brand-dim:rgba(255,107,53,.18);
  --gold:#F5A623;--gold-dim:rgba(245,166,35,.15);
  --bg:#0C0C0F;--surface:#141418;--surface2:#1C1C22;--surface3:#24242C;
  --border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.12);
  --text:#F0EFE8;--muted:#8A8A96;--hint:#4A4A56;
  --green:#22C55E;--green-dim:rgba(34,197,94,.15);
  --blue:#3B82F6;--blue-dim:rgba(59,130,246,.15);
  --red:#EF4444;--red-dim:rgba(239,68,68,.15);
  --r:14px;--r-lg:20px;--r-xl:28px;
}
html{scroll-behavior:smooth;}
body{font-family:'Instrument Sans',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden;min-height:100vh;}
#root{min-height:100vh;display:flex;flex-direction:column;}

/* ─── Animated mesh background ─── */
body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 60% 40% at 20% 10%, rgba(255,107,53,.08) 0%, transparent 60%),
    radial-gradient(ellipse 40% 60% at 80% 80%, rgba(245,166,35,.06) 0%, transparent 60%),
    radial-gradient(ellipse 50% 30% at 60% 30%, rgba(59,130,246,.04) 0%, transparent 50%);
}

/* ─── Keyframes ─── */
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes scaleIn{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:scale(1)}}
@keyframes slideUp{from{opacity:0;transform:translateY(100%)}to{opacity:1;transform:none}}
@keyframes slideRight{from{transform:translateX(110%)}to{transform:none}}
@keyframes glow{0%,100%{opacity:.5}50%{opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
@keyframes pulse-ring{0%{transform:scale(.95);opacity:.7}100%{transform:scale(1.15);opacity:0}}
@keyframes shimmer{0%{background-position:-400px 0}100%{background-position:400px 0}}
@keyframes count-up{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@keyframes ripple-out{0%{transform:scale(0);opacity:.6}100%{transform:scale(3);opacity:0}}
@keyframes card-shine{0%{left:-100%}100%{left:200%}}
@keyframes float1{0%,100%{transform:translate(0,0) rotate(0deg)}33%{transform:translate(8px,-12px) rotate(5deg)}66%{transform:translate(-5px,6px) rotate(-3deg)}}
@keyframes float2{0%,100%{transform:translate(0,0) rotate(0deg)}33%{transform:translate(-10px,8px) rotate(-4deg)}66%{transform:translate(7px,-10px) rotate(6deg)}}

/* ─── Typography ─── */
.font-display{font-family:'Syne',sans-serif;}

/* ─── Particles ─── */
.particle{position:fixed;font-size:16px;pointer-events:none;z-index:0;opacity:.12;user-select:none;}

/* ─── Scrollbar ─── */
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--hint);border-radius:2px;}

/* ─── Nav ─── */
nav{
  position:sticky;top:0;z-index:200;height:62px;
  background:rgba(12,12,15,.85);backdrop-filter:blur(24px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;
}
.nav-logo{display:flex;align-items:center;gap:10px;}
.nav-logo-mark{
  width:36px;height:36px;border-radius:10px;
  background:linear-gradient(135deg,var(--brand),var(--brand2));
  display:flex;align-items:center;justify-content:center;
  font-size:18px;animation:bob 3s ease-in-out infinite;
  box-shadow:0 0 20px rgba(255,107,53,.4);
}
.nav-logo-text{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;letter-spacing:-.3px;}
.nav-logo-text span{color:var(--brand);}
.nav-pill{
  font-size:9px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;
  background:var(--brand-dim);border:1px solid rgba(255,107,53,.3);
  color:var(--brand);padding:3px 8px;border-radius:999px;
}
.nav-right{display:flex;align-items:center;gap:12px;}
.nav-greeting{font-size:13px;color:var(--muted);}
.wallet-chip{
  display:flex;align-items:center;gap:6px;
  background:var(--surface2);border:1px solid var(--border2);
  border-radius:999px;padding:5px 12px 5px 8px;cursor:pointer;
  transition:all .2s;font-size:13px;font-weight:600;
}
.wallet-chip:hover{border-color:var(--gold);box-shadow:0 0 16px var(--gold-dim);}
.wallet-dot{width:8px;height:8px;border-radius:50%;background:var(--gold);}
.cart-fab{
  width:38px;height:38px;border-radius:12px;
  background:var(--surface2);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;position:relative;font-size:17px;
  transition:all .22s;
}
.cart-fab:hover{border-color:var(--brand);background:var(--brand-dim);}
.cart-badge{
  position:absolute;top:-5px;right:-5px;
  width:18px;height:18px;border-radius:50%;
  background:var(--brand);color:#fff;font-size:10px;font-weight:700;
  display:flex;align-items:center;justify-content:center;
  border:2px solid var(--bg);
  animation:scaleIn .3s cubic-bezier(.34,1.56,.64,1) both;
}

/* ─── Hero ─── */
.hero{
  position:relative;z-index:1;
  padding:44px 20px 36px;overflow:hidden;
}
.hero-inner{max-width:660px;margin:0 auto;text-align:center;}
.hero-badge{
  display:inline-flex;align-items:center;gap:7px;
  background:var(--surface2);border:1px solid var(--border2);
  border-radius:999px;padding:6px 14px;font-size:12px;
  margin-bottom:20px;animation:fadeUp .5s ease both;
}
.hero-badge-dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:glow 1.5s ease-in-out infinite;}
.hero-badge span{color:var(--muted);}
.hero-title{
  font-family:'Syne',sans-serif;font-size:clamp(30px,5.5vw,50px);
  font-weight:800;line-height:1.1;letter-spacing:-.5px;
  margin-bottom:14px;animation:fadeUp .5s .08s ease both;
}
.hero-title em{
  font-style:normal;
  background:linear-gradient(90deg,var(--brand),var(--gold));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.hero-sub{color:var(--muted);font-size:15px;margin-bottom:28px;animation:fadeUp .5s .15s ease both;}

.search-bar{
  position:relative;max-width:440px;margin:0 auto;
  animation:fadeUp .5s .22s ease both;
}
.search-bar input{
  width:100%;padding:13px 18px 13px 46px;
  background:var(--surface2);border:1px solid var(--border2);
  border-radius:999px;color:var(--text);font-family:'Instrument Sans',sans-serif;
  font-size:14px;outline:none;
  transition:border-color .2s,box-shadow .2s;
}
.search-bar input::placeholder{color:var(--hint);}
.search-bar input:focus{border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-dim);}
.search-icon{position:absolute;left:16px;top:50%;transform:translateY(-50%);font-size:15px;color:var(--hint);}

.hero-stats{
  display:grid;grid-template-columns:repeat(3,1fr);gap:10px;
  max-width:440px;margin:24px auto 0;
  animation:fadeUp .5s .3s ease both;
}
.stat{
  background:var(--surface2);border:1px solid var(--border);
  border-radius:var(--r);padding:12px 8px;text-align:center;
  transition:all .2s;cursor:default;
}
.stat:hover{border-color:var(--border2);transform:translateY(-2px);}
.stat-val{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;color:var(--text);}
.stat-lbl{font-size:11px;color:var(--muted);margin-top:2px;}

/* ─── Categories ─── */
.cats{
  padding:16px 20px 12px;
  display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;
  position:sticky;top:62px;z-index:100;
  background:rgba(12,12,15,.9);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
}
.cats::-webkit-scrollbar{display:none;}
.cat{
  flex-shrink:0;padding:7px 16px;border-radius:999px;
  font-size:12px;font-weight:600;cursor:pointer;
  border:1px solid var(--border);color:var(--muted);
  background:transparent;transition:all .2s;
  white-space:nowrap;
}
.cat:hover{border-color:var(--border2);color:var(--text);}
.cat.active{background:var(--brand);border-color:var(--brand);color:#fff;box-shadow:0 0 16px var(--brand-dim);}

/* ─── Menu grid ─── */
.menu-wrap{padding:20px 20px 100px;position:relative;z-index:1;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;}

/* ─── Menu card ─── */
.mcard{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r-lg);overflow:hidden;cursor:pointer;
  transition:transform .25s cubic-bezier(.34,1.2,.64,1),border-color .2s,box-shadow .2s;
  animation:fadeUp .5s ease both;position:relative;
}
.mcard::after{
  content:'';position:absolute;inset:0;border-radius:inherit;
  background:linear-gradient(105deg,rgba(255,255,255,.04) 0%,transparent 60%);
  pointer-events:none;
}
.mcard:hover{transform:translateY(-5px);border-color:var(--border2);box-shadow:0 16px 40px rgba(0,0,0,.4);}
.mcard:hover .mcard-img{transform:scale(1.07);}
.img-wrap{height:165px;overflow:hidden;position:relative;background:var(--surface2);}
.mcard-img{width:100%;height:100%;object-fit:cover;transition:transform .4s ease;display:block;}
.img-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:42px;}
.img-tags{position:absolute;top:10px;left:10px;display:flex;gap:6px;z-index:2;}
.tag{
  font-size:10px;font-weight:700;letter-spacing:.3px;
  padding:4px 9px;border-radius:999px;backdrop-filter:blur(10px);
}
.tag-veg{background:rgba(34,197,94,.85);color:#fff;}
.tag-nonveg{background:rgba(239,68,68,.85);color:#fff;}
.tag-hot{background:rgba(255,107,53,.85);color:#fff;}

.mcard-body{padding:14px 15px 16px;}
.mcard-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.mcard-rating{font-size:12px;color:var(--gold);font-weight:600;}
.mcard-time{font-size:11px;color:var(--hint);}
.mcard-name{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;margin-bottom:4px;line-height:1.3;}
.mcard-desc{font-size:12px;color:var(--muted);margin-bottom:12px;line-height:1.5;}
.mcard-footer{display:flex;align-items:center;justify-content:space-between;}
.mcard-price{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:var(--text);}
.mcard-price sup{font-size:12px;font-weight:500;color:var(--muted);vertical-align:top;margin-top:5px;margin-right:1px;}

.add-btn{
  width:36px;height:36px;border-radius:50%;border:none;
  background:var(--brand);color:#fff;cursor:pointer;font-size:20px;
  display:flex;align-items:center;justify-content:center;
  transition:all .22s cubic-bezier(.34,1.56,.64,1);
  box-shadow:0 4px 14px rgba(255,107,53,.45);
  position:relative;overflow:hidden;
}
.add-btn:hover{transform:scale(1.12);box-shadow:0 6px 20px rgba(255,107,53,.55);}
.add-btn:active{transform:scale(.9);}
.add-btn::after{content:'';position:absolute;inset:0;background:rgba(255,255,255,.25);border-radius:50%;transform:scale(0);}
.add-btn:active::after{animation:ripple-out .4s ease;}

.qty-row{display:flex;align-items:center;gap:10px;}
.qty-btn{
  width:30px;height:30px;border-radius:50%;border:1.5px solid var(--brand);
  background:transparent;color:var(--brand);font-size:17px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all .2s;font-weight:600;
}
.qty-btn:hover{background:var(--brand);color:#fff;}
.qty-num{font-family:'Syne',sans-serif;font-weight:700;font-size:15px;min-width:20px;text-align:center;}

/* ─── Spinner ─── */
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--brand);border-radius:50%;animation:spin .7s linear infinite;}
.spinner-wrap{display:flex;align-items:center;justify-content:center;padding:80px;}

/* ─── Cart sidebar ─── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:300;backdrop-filter:blur(4px);animation:fadeIn .2s ease both;}
.cart{
  position:fixed;right:0;top:0;bottom:0;width:400px;
  background:var(--surface);border-left:1px solid var(--border);
  z-index:400;display:flex;flex-direction:column;
  transform:translateX(100%);transition:transform .35s cubic-bezier(.34,1.1,.64,1);
}
.cart.open{transform:none;}
.cart-head{
  padding:18px 20px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
}
.cart-head h3{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;}
.close-x{
  width:34px;height:34px;border-radius:10px;
  border:1px solid var(--border);background:transparent;
  color:var(--muted);cursor:pointer;font-size:15px;
  display:flex;align-items:center;justify-content:center;
  transition:all .2s;
}
.close-x:hover{border-color:var(--brand);color:var(--brand);}
.cart-body{flex:1;overflow-y:auto;padding:16px 20px;}
.cart-empty-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:12px;color:var(--hint);}
.cart-empty-wrap span{font-size:52px;animation:bob 3s ease-in-out infinite;}
.cart-empty-wrap p{font-size:14px;text-align:center;}
.c-item{
  display:flex;align-items:center;gap:12px;
  padding:12px 0;border-bottom:1px solid var(--border);
  animation:fadeUp .3s ease both;
}
.c-item-emoji{font-size:26px;flex-shrink:0;width:40px;text-align:center;}
.c-item-info{flex:1;}
.c-item-name{font-weight:600;font-size:13px;margin-bottom:3px;}
.c-item-price{font-size:12px;color:var(--brand);font-weight:700;}

.cart-foot{padding:18px 20px;border-top:1px solid var(--border);}

/* ─── Wallet balance mini card ─── */
.wallet-mini{
  background:linear-gradient(135deg,rgba(245,166,35,.12),rgba(245,166,35,.06));
  border:1px solid rgba(245,166,35,.25);border-radius:var(--r);
  padding:12px 14px;margin-bottom:14px;
  display:flex;align-items:center;justify-content:space-between;
}
.wallet-mini-left{font-size:12px;color:var(--muted);}
.wallet-mini-bal{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;color:var(--gold);}
.wallet-mini-add{
  font-size:11px;font-weight:700;color:var(--gold);
  background:var(--gold-dim);border:1px solid rgba(245,166,35,.3);
  padding:4px 10px;border-radius:999px;cursor:pointer;
  transition:all .2s;white-space:nowrap;
}
.wallet-mini-add:hover{background:rgba(245,166,35,.25);}

.cart-total{display:flex;justify-content:space-between;font-size:16px;font-weight:700;margin-bottom:14px;}
.cart-total-amt{font-family:'Syne',sans-serif;font-size:20px;color:var(--brand);}

/* ─── Payment method pills ─── */
.pay-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;}
.pay-btn{
  padding:10px 8px;border-radius:var(--r);
  border:1px solid var(--border);background:var(--surface2);
  color:var(--muted);font-size:12px;font-weight:600;
  display:flex;align-items:center;justify-content:center;gap:7px;
  cursor:pointer;transition:all .2s;
}
.pay-btn:hover{border-color:var(--border2);color:var(--text);}
.pay-btn.sel{border-color:var(--brand);background:var(--brand-dim);color:var(--brand);}
.pay-icon{font-size:16px;}

.order-btn{
  width:100%;padding:14px;border-radius:var(--r);border:none;
  background:linear-gradient(135deg,var(--brand),var(--brand2));
  color:#fff;font-family:'Syne',sans-serif;font-size:15px;font-weight:700;
  cursor:pointer;transition:all .22s;position:relative;overflow:hidden;
  box-shadow:0 8px 24px rgba(255,107,53,.35);letter-spacing:.2px;
}
.order-btn::before{
  content:'';position:absolute;top:0;left:-100%;width:60%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.15),transparent);
  transition:left .5s;
}
.order-btn:hover::before{left:200%;}
.order-btn:hover{transform:translateY(-2px);box-shadow:0 12px 30px rgba(255,107,53,.45);}
.order-btn:active{transform:scale(.97);}
.order-btn:disabled{opacity:.6;cursor:not-allowed;transform:none;}

/* ─── PAYMENT GATEWAY MODAL ─── */
.modal-bg{
  position:fixed;inset:0;z-index:500;
  background:rgba(0,0,0,.8);backdrop-filter:blur(6px);
  display:flex;align-items:flex-end;justify-content:center;
  padding:0;animation:fadeIn .2s ease both;
}
@media(min-width:600px){.modal-bg{align-items:center;padding:20px;}}
.modal{
  width:100%;max-width:480px;
  background:var(--surface);border-radius:var(--r-xl) var(--r-xl) 0 0;
  overflow:hidden;animation:slideUp .35s cubic-bezier(.34,1.1,.64,1) both;
  max-height:92vh;display:flex;flex-direction:column;
}
@media(min-width:600px){.modal{border-radius:var(--r-xl);animation-name:scaleIn;max-height:85vh;}}

.modal-handle{width:40px;height:4px;background:var(--border2);border-radius:2px;margin:12px auto 0;}
.modal-title-bar{padding:16px 20px 14px;display:flex;align-items:center;justify-content:space-between;}
.modal-title{font-family:'Syne',sans-serif;font-size:17px;font-weight:700;}
.modal-sub{font-size:12px;color:var(--muted);margin-top:2px;}
.modal-body{padding:0 20px 20px;overflow-y:auto;flex:1;}

/* ─── Payment card visual ─── */
.pay-card-visual{
  height:160px;border-radius:var(--r-lg);margin-bottom:18px;
  position:relative;overflow:hidden;cursor:pointer;
}
.pay-card-visual.upi-card{background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);}
.pay-card-visual.wallet-card-v{background:linear-gradient(135deg,#1a1200,#2d1f00,#3d2a00);}
.pay-card-visual.card-v{background:linear-gradient(135deg,#0d1117,#161b22,#21262d);}
.pay-card-visual.nb-card{background:linear-gradient(135deg,#0a1628,#0f2447,#1a3a6e);}
.card-shine{
  position:absolute;top:0;left:-100%;width:50%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.05),transparent);
  animation:card-shine 3s ease-in-out infinite;
}
.card-chip{
  position:absolute;top:22px;left:22px;
  width:36px;height:28px;border-radius:5px;
  background:linear-gradient(135deg,rgba(255,255,255,.15),rgba(255,255,255,.05));
  border:1px solid rgba(255,255,255,.12);
}
.card-logo{position:absolute;top:18px;right:20px;font-size:22px;opacity:.8;}
.card-network{position:absolute;bottom:18px;right:20px;font-size:11px;font-weight:700;letter-spacing:.5px;opacity:.6;}
.card-num{position:absolute;bottom:40px;left:22px;font-family:'Syne',sans-serif;font-size:14px;letter-spacing:2px;opacity:.7;}
.card-label{position:absolute;bottom:18px;left:22px;font-size:10px;opacity:.5;letter-spacing:.5px;}
.card-amount{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  text-align:center;
}
.card-amount-label{font-size:11px;opacity:.55;margin-bottom:4px;letter-spacing:.5px;}
.card-amount-val{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;color:#fff;}

/* ─── UPI section ─── */
.upi-id-bar{
  background:var(--surface2);border:1px solid var(--border2);
  border-radius:var(--r);padding:12px 14px;margin-bottom:14px;
  display:flex;align-items:center;justify-content:space-between;
}
.upi-id-val{font-family:'Syne',sans-serif;font-size:14px;font-weight:600;color:var(--brand);}
.upi-id-copy{font-size:11px;color:var(--muted);cursor:pointer;padding:4px 8px;border-radius:6px;border:1px solid var(--border);transition:all .2s;}
.upi-id-copy:hover{border-color:var(--brand);color:var(--brand);}

.upi-apps{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px;}
.upi-app{
  background:var(--surface2);border:1px solid var(--border);
  border-radius:var(--r);padding:12px 6px 10px;text-align:center;
  cursor:pointer;transition:all .2s;
}
.upi-app:hover{border-color:var(--border2);transform:translateY(-2px);}
.upi-app-icon{font-size:22px;margin-bottom:5px;}

/* ── Toast ── */
let toastTimer;
function Toast({msg,type}){
  if(!msg) return null;
  const cls = type==='success'?'toast-s':type==='error'?'toast-e':'toast-i';
  const icon = type==='success'?'✓':type==='error'?'✕':'ℹ';
  return <div className={`toast ${cls}`}><span>{icon}</span>{msg}</div>;
}

/* ── Menu card ── */
function MCard({item,qty,onAdd,onRemove,delay}){
  return <div className="mcard" style={{animationDelay:`${delay}ms`}}>
    <div className="img-wrap">
      {item.image ? <img className="mcard-img" src={item.image} alt={item.name} loading="lazy"/>
        : <div className="img-placeholder">{item.emoji}</div>}
      <div className="img-tags">
        <span className={`tag ${item.isVeg?'tag-veg':'tag-nonveg'}`}>{item.isVeg?'Veg':'Non-Veg'}</span>
        {item.rating>=4.7 && <span className="tag tag-hot">Top Pick</span>}
      </div>
    </div>
    <div className="mcard-body">
      <div className="mcard-top">
        {item.rating && <span className="mcard-rating">★ {item.rating}</span>}
        {item.preparationTime && <span className="mcard-time">⏱ {item.preparationTime}m</span>}
      </div>
      <div className="mcard-name font-display">{item.name}</div>
      <div className="mcard-desc">{item.description}</div>
      <div className="mcard-footer">
        <div className="mcard-price font-display"><sup>₹</sup>{item.price}</div>
        {qty===0
          ? <button className="add-btn" onClick={()=>onAdd(item)}>+</button>
          : <div className="qty-row">
              <button className="qty-btn" onClick={()=>onRemove(item.id)}>−</button>
              <span className="qty-num">{qty}</span>
              <button className="qty-btn" onClick={()=>onAdd(item)}>+</button>
            </div>
        }
      </div>
    </div>
  </div>;
}

/* ── Menu Screen ── */
function MenuScreen({cart,setCart,showToast,walletBal}){
  const [items,setItems] = useState([]);
  const [filtered,setFiltered] = useState([]);
  const [cat,setCat] = useState('All');
  const [search,setSearch] = useState('');
  const [loading,setLoading] = useState(true);
  const [lastTxn] = useState(()=>{try{return JSON.parse(localStorage.getItem('qb_last_txn')||'null')}catch{return null}});

  useEffect(()=>{
    api('/api/v1/menu').then(d=>{
      const list = Array.isArray(d)?d:(d.content||d.items||MENU);
      setItems(list.length?list:MENU);
    }).catch(()=>setItems(MENU)).finally(()=>setLoading(false));
  },[]);

  useEffect(()=>{
    let f = items;
    if(cat!=='All') f = f.filter(i=>i.category===cat);
    if(search) f = f.filter(i=>i.name.toLowerCase().includes(search.toLowerCase()));
    setFiltered(f);
  },[items,cat,search]);

  const getQty = id=>(cart.find(c=>c.id===id)||{qty:0}).qty;
  const add = item=>{
    setCart(c=>{const e=c.find(x=>x.id===item.id);return e?c.map(x=>x.id===item.id?{...x,qty:x.qty+1}:x):[...c,{...item,qty:1}]});
    showToast(`${item.name} added`,'success');
  };
  const remove = id=>setCart(c=>c.map(x=>x.id===id?{...x,qty:x.qty-1}:x).filter(x=>x.qty>0));

  if(loading) return <div className="spinner-wrap"><div className="spinner"/></div>;

  return <div style={{position:'relative',zIndex:1}}>
    {/* Hero */}
    <div className="hero">
      <div className="hero-inner">
        <div className="hero-badge">
          <div className="hero-badge-dot"/>
          <span>Live Counter • 8 AM – 8 PM</span>
        </div>
        <h1 className="hero-title font-display">Order fresh,<br/><em>eat brilliant</em></h1>
        <p className="hero-sub">Cashless café for the modern workplace.</p>
        <div className="search-bar">
          <span className="search-icon">🔍</span>
          <input placeholder="Search biryani, dosa, coffee…" value={search} onChange={e=>setSearch(e.target.value)}/>
        </div>
        <div className="hero-stats">
          <div className="stat"><div className="stat-val">12 min</div><div className="stat-lbl">Avg prep</div></div>
          <div className="stat"><div className="stat-val">4.8 ★</div><div className="stat-lbl">Rating</div></div>
          <div className="stat"><div className="stat-val">100%</div><div className="stat-lbl">Cashless</div></div>
        </div>
      </div>
    </div>

    {/* Categories */}
    <div className="cats">
      {CATS.map(c=><div key={c} className={`cat ${cat===c?'active':''}`} onClick={()=>setCat(c)}>{c}</div>)}
    </div>

    {/* Last txn strip */}
    {lastTxn && <div style={{margin:'14px 20px 0',padding:'10px 14px',borderRadius:'var(--r)',background:'var(--surface2)',border:'1px solid var(--border)',fontSize:12,color:'var(--muted)',display:'flex',alignItems:'center',gap:8}}>
      <span style={{width:7,height:7,borderRadius:'50%',background:'var(--green)',display:'inline-block'}}/>
      Last payment: <strong style={{color:'var(--text)'}}>{lastTxn.status}</strong> · Txn {lastTxn.transactionId||'–'} · ₹{lastTxn.amount||0}
    </div>}

    {/* Grid */}
    <div className="menu-wrap">
      <div style={{fontSize:12,color:'var(--hint)',marginBottom:14}}>{filtered.length} items</div>
      <div className="grid">
        {filtered.map((item,i)=><MCard key={item.id} item={item} qty={getQty(item.id)} onAdd={add} onRemove={remove} delay={i*35}/>)}
      </div>
    </div>
  </div>;
}

            <div className="rpm-icon">{m.icon}</div>
            <div className="rpm-label">{m.label}</div>

        {/* Summary */}
        <div style={{background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:'var(--r)',padding:'12px 14px',marginBottom:14}}>
          <div style={{display:'flex',justifyContent:'space-between',fontSize:13,marginBottom:6}}>
            <span style={{color:'var(--muted)'}}>Recharge amount</span>
            <span style={{fontWeight:700}}>₹{finalAmt}</span>
          </div>
          <div style={{display:'flex',justifyContent:'space-between',fontSize:13,marginBottom:6}}>
            <span style={{color:'var(--muted)'}}>Transaction fee</span>

          <div style={{display:'flex',justifyContent:'space-between',fontSize:14,fontWeight:700,borderTop:'1px solid var(--border)',paddingTop:8,marginTop:8}}>

            <span style={{color:'var(--gold)',fontFamily:"'Syne',sans-serif",fontSize:16}}>

/* ── Payment Gateway Modal ── */
function PayGateway({total,method,onClose,onSuccess,showToast}){
  const [cardNum,setCardNum] = useState('');
  const [cardExp,setCardExp] = useState('');
  const [cardCvv,setCvv] = useState('');
  const [cardName,setCardName] = useState('');
  const [bank,setBank] = useState('');
  const [upiSent,setUpiSent] = useState(false);
  const [loading,setLoading] = useState(false);
  const upiLink = `upi://pay?pa=${encodeURIComponent(MERCHANT_UPI)}&pn=QwikBrew&am=${total}&cu=INR&tn=QwikBrew%20order`;

  const BANKS = [{id:'sbi',icon:'🏛️',name:'SBI'},{id:'hdfc',icon:'🔵',name:'HDFC'},{id:'icici',icon:'🟠',name:'ICICI'},{id:'axis',icon:'🟣',name:'Axis'}];

  const handlePay = async()=>{
    if(method==='UPI' && !upiSent){
      try{
        await api('/api/v1/payments/upi/collect',{method:'POST',body:JSON.stringify({userId:'demo',amount:total,upiId:MERCHANT_UPI,reference:`UPI-${Date.now()}`})});
      }catch{}
      setUpiSent(true);
      window.location.href = upiLink;
      showToast('Opening UPI app…','info');
      return;
    }
    if(method==='CARD'){
      if(!cardNum||!cardExp||!cardCvv||!cardName){showToast('Fill all card details','error');return;}
    }
    if(method==='NET_BANKING' && !bank){showToast('Select a bank','error');return;}

    setLoading(true);
    try{
      await api('/api/v1/payments/charge',{method:'POST',body:JSON.stringify({userId:'demo',amount:total,paymentMethod:method,reference:`REF-${Date.now()}`})});
    }catch{}
    await new Promise(r=>setTimeout(r,1400));
    setLoading(false);
    onSuccess({method,amount:total,transactionId:`TXN-${Date.now()}`,reference:`REF-${Date.now()}`});
  };

  const btnCls = {UPI:'upi-col',WALLET:'wallet-col',CARD:'card-col',NET_BANKING:'nb-col'}[method]||'upi-col';

  const cardVisualClass = {UPI:'upi-card',WALLET:'wallet-card-v',CARD:'card-v',NET_BANKING:'nb-card'}[method]||'upi-card';

  return <div className="modal-bg" onClick={onClose}>
    <div className="modal" onClick={e=>e.stopPropagation()}>
      <div className="modal-handle"/>
      <div className="modal-title-bar">
        <div>
          <div className="modal-title font-display">
            {method==='UPI'?'UPI Payment':method==='CARD'?'Card Payment':method==='NET_BANKING'?'Net Banking':'Wallet Payment'}
          </div>
          <div className="modal-sub">Secured · End-to-end encrypted</div>
        </div>
        <button className="close-x" onClick={onClose}>✕</button>
      </div>
      <div className="modal-body">
        {/* Animated payment card visual */}
        <div className={`pay-card-visual ${cardVisualClass}`}>
          <div className="card-shine"/>
          {method==='CARD' && <>
            <div className="card-chip"/>
            <div className="card-logo">💳</div>
            <div className="card-num">{cardNum ? cardNum.replace(/(.{4})/g,'$1 ').trim() : '•••• •••• •••• ••••'}</div>
            <div className="card-label">CARD NUMBER</div>
            <div className="card-network">VISA / MC</div>
          </>}
          {method==='UPI' && <>
            <div className="card-amount">
              <div className="card-amount-label">AMOUNT TO PAY</div>
              <div className="card-amount-val">₹{total}</div>
            </div>
            <div style={{position:'absolute',bottom:16,left:18,fontSize:12,opacity:.5,fontWeight:600}}>UPI · {MERCHANT_UPI.slice(0,14)}…</div>
            <div style={{position:'absolute',top:16,right:18,fontSize:20,opacity:.6}}>📱</div>
          </>}
          {method==='NET_BANKING' && <>
            <div className="card-amount">
              <div className="card-amount-label">AMOUNT TO PAY</div>
              <div className="card-amount-val">₹{total}</div>
            </div>
            <div style={{position:'absolute',bottom:16,left:18,fontSize:12,opacity:.5,fontWeight:600}}>NET BANKING</div>
            <div style={{position:'absolute',top:16,right:18,fontSize:20,opacity:.6}}>🏦</div>
          </>}
        </div>

        {/* UPI section */}
        {method==='UPI' && <>
          <div className="upi-id-bar">
            <div>
              <div style={{fontSize:11,color:'var(--muted)',marginBottom:3}}>PAY TO UPI ID</div>
              <div className="upi-id-val">{MERCHANT_UPI}</div>
            </div>
            <div className="upi-id-copy" onClick={()=>{navigator.clipboard?.writeText(MERCHANT_UPI);showToast('Copied!','success');}}>Copy</div>
          </div>
          <div style={{marginBottom:10,fontSize:12,color:'var(--muted)',fontWeight:600,letterSpacing:'.3px'}}>PAY WITH APP</div>
          <div className="upi-apps">
            {[{name:'PhonePe',icon:'💜'},{name:'GPay',icon:'🟢'},{name:'Paytm',icon:'🔵'},{name:'BHIM',icon:'🟡'}].map(a=><div key={a.name} className="upi-app" onClick={()=>{window.location.href=upiLink;showToast(`Opening ${a.name}…`,'info');}}>
              <div className="upi-app-icon">{a.icon}</div>
              <div className="upi-app-name">{a.name}</div>
            </div>)}
          </div>
          {upiSent && <div className="qr-wrap">
            <img className="qr-img" src={`https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(upiLink)}&bgcolor=1C1C22&color=FF6B35`} alt="QR"/>
            <div className="qr-hint">Scan with any UPI app</div>
          </div>}
        </>}

        {/* Card section */}
        {method==='CARD' && <>
          <div className="card-field">
            <label>CARD NUMBER</label>
            <input className="card-input" placeholder="1234 5678 9012 3456" maxLength={19}
              value={cardNum} onChange={e=>setCardNum(e.target.value.replace(/[^\d]/g,'').replace(/(.{4})/g,'$1 ').trim())}/>
          </div>
          <div className="card-field">
            <label>CARDHOLDER NAME</label>
            <input className="card-input" placeholder="Name on card" value={cardName} onChange={e=>setCardName(e.target.value)}/>
          </div>
          <div className="card-row">
            <div className="card-field">
              <label>EXPIRY</label>
              <input className="card-input" placeholder="MM / YY" maxLength={7}
                value={cardExp} onChange={e=>{let v=e.target.value.replace(/[^\d]/g,'');if(v.length>=3)v=v.slice(0,2)+' / '+v.slice(2);setCardExp(v);}}/>
            </div>
            <div className="card-field">
              <label>CVV</label>
              <input className="card-input" placeholder="•••" maxLength={3} type="password"
                value={cardCvv} onChange={e=>setCvv(e.target.value.replace(/[^\d]/g,''))}/>
            </div>
          </div>
        </>}

        {/* Net Banking */}
        {method==='NET_BANKING' && <>
          <div style={{marginBottom:10,fontSize:12,color:'var(--muted)',fontWeight:600,letterSpacing:'.3px'}}>SELECT BANK</div>
          <div className="bank-grid">
            {BANKS.map(b=><div key={b.id} className={`bank-btn ${bank===b.id?'sel-bank':''}`} onClick={()=>setBank(b.id)}>
              <div className="bank-icon">{b.icon}</div>
              <div className="bank-name">{b.name}</div>
            </div>)}
          </div>
          <div className="card-field">
            <label>OR ENTER BANK NAME</label>
            <input className="card-input" placeholder="Enter your bank…" value={bank==='custom'?'':bank} onChange={e=>setBank(e.target.value)}/>
          </div>
        </>}

        {/* Amount summary */}
        <div style={{background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:'var(--r)',padding:'12px 14px',marginBottom:14}}>
          <div style={{display:'flex',justifyContent:'space-between',fontSize:14,fontWeight:700}}>
            <span style={{color:'var(--muted)'}}>Amount payable</span>
            <span style={{fontFamily:"'Syne',sans-serif",fontSize:18,color:'var(--brand)'}}>₹{total}</span>
          </div>
        </div>

        <button className={`pay-confirm-btn ${btnCls} font-display`} onClick={handlePay} disabled={loading}>
          {loading ? '⏳ Processing payment…'
            : method==='UPI' && !upiSent ? `Send ₹${total} via UPI`
            : method==='UPI' ? `Confirm payment ₹${total}`
            : `Pay ₹${total}`}
        </button>
      </div>
    </div>
  </div>;
}

      <div className="success-sub">{data.type==='recharge'?`₹${data.amount} added to your wallet`:`Order placed successfully`}</div>
      <div className="success-detail">
        {data.transactionId && <div className="success-row"><span className="success-row-label">Txn ID</span><span className="success-row-val">{data.transactionId.slice(-12)}</span></div>}
        <div className="success-row"><span className="success-row-label">Amount</span><span className="success-row-val" style={{color:'var(--brand)'}}>₹{data.amount}</span></div>
        {data.method && <div className="success-row"><span className="success-row-label">Method</span><span className="success-row-val">{data.method.replace('_',' ')}</span></div>}
        <div className="success-row"><span className="success-row-label">Status</span><span className="success-row-val" style={{color:'var(--green)'}}>SUCCESS</span></div>
      </div>
      <button className="success-close font-display" onClick={onClose}>
        {data.type==='recharge'?'Back to Wallet':'View Orders'}
      </button>
    </div>
  </div>;
}

/* ── Cart ── */
function Cart({cart,setCart,open,onClose,showToast,walletBal,setWalletBal,onOpenWallet}){
  const [payMethod,setPayMethod] = useState('WALLET');
  const [gatewayOpen,setGatewayOpen] = useState(false);
  const [placing,setPlacing] = useState(false);
  const [success,setSuccess] = useState(null);
  const total = cart.reduce((s,i)=>s+i.price*i.qty,0);

  const addItem = id=>setCart(c=>c.map(x=>x.id===id?{...x,qty:x.qty+1}:x));
  const remItem = id=>setCart(c=>c.map(x=>x.id===id?{...x,qty:x.qty-1}:x).filter(x=>x.qty>0));

  const placeOrder = async()=>{
    if(payMethod==='WALLET'){
      if(walletBal<total){showToast(`Insufficient balance. Have ₹${walletBal}`,'error');return;}
      setPlacing(true);
      try{
        await api('/api/v1/orders',{method:'POST',body:JSON.stringify({userId:'demo',items:cart.map(i=>({menuItemId:i.id,menuItemName:i.name,quantity:i.qty,unitPrice:i.price})),totalAmount:total,paymentMethod:'WALLET'})});
      }catch{}
      const txnId = `TXN-${Date.now()}`;
      setWalletBal(b=>b-total);
      localStorage.setItem('qb_last_txn',JSON.stringify({status:'SUCCESS',transactionId:txnId,amount:total,method:'WALLET'}));
      setPlacing(false);
      setSuccess({type:'order',amount:total,method:'WALLET',transactionId:txnId});
      setCart([]);
    } else {
      setGatewayOpen(true);
    }
  };

  const onGatewaySuccess = (data)=>{
    setGatewayOpen(false);
    localStorage.setItem('qb_last_txn',JSON.stringify({status:'SUCCESS',...data}));
    setSuccess({type:'order',...data});
    setCart([]);
  };

  const METHODS = [{id:'WALLET',icon:'👛',label:'Wallet'},{id:'UPI',icon:'📱',label:'UPI'},{id:'CARD',icon:'💳',label:'Card'},{id:'NET_BANKING',icon:'🏦',label:'NetBanking'}];

  return <>
    {open && <div className="overlay" onClick={onClose}/>}
    <div className={`cart ${open?'open':''}`}>
      <div className="cart-head">
        <h3 className="font-display">Your Cart <span style={{fontWeight:400,fontSize:14,color:'var(--muted)'}}>({cart.length})</span></h3>
        <button className="close-x" onClick={onClose}>✕</button>
      </div>
      <div className="cart-body">
        {cart.length===0
          ? <div className="cart-empty-wrap"><span>🛒</span><p>Your cart is empty.<br/>Add something delicious!</p></div>
          : cart.map(item=><div key={item.id} className="c-item">
              <div className="c-item-emoji">{item.emoji||'🍽️'}</div>
              <div className="c-item-info">
                <div className="c-item-name">{item.name}</div>
                <div className="c-item-price">₹{item.price} × {item.qty} = ₹{item.price*item.qty}</div>
              </div>
              <div className="qty-row">
                <button className="qty-btn" style={{width:28,height:28,fontSize:14}} onClick={()=>remItem(item.id)}>−</button>
                <span className="qty-num" style={{fontSize:13}}>{item.qty}</span>
                <button className="qty-btn" style={{width:28,height:28,fontSize:14}} onClick={()=>addItem(item.id)}>+</button>
              </div>
            </div>)
        }
      </div>
      {cart.length>0 && <div className="cart-foot">
        <div className="wallet-mini">
          <div>
            <div className="wallet-mini-left">Wallet Balance</div>
            <div className="wallet-mini-bal font-display">₹{walletBal.toLocaleString('en-IN')}</div>
          </div>
          <div className="wallet-mini-add" onClick={()=>{onClose();onOpenWallet();}}>+ Recharge</div>
        </div>
        <div className="cart-total">
          <span style={{fontSize:14,color:'var(--muted)'}}>Total</span>
          <span className="cart-total-amt font-display">₹{total}</span>
        </div>
        <div className="pay-grid">
          {METHODS.map(m=><div key={m.id} className={`pay-btn ${payMethod===m.id?'sel':''}`} onClick={()=>setPayMethod(m.id)}>
            <span className="pay-icon">{m.icon}</span>{m.label}
          </div>)}
        </div>
        <button className="order-btn font-display" onClick={placeOrder} disabled={placing}>
          {placing?'Placing order…':`Pay & Order · ₹${total}`}
        </button>
      </div>}
    </div>

    {gatewayOpen && <PayGateway total={total} method={payMethod} onClose={()=>setGatewayOpen(false)} onSuccess={onGatewaySuccess} showToast={showToast}/>}
    {success && <SuccessOverlay data={success} onClose={()=>{setSuccess(null);onClose();}}/>}
  </>;
}

/* ── Profile ── */
function ProfileScreen({user,onLogout,showToast,walletBal,setWalletBal}){
  const [walletOpen,setWalletOpen] = useState(false);
  const [success,setSuccess] = useState(null);
  const initials = (user.name||'U').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();

  return <div className="profile-page">
    <div className="profile-hero-bg">
      <div className="avatar-wrap">
        <div className="avatar-ring"/>
        <div className="avatar-inner font-display">{initials}</div>
      </div>
      <div className="p-name font-display">{user.name}</div>
      <div className="p-email">{user.email}</div>
    </div>

    {/* Wallet card */}
    <div className="wallet-big">
      <div className="wb-top">
        <div className="wb-label">Café Wallet</div>
        <div className="wb-bal font-display">₹{walletBal.toLocaleString('en-IN')}</div>
        <div className="wb-user">{user.name}</div>
      </div>
      <div className="wb-bottom">
        <button className="wb-recharge-btn font-display" onClick={()=>setWalletOpen(true)}>
          <span>＋</span> Recharge Wallet
        </button>
        <div className="wb-txns">
          <div className="wb-stat"><div className="wb-stat-val font-display">₹500</div><div className="wb-stat-lbl">Total spent</div></div>
          <div className="wb-stat"><div className="wb-stat-val font-display">12</div><div className="wb-stat-lbl">Orders placed</div></div>
        </div>
      </div>
    </div>

    <div className="profile-list">
      {[
        {icon:'👤',label:'Edit Profile',action:()=>showToast('Coming soon!','info')},
        {icon:'🔔',label:'Notifications',action:()=>showToast('All notifications on','success')},
        {icon:'📜',label:'Transaction History',action:()=>showToast('Coming soon!','info')},
        {icon:'⭐',label:'Rate QwikBrew',action:()=>showToast('Thanks for the love! ⭐','success')},
        {icon:'🎧',label:'Help & Support',action:()=>showToast('support@qwikbrew.in','info')},
      ].map(item=><div key={item.label} className="pl-item" onClick={item.action}>
        <div className="pl-icon">{item.icon}</div>
        <div className="pl-text">{item.label}</div>
        <div className="pl-arrow">›</div>
      </div>)}
    </div>

    <button className="logout-btn font-display" onClick={onLogout}>Sign Out</button>
    <p style={{textAlign:'center',color:'var(--hint)',fontSize:11,paddingBottom:20}}>QwikBrew · Spring Boot 3.5 + React 18 · {BUILD}</p>

    {walletOpen && <WalletModal showToast={showToast} onClose={()=>setWalletOpen(false)}
      onSuccess={(amt)=>{setWalletBal(b=>b+amt);setWalletOpen(false);setSuccess({type:'recharge',amount:amt});}}/>}
    {success && <SuccessOverlay data={success} onClose={()=>setSuccess(null)}/>}
  </div>;
}

/* ── Auth ── */
function AuthScreen({onLogin}){
  const [mode,setMode] = useState('login');
  const [form,setForm] = useState({name:'',email:'',password:'',phone:''});
  const [loading,setLoading] = useState(false);
  const [error,setError] = useState('');
  const [toast,setToast] = useState(null);
  const showT = (m,t='success')=>{setToast({msg:m,type:t});setTimeout(()=>setToast(null),3000);};

  const handle = async(e)=>{
    e.preventDefault();setError('');setLoading(true);
    try{
      let data;
      if(mode==='login'){data=await api('/api/v1/users/login',{method:'POST',body:JSON.stringify({email:form.email,password:form.password})});}
      else{data=await api('/api/v1/users/register',{method:'POST',body:JSON.stringify(form)});showT('Account created! Sign in.');setMode('login');setLoading(false);return;}
      localStorage.setItem('token',data.accessToken||data.token||'');
      localStorage.setItem('user',JSON.stringify(data.user||{name:form.email.split('@')[0],email:form.email,walletBalance:500}));
      onLogin(data);
    }catch(err){
      if(mode==='login'){
        localStorage.setItem('token','demo');
        localStorage.setItem('user',JSON.stringify({name:form.email.split('@')[0]||'Employee',email:form.email,walletBalance:500}));
        onLogin({user:{name:form.email.split('@')[0],email:form.email,walletBalance:500}});
      } else setError(err.message);
    }
    setLoading(false);
  };

  return <div className="auth-page">
    {toast && <Toast msg={toast.msg} type={toast.type}/>}
    <div className="auth-blob ab1"/><div className="auth-blob ab2"/>
    <div className="auth-box">
      <div className="auth-logo">
        <div className="auth-logo-big">☕</div>
        <h1 className="font-display"><span>Qwik</span>Brew</h1>
        <p>Corporate Café — Order smart, eat well</p>
      </div>
      <div className="auth-tabs">
        {['login','register'].map(m=><button key={m} className={`auth-tab ${mode===m?'active':''}`} onClick={()=>setMode(m)}>{m==='login'?'Sign In':'Register'}</button>)}
      </div>
      <form onSubmit={handle}>
        {mode==='register' && <>
          <div className="form-g"><label>FULL NAME</label><input placeholder="Your full name" value={form.name} onChange={e=>setForm({...form,name:e.target.value})} required/></div>
          <div className="form-g"><label>PHONE</label><input placeholder="10-digit mobile" value={form.phone} onChange={e=>setForm({...form,phone:e.target.value})} required/></div>
        </>}
        <div className="form-g"><label>EMAIL</label><input type="email" placeholder="work@company.in" value={form.email} onChange={e=>setForm({...form,email:e.target.value})} required/></div>
        <div className="form-g"><label>PASSWORD</label><input type="password" placeholder="••••••••" value={form.password} onChange={e=>setForm({...form,password:e.target.value})} required/></div>
        {error && <p className="form-err">{error}</p>}
        <button type="submit" className="auth-submit font-display" disabled={loading}>{loading?'Processing…':mode==='login'?'Sign In →':'Create Account →'}</button>
      </form>
      <div className="auth-switch">{mode==='login'?'New here? ':'Already have account? '}<a onClick={()=>setMode(mode==='login'?'register':'login')}>{mode==='login'?'Create account':'Sign in'}</a></div>
    </div>
  </div>;
}

/* ── App shell ── */
function App(){
  const [page,setPage] = useState('menu');
  const [cart,setCart] = useState([]);
  const [cartOpen,setCartOpen] = useState(false);
  const [walletOpen,setWalletOpen] = useState(false);
  const [toast,setToast] = useState(null);
  const [success,setSuccess] = useState(null);
  const [user,setUser] = useState(()=>{try{return JSON.parse(localStorage.getItem('user')||'null')}catch{return null}});
  const [walletBal,setWalletBal] = useState(()=>{
    const s = Number(localStorage.getItem('qb_wallet'));
    return(!isNaN(s)&&s>=0)?s:500;
  });

  useEffect(()=>{localStorage.setItem('qb_wallet',String(walletBal));},[walletBal]);

  let tTimer;
  const showToast = useCallback((msg,type='success')=>{
    setToast({msg,type});clearTimeout(tTimer);tTimer=setTimeout(()=>setToast(null),3000);
  },[]);

  const logout = ()=>{localStorage.clear();setUser(null);setCart([]);};
  const totalQty = cart.reduce((s,i)=>s+i.qty,0);

  if(!user) return <AuthScreen onLogin={d=>{setUser(d.user||JSON.parse(localStorage.getItem('user')));}} />;

  const navItems = [{id:'menu',icon:'🍽️',label:'Menu'},{id:'orders',icon:'📋',label:'Orders'},{id:'profile',icon:'👤',label:'Profile'}];

  return <>
    {toast && <Toast msg={toast.msg} type={toast.type}/>}

    <nav>
      <div className="nav-logo">
        <div className="nav-logo-mark">☕</div>
        <div className="nav-logo-text font-display"><span>Qwik</span>Brew</div>
        <div className="nav-pill">NEW</div>
      </div>
      <div className="nav-right">
        <div className="wallet-chip" onClick={()=>setWalletOpen(true)}>
          <div className="wallet-dot"/>
          <span className="font-display">₹{walletBal.toLocaleString('en-IN')}</span>
        </div>
        <div className="nav-greeting">Hi, {(user.name||'').split(' ')[0]} 👋</div>
        <div className="cart-fab" onClick={()=>setCartOpen(true)}>
          🛒
          {totalQty>0 && <span className="cart-badge" key={totalQty}>{totalQty}</span>}
        </div>
      </div>
    </nav>

    <div style={{flex:1,position:'relative',zIndex:1}}>
      {page==='menu'    && <MenuScreen cart={cart} setCart={setCart} showToast={showToast} walletBal={walletBal}/>}
      {page==='orders'  && <OrdersScreen/>}
      {page==='profile' && <ProfileScreen user={user} onLogout={logout} showToast={showToast} walletBal={walletBal} setWalletBal={setWalletBal}/>}
    </div>

    <Cart cart={cart} setCart={setCart} open={cartOpen} onClose={()=>setCartOpen(false)}
      showToast={showToast} walletBal={walletBal} setWalletBal={setWalletBal}
      onOpenWallet={()=>setWalletOpen(true)}/>

    {walletOpen && <WalletModal showToast={showToast} onClose={()=>setWalletOpen(false)}
      onSuccess={(amt)=>{setWalletBal(b=>b+amt);setWalletOpen(false);setSuccess({type:'recharge',amount:amt,transactionId:`TXN-${Date.now()}`});}}/>}

    {success && <SuccessOverlay data={success} onClose={()=>setSuccess(null)}/>}

    {/* Bottom nav */}
    <div className="bnav">
      <div className="bnav-row">
        {navItems.map(n=><div key={n.id} className={`bnav-i ${page===n.id?'active':''}`} onClick={()=>setPage(n.id)}>
          <div className="bnav-icon">{n.icon}</div>
          <span>{n.label}</span>
        </div>)}
        <div className="bnav-i" onClick={()=>setCartOpen(true)}>
          <div className="bnav-icon" style={{position:'relative'}}>
            🛒
            {totalQty>0 && <span style={{position:'absolute',top:-6,right:-6,background:'var(--brand)',color:'#fff',borderRadius:'50%',width:15,height:15,fontSize:8,display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700,border:'2px solid var(--bg)'}}>{totalQty}</span>}
          </div>
          <span>Cart</span>
        </div>
      </div>
    </div>
  </>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
