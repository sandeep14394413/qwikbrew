<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<meta http-equiv="Cache-Control" content="no-cache"/>
<title>QwikBrew &mdash; Corporate Café</title>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.4/babel.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
  --brand:#FF6B35;--brand2:#FF8C42;--bgl:rgba(255,107,53,.18);
  --gold:#F5A623;--ggl:rgba(245,166,35,.16);
  --green:#22C55E;--grl:rgba(34,197,94,.14);
  --blue:#3B82F6;--bll:rgba(59,130,246,.14);
  --red:#EF4444;--rdl:rgba(239,68,68,.14);
  --bg:#0B0B0E;--s1:#141418;--s2:#1C1C22;--s3:#242430;
  --b1:rgba(255,255,255,.065);--b2:rgba(255,255,255,.11);--b3:rgba(255,255,255,.17);
  --tx:#F0EFE8;--muted:#8A8896;--hint:#4A4858;
  --r:14px;--rl:20px;--rxl:26px;
  --ff:'DM Sans',system-ui,sans-serif;--fd:'Syne',system-ui,sans-serif;
}
html{-webkit-tap-highlight-color:transparent;scroll-behavior:smooth;}
body{
  font-family:var(--ff);background:var(--bg);color:var(--tx);
  overflow-x:hidden;min-height:100vh;line-height:1.5;
  background-image:
    radial-gradient(ellipse 55% 35% at 15% 8%,rgba(255,107,53,.07) 0%,transparent 60%),
    radial-gradient(ellipse 40% 55% at 85% 85%,rgba(245,166,35,.05) 0%,transparent 60%);
}
#root{min-height:100vh;display:flex;flex-direction:column;}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:var(--hint);border-radius:2px;}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes ss{from{opacity:0;transform:scale(.88)}to{opacity:1;transform:scale(1)}}
@keyframes sfr{from{transform:translateX(110%)}to{transform:none}}
@keyframes sfb{from{opacity:0;transform:translateY(100%)}to{opacity:1;transform:none}}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
@keyframes gp{0%,100%{opacity:.45}50%{opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes shimmer{0%{left:-100%}100%{left:160%}}
@keyframes pr{0%{transform:translate(-50%,-50%) scale(.9);opacity:.7}100%{transform:translate(-50%,-50%) scale(1.22);opacity:0}}
@keyframes float{0%,100%{transform:translate(0,0)}33%{transform:translate(7px,-9px)}66%{transform:translate(-5px,5px)}}
.fd{font-family:var(--fd)!important;}
nav{
  position:sticky;top:0;z-index:200;height:60px;
  background:rgba(11,11,14,.88);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--b1);
  display:flex;align-items:center;justify-content:space-between;padding:0 16px;
}
.nl{display:flex;align-items:center;gap:9px;}
.nm{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,var(--brand),var(--brand2));display:flex;align-items:center;justify-content:center;font-size:17px;animation:bob 3.5s ease-in-out infinite;box-shadow:0 0 18px rgba(255,107,53,.35);flex-shrink:0;}
.nname{font-family:var(--fd);font-size:17px;font-weight:800;letter-spacing:-.2px;}
.nname span{color:var(--brand);}
.nbadge{font-size:9px;font-weight:700;letter-spacing:.7px;text-transform:uppercase;background:rgba(255,107,53,.14);border:1px solid rgba(255,107,53,.26);color:var(--brand);padding:3px 7px;border-radius:999px;}
.nr{display:flex;align-items:center;gap:9px;}
.nwallet{display:flex;align-items:center;gap:6px;cursor:pointer;background:var(--s2);border:1px solid var(--b2);border-radius:999px;padding:5px 11px 5px 7px;font-size:13px;font-weight:600;transition:border-color .2s,box-shadow .2s;white-space:nowrap;}
.nwallet:hover{border-color:var(--gold);box-shadow:0 0 14px var(--ggl);}
.nwdot{width:7px;height:7px;border-radius:50%;background:var(--gold);flex-shrink:0;}
.nhi{font-size:12px;color:var(--muted);white-space:nowrap;}
.ncart{position:relative;width:36px;height:36px;border-radius:11px;background:var(--s2);border:1px solid var(--b1);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:border-color .2s,background .2s;flex-shrink:0;}
.ncart:hover{border-color:var(--brand);background:var(--bgl);}
.ncb{position:absolute;top:-5px;right:-5px;width:17px;height:17px;border-radius:50%;background:var(--brand);color:#fff;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;border:2px solid var(--bg);animation:ss .3s cubic-bezier(.34,1.56,.64,1) both;}
.hero{position:relative;z-index:1;padding:40px 16px 32px;overflow:hidden;text-align:center;}
.hbadge{display:inline-flex;align-items:center;gap:7px;background:var(--s2);border:1px solid var(--b2);border-radius:999px;padding:5px 13px;font-size:12px;margin-bottom:17px;animation:fadeUp .5s ease both;}
.hbdot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:gp 1.6s ease-in-out infinite;}
.hbdot-t{color:var(--muted);}
.htitle{font-family:var(--fd);font-size:clamp(27px,5.5vw,46px);font-weight:800;line-height:1.1;letter-spacing:-.4px;margin-bottom:11px;animation:fadeUp .5s .07s ease both;}
.htitle em{font-style:normal;background:linear-gradient(90deg,var(--brand),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.hsub{color:var(--muted);font-size:14px;margin-bottom:24px;animation:fadeUp .5s .14s ease both;}
.hsearch{position:relative;max-width:420px;margin:0 auto;animation:fadeUp .5s .2s ease both;}
.hsearch input{width:100%;padding:12px 16px 12px 44px;background:var(--s2);border:1px solid var(--b2);border-radius:999px;color:var(--tx);font-family:var(--ff);font-size:14px;outline:none;transition:border-color .2s,box-shadow .2s;}
.hsearch input::placeholder{color:var(--hint);}
.hsearch input:focus{border-color:var(--brand);box-shadow:0 0 0 3px var(--bgl);}
.hsico{position:absolute;left:15px;top:50%;transform:translateY(-50%);color:var(--hint);font-size:15px;pointer-events:none;}
.hstats{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;max-width:400px;margin:20px auto 0;animation:fadeUp .5s .27s ease both;}
.hstat{background:var(--s2);border:1px solid var(--b1);border-radius:var(--r);padding:10px 6px;text-align:center;transition:border-color .2s,transform .2s;}
.hstat:hover{border-color:var(--b2);transform:translateY(-2px);}
.hsval{font-family:var(--fd);font-size:15px;font-weight:700;}
.hslbl{font-size:10px;color:var(--muted);margin-top:2px;}
.cats{display:flex;gap:7px;padding:12px 16px 9px;overflow-x:auto;scrollbar-width:none;position:sticky;top:60px;z-index:100;background:rgba(11,11,14,.92);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border-bottom:1px solid var(--b1);}
.cats::-webkit-scrollbar{display:none;}
.cat{flex-shrink:0;padding:6px 14px;border-radius:999px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;border:1px solid var(--b1);color:var(--muted);background:transparent;transition:all .2s;user-select:none;}
.cat:hover{border-color:var(--b2);color:var(--tx);}
.cat.on{background:var(--brand);border-color:var(--brand);color:#fff;box-shadow:0 0 14px var(--bgl);}
.mwrap{padding:16px 16px 110px;position:relative;z-index:1;}
.mcount{font-size:11px;color:var(--hint);margin-bottom:12px;}
.mgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:14px;}
.mcard{background:var(--s1);border:1px solid var(--b1);border-radius:var(--rl);overflow:hidden;cursor:pointer;position:relative;transition:transform .25s cubic-bezier(.34,1.2,.64,1),border-color .2s,box-shadow .2s;animation:fadeUp .5s ease both;}
.mcard::before{content:'';position:absolute;inset:0;border-radius:inherit;z-index:1;pointer-events:none;background:linear-gradient(125deg,rgba(255,255,255,.03) 0%,transparent 55%);}
.mcard:hover{transform:translateY(-5px);border-color:var(--b2);box-shadow:0 18px 40px rgba(0,0,0,.44);}
.mcard:hover .mcimg{transform:scale(1.07);}
.mciw{height:160px;overflow:hidden;position:relative;background:var(--s2);}
.mcimg{width:100%;height:100%;object-fit:cover;transition:transform .4s ease;display:block;}
.mcph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:42px;}
.mctags{position:absolute;top:9px;left:9px;display:flex;gap:5px;z-index:2;}
.mctag{font-size:9px;font-weight:700;letter-spacing:.3px;padding:3px 8px;border-radius:999px;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);}
.tveg{background:rgba(34,197,94,.82);color:#fff;}
.tnveg{background:rgba(239,68,68,.82);color:#fff;}
.ttop{background:rgba(255,107,53,.82);color:#fff;}
.mcbody{padding:12px 13px 14px;}
.mcmeta{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;}
.mcrating{font-size:12px;color:var(--gold);font-weight:600;}
.mctime{font-size:11px;color:var(--hint);}
.mcname{font-family:var(--fd);font-size:14px;font-weight:800;margin-bottom:3px;line-height:1.3;}
.mcdesc{font-size:11px;color:var(--muted);margin-bottom:10px;line-height:1.5;}
.mcfoot{display:flex;align-items:center;justify-content:space-between;}
.mcprice{font-family:var(--fd);font-size:18px;font-weight:800;}
.mcprice sup{font-size:11px;font-weight:500;color:var(--muted);vertical-align:top;margin-top:4px;margin-right:1px;}
.abtn{width:34px;height:34px;border-radius:50%;border:none;background:var(--brand);color:#fff;cursor:pointer;font-size:20px;line-height:1;display:flex;align-items:center;justify-content:center;transition:all .2s cubic-bezier(.34,1.56,.64,1);box-shadow:0 4px 14px rgba(255,107,53,.4);}
.abtn:hover{transform:scale(1.13);box-shadow:0 6px 18px rgba(255,107,53,.5);}
.abtn:active{transform:scale(.9);}
.qrow{display:flex;align-items:center;gap:9px;}
.qbtn{width:28px;height:28px;border-radius:50%;border:1.5px solid var(--brand);background:transparent;color:var(--brand);font-size:15px;font-weight:700;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .18s;}
.qbtn:hover{background:var(--brand);color:#fff;}
.qnum{font-family:var(--fd);font-weight:800;font-size:13px;min-width:17px;text-align:center;}
.spinwrap{display:flex;align-items:center;justify-content:center;padding:80px;}
.spinner{width:34px;height:34px;border:3px solid var(--b2);border-top-color:var(--brand);border-radius:50%;animation:spin .7s linear infinite;}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:300;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);animation:fadeIn .2s ease both;}
.cside{position:fixed;right:0;top:0;bottom:0;width:385px;background:var(--s1);border-left:1px solid var(--b2);z-index:400;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .35s cubic-bezier(.34,1.1,.64,1);}
.cside.open{transform:none;}
.cshd{padding:16px 18px;border-bottom:1px solid var(--b1);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.csttl{font-family:var(--fd);font-size:17px;font-weight:800;}
.cscnt{font-weight:400;font-size:12px;color:var(--muted);margin-left:5px;}
.xbtn{width:32px;height:32px;border-radius:10px;border:1px solid var(--b1);background:transparent;color:var(--muted);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .18s;}
.xbtn:hover{border-color:var(--brand);color:var(--brand);}
.csbody{flex:1;overflow-y:auto;padding:13px 18px;}
.csempty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:11px;color:var(--hint);text-align:center;}
.csempty span{font-size:50px;animation:bob 3s ease-in-out infinite;}
.csempty p{font-size:13px;line-height:1.5;}
.ci{display:flex;align-items:center;gap:11px;padding:11px 0;border-bottom:1px solid var(--b1);animation:fadeUp .3s ease both;}
.ciem{font-size:24px;flex-shrink:0;width:37px;text-align:center;}
.ciinfo{flex:1;min-width:0;}
.ciname{font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ciprice{font-size:11px;color:var(--brand);font-weight:700;margin-top:2px;}
.csfoot{padding:15px 18px;border-top:1px solid var(--b1);flex-shrink:0;}
.wm{background:linear-gradient(135deg,rgba(245,166,35,.1),rgba(245,166,35,.04));border:1px solid rgba(245,166,35,.2);border-radius:var(--r);padding:10px 12px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;}
.wml{font-size:11px;color:var(--muted);margin-bottom:2px;}
.wmbal{font-family:var(--fd);font-size:16px;font-weight:800;color:var(--gold);}
.wmbtn{font-size:11px;font-weight:700;color:var(--gold);background:rgba(245,166,35,.11);border:1px solid rgba(245,166,35,.25);padding:4px 9px;border-radius:999px;cursor:pointer;transition:all .18s;white-space:nowrap;}
.wmbtn:hover{background:rgba(245,166,35,.2);}
.cstotal{display:flex;justify-content:space-between;font-size:14px;font-weight:700;margin-bottom:12px;}
.cstamt{font-family:var(--fd);font-size:18px;color:var(--brand);}
.pmg{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:12px;}
.pm{padding:9px 6px;border-radius:var(--r);border:1px solid var(--b1);background:var(--s2);color:var(--muted);font-size:11px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:6px;cursor:pointer;transition:all .18s;}
.pm:hover{border-color:var(--b2);color:var(--tx);}
.pm.on{border-color:var(--brand);background:var(--bgl);color:var(--brand);}
.pmico{font-size:14px;}
.obtn{width:100%;padding:13px;border-radius:var(--r);border:none;background:linear-gradient(135deg,var(--brand),var(--brand2));color:#fff;font-family:var(--fd);font-size:14px;font-weight:800;cursor:pointer;transition:all .22s;position:relative;overflow:hidden;box-shadow:0 8px 22px rgba(255,107,53,.3);letter-spacing:.1px;}
.obtn::before{content:'';position:absolute;top:0;left:-100%;width:55%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.13),transparent);transition:left .5s;}
.obtn:hover::before{left:180%;}
.obtn:hover{transform:translateY(-2px);box-shadow:0 12px 26px rgba(255,107,53,.4);}
.obtn:active{transform:scale(.97);}
.obtn:disabled{opacity:.6;cursor:not-allowed;transform:none!important;}
.mdbg{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.78);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);display:flex;align-items:flex-end;justify-content:center;animation:fadeIn .2s ease both;}
@media(min-width:600px){.mdbg{align-items:center;padding:20px;}}
.modal{width:100%;max-width:460px;background:var(--s1);border-radius:var(--rxl) var(--rxl) 0 0;max-height:92vh;display:flex;flex-direction:column;animation:sfb .35s cubic-bezier(.34,1.1,.64,1) both;}
@media(min-width:600px){.modal{border-radius:var(--rxl);max-height:88vh;animation-name:ss;}}
.mdhndl{width:38px;height:4px;background:var(--b3);border-radius:2px;margin:11px auto 0;flex-shrink:0;}
.mdhdr{padding:14px 18px 12px;display:flex;align-items:flex-start;justify-content:space-between;flex-shrink:0;}
.mdttl{font-family:var(--fd);font-size:16px;font-weight:800;}
.mdsub{font-size:11px;color:var(--muted);margin-top:3px;}
.mdbody{padding:0 18px 19px;overflow-y:auto;flex:1;}
.pcv{height:152px;border-radius:var(--rl);margin-bottom:16px;position:relative;overflow:hidden;}
.pcv-upi{background:linear-gradient(135deg,#0f0c29,#1a1450,#0f3460);}
.pcv-card{background:linear-gradient(135deg,#0d1117,#1c1f26,#2d333d);}
.pcv-nb{background:linear-gradient(135deg,#0a1628,#0d2040,#1a3a6e);}
.pcvshine{position:absolute;top:0;left:-100%;width:45%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.04),transparent);animation:shimmer 3.5s ease-in-out infinite;}
.pcvchip{position:absolute;top:20px;left:20px;width:33px;height:25px;border-radius:4px;background:linear-gradient(135deg,rgba(255,255,255,.13),rgba(255,255,255,.04));border:1px solid rgba(255,255,255,.1);}
.pcvlogo{position:absolute;top:16px;right:17px;font-size:20px;opacity:.72;}
.pcvnet{position:absolute;bottom:15px;right:17px;font-size:10px;font-weight:700;letter-spacing:.5px;opacity:.48;}
.pcvnum{position:absolute;bottom:37px;left:20px;font-family:var(--fd);font-size:13px;letter-spacing:2px;opacity:.62;}
.pcvlbl{position:absolute;bottom:15px;left:20px;font-size:9px;opacity:.42;letter-spacing:.5px;}
.pcvcenter{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;}
.pcvalbl{font-size:10px;opacity:.48;margin-bottom:4px;letter-spacing:.5px;}
.pcvaval{font-family:var(--fd);font-size:26px;font-weight:800;color:#fff;}
.upibar{background:var(--s2);border:1px solid var(--b2);border-radius:var(--r);padding:10px 12px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;gap:10px;}
.upiidl{font-size:10px;color:var(--muted);margin-bottom:3px;}
.upiid{font-family:var(--fd);font-size:13px;font-weight:700;color:var(--brand);word-break:break-all;}
.upicopy{font-size:10px;color:var(--muted);cursor:pointer;padding:3px 7px;border-radius:5px;border:1px solid var(--b1);transition:all .18s;flex-shrink:0;}
.upicopy:hover{border-color:var(--brand);color:var(--brand);}
.upiapps{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-bottom:13px;}
.upiapp{background:var(--s2);border:1px solid var(--b1);border-radius:var(--r);padding:10px 5px 9px;text-align:center;cursor:pointer;transition:all .2s;}
.upiapp:hover{border-color:var(--b2);transform:translateY(-2px);}
.upiappi{font-size:20px;margin-bottom:4px;}
.upiappn{font-size:9px;color:var(--muted);font-weight:600;}
.qrbox{background:var(--s2);border:1px solid var(--b1);border-radius:var(--r);padding:14px;text-align:center;margin-bottom:12px;}
.qrimg{width:130px;height:130px;border-radius:9px;margin:0 auto 8px;display:block;}
.qrhint{font-size:10px;color:var(--hint);}
.cf{margin-bottom:10px;}
.cf label{display:block;font-size:11px;color:var(--muted);margin-bottom:5px;font-weight:600;letter-spacing:.3px;}
.cf input{width:100%;padding:10px 12px;border-radius:var(--r);background:var(--s2);border:1px solid var(--b1);color:var(--tx);font-family:var(--ff);font-size:13px;outline:none;transition:border-color .2s,box-shadow .2s;}
.cf input:focus{border-color:var(--brand);box-shadow:0 0 0 3px var(--bgl);}
.cf input::placeholder{color:var(--hint);}
.cfrow{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
.bankgrid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:12px;}
.bank{background:var(--s2);border:1px solid var(--b1);border-radius:var(--r);padding:10px 8px;cursor:pointer;transition:all .18s;text-align:center;}
.bank:hover{border-color:var(--b2);}
.bank.sel{border-color:var(--blue);background:var(--bll);}
.banki{font-size:19px;margin-bottom:3px;}
.bankn{font-size:10px;font-weight:600;color:var(--muted);}
.pcbtn{width:100%;padding:13px;border-radius:var(--r);border:none;font-family:var(--fd);font-size:14px;font-weight:800;cursor:pointer;transition:all .22s;position:relative;overflow:hidden;letter-spacing:.1px;margin-top:3px;}
.pcbtu{background:linear-gradient(135deg,#0d47a1,#1565c0);color:#fff;box-shadow:0 8px 22px rgba(59,130,246,.28);}
.pcbtc{background:linear-gradient(135deg,#1a1a2e,#16213e);color:#fff;border:1px solid rgba(255,255,255,.08);}
.pcbtn{background:linear-gradient(135deg,#0a1628,#1a3a6e);color:#fff;}
.pcbtn:hover{transform:translateY(-2px);filter:brightness(1.1);}
.pcbtn:active{transform:scale(.97);}
.pcbtn:disabled{opacity:.6;cursor:not-allowed;transform:none!important;filter:none;}
.ams{background:var(--s2);border:1px solid var(--b1);border-radius:var(--r);padding:10px 12px;margin-bottom:12px;}
.amsrow{display:flex;justify-content:space-between;font-size:13px;font-weight:700;}

function PayGateway({total,method,onClose,onSuccess,showToast}){

  const [upiSent,setUpiSent]=useState(false);

  const upiLink=`upi://pay?pa=${encodeURIComponent(UPI)}&pn=QwikBrew&am=${total}&cu=INR`;

  const handlePay=async()=>{
    if(method==='UPI'&&!upiSent){
      try{await api('/api/v1/payments/upi/collect',{method:'POST',body:JSON.stringify({userId:'demo',amount:total,upiId:UPI,reference:`UPI-${Date.now()}`})});}catch{}

    setLoading(true);
    try{await api('/api/v1/payments/charge',{method:'POST',body:JSON.stringify({userId:'demo',amount:total,paymentMethod:method,reference:`REF-${Date.now()}`})});}catch{}
    await new Promise(r=>setTimeout(r,1300));
    setLoading(false);
    onSuccess({method,amount:total,transactionId:`TXN-${Date.now()}`,reference:`REF-${Date.now()}`});

          {method==='CARD'&&<><div className="pcvchip"/><div className="pcvlogo">💳</div><div className="pcvnum">{cardNum?cardNum.replace(/(.{4})/g,'$1 ').trim():'•••• •••• •••• ••••'}</div><div className="pcvlbl">CARD NUMBER</div><div className="pcvnet">VISA / MC</div></>}
          {(method==='UPI'||method==='NET_BANKING')&&<><div className="pcvcenter"><div className="pcvalbl">AMOUNT TO PAY</div><div className="pcvaval">₹{total}</div></div><div style={{position:'absolute',bottom:14,left:18,fontSize:11,opacity:.43,fontWeight:600}}>{method==='UPI'?`UPI · ${UPI.slice(0,14)}…`:'NET BANKING'}</div><div style={{position:'absolute',top:15,right:16,fontSize:19,opacity:.63}}>{method==='UPI'?'📱':'🏦'}</div></>}
        </div>
        {method==='UPI'&&<>
          <div className="upibar"><div><div className="upiidl">PAY TO</div><div className="upiid">{UPI}</div></div><div className="upicopy" onClick={()=>{navigator.clipboard?.writeText(UPI);showToast('Copied!','success');}}>Copy</div></div>
          <div style={{marginBottom:9,fontSize:10,color:'var(--muted)',fontWeight:600,letterSpacing:'.3px'}}>PAY WITH APP</div>
          <div className="upiapps">{[{n:'PhonePe',i:'💜'},{n:'GPay',i:'🟢'},{n:'Paytm',i:'🔵'},{n:'BHIM',i:'🟡'}].map(a=><div key={a.n} className="upiapp" onClick={()=>{window.location.href=upiLink;showToast(`Opening ${a.n}…`,'info');}}><div className="upiappi">{a.i}</div><div className="upiappn">{a.n}</div></div>)}</div>

        </>}
        {method==='CARD'&&<>

        </>}
        {method==='NET_BANKING'&&<>
          <div style={{marginBottom:9,fontSize:10,color:'var(--muted)',fontWeight:600,letterSpacing:'.3px'}}>SELECT BANK</div>
          <div className="bankgrid">{BANKS.map(b=><div key={b.id} className={`bank ${bank===b.id?'sel':''}`} onClick={()=>setBank(b.id)}><div className="banki">{b.ico}</div><div className="bankn">{b.nm}</div></div>)}</div>

        <button className={`pcbtn ${btnCls} fd`} onClick={handlePay} disabled={loading}>

function Cart({cart,setCart,open,onClose,showToast,walletBal,setWalletBal,onOpenWallet}){
  const [payMethod,setPayMethod]=useState('WALLET');
  const [gwOpen,setGwOpen]=useState(false);
  const [placing,setPlacing]=useState(false);
  const [success,setSuccess]=useState(null);
  const total=cart.reduce((s,i)=>s+i.price*i.qty,0);
  const add=id=>setCart(c=>c.map(x=>x.id===id?{...x,qty:x.qty+1}:x));
  const rem=id=>setCart(c=>c.map(x=>x.id===id?{...x,qty:x.qty-1}:x).filter(x=>x.qty>0));
  const placeOrder=async()=>{
    if(payMethod==='WALLET'){
      if(walletBal<total){showToast(`Insufficient balance. Have ₹${walletBal}`,'error');return;}
      setPlacing(true);
      try{await api('/api/v1/orders',{method:'POST',body:JSON.stringify({userId:'demo',items:cart.map(i=>({menuItemId:i.id,menuItemName:i.name,quantity:i.qty,unitPrice:i.price})),totalAmount:total,paymentMethod:'WALLET'})});}catch{}
      const txnId=`TXN-${Date.now()}`;
      setWalletBal(b=>b-total);
      localStorage.setItem('qb_last_txn',JSON.stringify({status:'SUCCESS',transactionId:txnId,amount:total,method:'WALLET'}));
      setPlacing(false);setSuccess({type:'order',amount:total,method:'WALLET',transactionId:txnId});setCart([]);
    }else setGwOpen(true);
  };
  const onGWS=d=>{setGwOpen(false);localStorage.setItem('qb_last_txn',JSON.stringify({status:'SUCCESS',...d}));setSuccess({type:'order',...d});setCart([]);};
  const PMS=[{id:'WALLET',ico:'👛',lbl:'Wallet'},{id:'UPI',ico:'📱',lbl:'UPI'},{id:'CARD',ico:'💳',lbl:'Card'},{id:'NET_BANKING',ico:'🏦',lbl:'NetBanking'}];
  return <>
    {open&&<div className="overlay" onClick={onClose}/>}
    <div className={`cside ${open?'open':''}`}>
      <div className="cshd"><h3 className="csttl fd">Your Cart<span className="cscnt">({cart.length})</span></h3><button className="xbtn" onClick={onClose}>✕</button></div>
      <div className="csbody">
        {cart.length===0?<div className="csempty"><span>🛒</span><p>Your cart is empty.<br/>Add something delicious!</p></div>
          :cart.map(item=><div key={item.id} className="ci">
            <div className="ciem">{item.emoji||'🍽️'}</div>
            <div className="ciinfo"><div className="ciname">{item.name}</div><div className="ciprice">₹{item.price} × {item.qty} = ₹{item.price*item.qty}</div></div>
            <div className="qrow">
              <button className="qbtn" style={{width:26,height:26,fontSize:13}} onClick={()=>rem(item.id)}>−</button>
              <span className="qnum" style={{fontSize:12}}>{item.qty}</span>
              <button className="qbtn" style={{width:26,height:26,fontSize:13}} onClick={()=>add(item.id)}>+</button>
            </div>
          </div>)
        }
      </div>
      {cart.length>0&&<div className="csfoot">
        <div className="wm">
          <div><div className="wml">Wallet Balance</div><div className="wmbal fd">₹{walletBal.toLocaleString('en-IN')}</div></div>
          <div className="wmbtn" onClick={()=>{onClose();onOpenWallet();}}>+ Recharge</div>
        </div>
        <div className="cstotal"><span style={{color:'var(--muted)',fontSize:13}}>Total</span><span className="cstamt fd">₹{total}</span></div>
        <div className="pmg">{PMS.map(m=><div key={m.id} className={`pm ${payMethod===m.id?'on':''}`} onClick={()=>setPayMethod(m.id)}><span className="pmico">{m.ico}</span>{m.lbl}</div>)}</div>
        <button className="obtn fd" onClick={placeOrder} disabled={placing}>{placing?'Placing order…':`Pay & Order · ₹${total}`}</button>
      </div>}
    </div>
    {gwOpen&&<PayGateway total={total} method={payMethod} onClose={()=>setGwOpen(false)} onSuccess={onGWS} showToast={showToast}/>}
    {success&&<SuccessOverlay data={success} onClose={()=>{setSuccess(null);onClose();}}/>}
  </>;
}

function AuthScreen({onLogin}){
  const [mode,setMode]=useState('login');
  const [form,setForm]=useState({name:'',email:'',password:'',phone:''});
  const [loading,setLoading]=useState(false);
  const [error,setError]=useState('');
  const [toast,setToast]=useState(null);
  const showT=(m,t='success')=>{setToast({msg:m,type:t});setTimeout(()=>setToast(null),3000);};
  const handle=async e=>{
    e.preventDefault();setError('');setLoading(true);
    try{
      let data;
      if(mode==='login'){data=await api('/api/v1/users/login',{method:'POST',body:JSON.stringify({email:form.email,password:form.password})});}
      else{data=await api('/api/v1/users/register',{method:'POST',body:JSON.stringify(form)});showT('Account created! Sign in.');setMode('login');setLoading(false);return;}
      localStorage.setItem('qb_token',data.accessToken||data.token||'');
      localStorage.setItem('qb_user',JSON.stringify(data.user||{name:form.email.split('@')[0],email:form.email,walletBalance:500}));
      onLogin(data);
    }catch(err){
      if(mode==='login'){localStorage.setItem('qb_token','demo');localStorage.setItem('qb_user',JSON.stringify({name:form.email.split('@')[0]||'Employee',email:form.email,walletBalance:500}));onLogin({user:{name:form.email.split('@')[0],email:form.email,walletBalance:500}});}
      else setError(err.message);
    }
    setLoading(false);
  };
  return <div className="authpage">
    {toast&&<Toast msg={toast.msg} type={toast.type}/>}
    <div className="authblob ab1"/><div className="authblob ab2"/>
    <div className="authbox">
      <div className="authlogo">
        <div className="authmark">☕</div>
        <h1 className="fd"><span>Qwik</span>Brew</h1>
        <p>Corporate Café — Order smart, eat well</p>
      </div>
      <div className="authtabs">{['login','register'].map(m=><button key={m} className={`authtab ${mode===m?'on':''}`} onClick={()=>setMode(m)}>{m==='login'?'Sign In':'Register'}</button>)}</div>
      <form onSubmit={handle}>
        {mode==='register'&&<><div className="fg"><label>FULL NAME</label><input placeholder="Your full name" value={form.name} onChange={e=>setForm({...form,name:e.target.value})} required/></div><div className="fg"><label>PHONE</label><input placeholder="10-digit mobile" value={form.phone} onChange={e=>setForm({...form,phone:e.target.value})} required/></div></>}
        <div className="fg"><label>EMAIL</label><input type="email" placeholder="work@company.in" value={form.email} onChange={e=>setForm({...form,email:e.target.value})} required/></div>
        <div className="fg"><label>PASSWORD</label><input type="password" placeholder="••••••••" value={form.password} onChange={e=>setForm({...form,password:e.target.value})} required/></div>
        {error&&<p className="ferr">{error}</p>}
        <button type="submit" className="authsbtn fd" disabled={loading}>{loading?'Processing…':mode==='login'?'Sign In →':'Create Account →'}</button>
      </form>
      <div className="authswitch">{mode==='login'?'New here? ':'Already registered? '}<a onClick={()=>setMode(mode==='login'?'register':'login')}>{mode==='login'?'Create account':'Sign in'}</a></div>
    </div>
  </div>;
}

function App(){
  const [page,setPage]=useState('menu');
  const [cart,setCart]=useState([]);
  const [cartOpen,setCartOpen]=useState(false);
  const [walletOpen,setWalletOpen]=useState(false);
  const [toast,setToast]=useState(null);
  const [success,setSuccess]=useState(null);
  const [user,setUser]=useState(()=>{try{return JSON.parse(localStorage.getItem('qb_user')||'null')}catch{return null}});
  const [walletBal,setWalletBal]=useState(()=>{const s=Number(localStorage.getItem('qb_wallet'));return(!isNaN(s)&&s>=0)?s:500;});
  useEffect(()=>{localStorage.setItem('qb_wallet',String(walletBal));},[walletBal]);
  const tRef=useRef(null);
  const showToast=useCallback((msg,type='success')=>{setToast({msg,type});clearTimeout(tRef.current);tRef.current=setTimeout(()=>setToast(null),3000);},[]);
  const logout=()=>{localStorage.clear();setUser(null);setCart([]);};
  const totalQty=cart.reduce((s,i)=>s+i.qty,0);
  if(!user)return <AuthScreen onLogin={d=>{setUser(d.user||JSON.parse(localStorage.getItem('qb_user')));}} />;
  const NAV=[{id:'menu',ico:'🍽️',lbl:'Menu'},{id:'orders',ico:'📋',lbl:'Orders'},{id:'profile',ico:'👤',lbl:'Profile'}];
  return <>
    {toast&&<Toast msg={toast.msg} type={toast.type}/>}
    <nav>
      <div className="nl">
        <div className="nm">☕</div>
        <div className="nname fd"><span>Qwik</span>Brew</div>
        <div className="nbadge">Live</div>
      </div>
      <div className="nr">
        <div className="nwallet" onClick={()=>setWalletOpen(true)}><div className="nwdot"/><span className="fd" style={{fontSize:13}}>₹{walletBal.toLocaleString('en-IN')}</span></div>
        <span className="nhi">Hi, {(user.name||'').split(' ')[0]} 👋</span>
        <div className="ncart" onClick={()=>setCartOpen(true)}>🛒{totalQty>0&&<span className="ncb" key={totalQty}>{totalQty}</span>}</div>
      </div>
    </nav>
    <div style={{flex:1,position:'relative',zIndex:1}}>
      {page==='menu'&&<MenuScreen cart={cart} setCart={setCart} showToast={showToast}/>}
      {page==='orders'&&<OrdersScreen/>}
      {page==='profile'&&<ProfileScreen user={user} onLogout={logout} showToast={showToast} walletBal={walletBal} setWalletBal={setWalletBal}/>}
    </div>
    <Cart cart={cart} setCart={setCart} open={cartOpen} onClose={()=>setCartOpen(false)} showToast={showToast} walletBal={walletBal} setWalletBal={setWalletBal} onOpenWallet={()=>setWalletOpen(true)}/>
    {walletOpen&&<WalletModal showToast={showToast} onClose={()=>setWalletOpen(false)} onSuccess={amt=>{setWalletBal(b=>b+amt);setWalletOpen(false);setSuccess({type:'recharge',amount:amt,transactionId:`TXN-${Date.now()}`});}}/>}
    {success&&<SuccessOverlay data={success} onClose={()=>setSuccess(null)}/>}
    <div className="bnav">
      <div className="bnavrow">
        {NAV.map(n=><div key={n.id} className={`bi ${page===n.id?'on':''}`} onClick={()=>setPage(n.id)}><div className="biico">{n.ico}</div><span>{n.lbl}</span></div>)}
        <div className="bi" onClick={()=>setCartOpen(true)}>
          <div className="biico" style={{position:'relative'}}>🛒{totalQty>0&&<span style={{position:'absolute',top:-6,right:-6,background:'var(--brand)',color:'#fff',borderRadius:'50%',width:14,height:14,fontSize:8,display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700,border:'2px solid var(--bg)'}}>{totalQty}</span>}</div>
          <span>Cart</span>
        </div>
      </div>
    </div>
  </>;
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
