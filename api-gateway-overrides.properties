# Spring Boot reads ./application.properties from WORKDIR before classpath resources.
# This file is copied into the container at /app/application.properties and
# overrides the jar's internal config BEFORE any Spring Cloud autoconfiguration runs.
# This fixes WeightCalculatorWebFilter crash without requiring source code changes.
spring.main.allow-bean-definition-overriding=true
spring.cloud.discovery.enabled=false
spring.cloud.discovery.reactive.enabled=false
spring.cloud.gateway.discovery.locator.enabled=false
