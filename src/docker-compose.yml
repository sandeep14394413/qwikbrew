version: '3.9'

# ═══════════════════════════════════════════════════════
#  QwikBrew — Full Microservices Stack
#  Run: docker-compose up --build
# ═══════════════════════════════════════════════════════

networks:
  qwikbrew-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  kafka_data:

services:

  # ── Infrastructure ──────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: qb-postgres
    environment:
      POSTGRES_USER: qwikbrew
      POSTGRES_PASSWORD: qwikbrew_secret
      POSTGRES_MULTIPLE_DATABASES: userdb,menudb,orderdb,paymentdb,notificationdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/create-multiple-dbs.sh:/docker-entrypoint-initdb.d/create-multiple-dbs.sh
    ports: ["5432:5432"]
    networks: [qwikbrew-net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qwikbrew"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: qb-redis
    volumes: [redis_data:/data]
    ports: ["6379:6379"]
    networks: [qwikbrew-net]
    command: redis-server --appendonly yes

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: qb-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks: [qwikbrew-net]

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: qb-kafka
    depends_on: [zookeeper]
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports: ["29092:29092"]
    networks: [qwikbrew-net]
    volumes: [kafka_data:/var/lib/kafka/data]

  # ── Service Discovery (Eureka) ──────────────────────

  service-discovery:
    build: ./service-discovery
    container_name: qb-eureka
    ports: ["8761:8761"]
    networks: [qwikbrew-net]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── API Gateway ─────────────────────────────────────

  api-gateway:
    build: ./api-gateway
    container_name: qb-gateway
    ports: ["8080:8080"]
    depends_on:
      service-discovery: { condition: service_healthy }
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://service-discovery:8761/eureka/
      JWT_SECRET: ${JWT_SECRET:-s0m3-s3cr3t-k3y-f0r-qwikbr3w-pr0duct10n}
    networks: [qwikbrew-net]

  # ── Microservices ───────────────────────────────────

  user-service:
    build: ./user-service
    container_name: qb-user-svc
    depends_on:
      postgres: { condition: service_healthy }
      service-discovery: { condition: service_healthy }
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/userdb
      SPRING_DATASOURCE_USERNAME: qwikbrew
      SPRING_DATASOURCE_PASSWORD: qwikbrew_secret
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://service-discovery:8761/eureka/
      JWT_SECRET: ${JWT_SECRET:-s0m3-s3cr3t-k3y-f0r-qwikbr3w-pr0duct10n}
      JWT_ACCESS_EXPIRY_MINUTES: 60
      JWT_REFRESH_EXPIRY_DAYS: 30
    networks: [qwikbrew-net]
    restart: on-failure

  menu-service:
    build: ./menu-service
    container_name: qb-menu-svc
    depends_on:
      postgres: { condition: service_healthy }
      service-discovery: { condition: service_healthy }
      redis: { condition: service_started }
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/menudb
      SPRING_DATASOURCE_USERNAME: qwikbrew
      SPRING_DATASOURCE_PASSWORD: qwikbrew_secret
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://service-discovery:8761/eureka/
      MENU_CACHE_TTL_MINUTES: 15
    networks: [qwikbrew-net]
    restart: on-failure

  order-service:
    build: ./order-service
    container_name: qb-order-svc
    depends_on:
      postgres: { condition: service_healthy }
      kafka: { condition: service_started }
      service-discovery: { condition: service_healthy }
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/orderdb
      SPRING_DATASOURCE_USERNAME: qwikbrew
      SPRING_DATASOURCE_PASSWORD: qwikbrew_secret
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://service-discovery:8761/eureka/
      ORDER_NUMBER_PREFIX: QBR
    networks: [qwikbrew-net]
    restart: on-failure

  payment-service:
    build: ./payment-service
    container_name: qb-payment-svc
    depends_on:
      postgres: { condition: service_healthy }
      service-discovery: { condition: service_healthy }
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/paymentdb
      SPRING_DATASOURCE_USERNAME: qwikbrew
      SPRING_DATASOURCE_PASSWORD: qwikbrew_secret
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://service-discovery:8761/eureka/
      # Razorpay or Pine Labs credentials:
      PAYMENT_GATEWAY_KEY_ID: ${PAYMENT_KEY_ID:-rzp_test_xxxxx}
      PAYMENT_GATEWAY_SECRET: ${PAYMENT_KEY_SECRET:-xxxxx}
    networks: [qwikbrew-net]
    restart: on-failure

  notification-service:
    build: ./notification-service
    container_name: qb-notification-svc
    depends_on:
      kafka: { condition: service_started }
      service-discovery: { condition: service_healthy }
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://service-discovery:8761/eureka/
      SPRING_MAIL_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SPRING_MAIL_PORT: 587
      SPRING_MAIL_USERNAME: ${SMTP_USER:-qwikbrew@example.com}
      SPRING_MAIL_PASSWORD: ${SMTP_PASS:-changeme}
      FCM_SERVER_KEY: ${FCM_SERVER_KEY:-changeme}
    networks: [qwikbrew-net]
    restart: on-failure

  # ── Monitoring ──────────────────────────────────────

  prometheus:
    image: prom/prometheus:v2.50.0
    container_name: qb-prometheus
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml
    ports: ["9090:9090"]
    networks: [qwikbrew-net]

  grafana:
    image: grafana/grafana:10.3.0
    container_name: qb-grafana
    ports: ["3001:3000"]
    environment:
      GF_SECURITY_ADMIN_PASSWORD: qwikbrew_admin
    networks: [qwikbrew-net]
