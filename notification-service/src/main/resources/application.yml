server:
  port: 8085

spring:
  autoconfigure:
    exclude:
      - org.springframework.cloud.netflix.eureka.EurekaClientAutoConfiguration
      - org.springframework.cloud.netflix.eureka.EurekaDiscoveryClientAutoConfiguration
  application:
    name: notification-service
  datasource:
    url:      ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/notificationdb}
    username: ${SPRING_DATASOURCE_USERNAME:qwikbrew}
    password: ${SPRING_DATASOURCE_PASSWORD:qwikbrew}
    hikari:
      initialization-fail-timeout: -1  # never fail on pool init — retry in background
      maximum-pool-size: 5
      minimum-idle: 1
  jpa:
    defer-datasource-initialization: true  # defer until after context is ready
    hibernate:
      ddl-auto: none    # changed from validate — no DB contact at startup
    show-sql: false
    properties:
      hibernate:
        temp:
          use_jdbc_metadata_defaults: false  # prevents DB query for dialect detection
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: false
    locations: classpath:db/migration
  kafka:
    listener:
      auto-startup: false   # don't connect to Kafka at startup — waits for real creds via ESO
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    listener:
      auto-startup: false   # don't connect to Kafka at startup — avoids crash on placeholder:9092
    consumer:
      group-id:           ${SPRING_KAFKA_CONSUMER_GROUP_ID:qwikbrew-group}
      auto-offset-reset:  ${SPRING_KAFKA_CONSUMER_AUTO_OFFSET_RESET:earliest}
      key-deserializer:   org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    properties:
      security.protocol: ${SPRING_KAFKA_PROPERTIES_SECURITY_PROTOCOL:PLAINTEXT}
      sasl.mechanism:    ${SPRING_KAFKA_PROPERTIES_SASL_MECHANISM:PLAIN}
      sasl.jaas.config:  ${SPRING_KAFKA_PROPERTIES_SASL_JAAS_CONFIG:}
  mail:
    host:     ${SPRING_MAIL_HOST:smtp.gmail.com}
    port:     ${SPRING_MAIL_PORT:587}
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

fcm:
  server-key: ${FCM_SERVER_KEY:}

eureka:
  client:
    enabled: false                  # disabled — no Eureka server in K8s; gateway routes directly
    register-with-eureka: false
    fetch-registry: false
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://service-discovery:8761/eureka/}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  health:
    readinessstate:
      enabled: true
    livenessstate:
      enabled: true
    db:
      enabled: false      # DB health DOWN won't affect liveness probe
    kafka:
      enabled: false      # Kafka health DOWN won't affect liveness probe
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true

---
spring:
  config:
    activate:
      on-profile: test
  datasource:
    url:      jdbc:h2:mem:notificationdb;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    defer-datasource-initialization: true  # defer until after context is ready
    hibernate:
      ddl-auto: create-drop
  flyway:
    enabled: false
  kafka:
    bootstrap-servers: localhost:9092
