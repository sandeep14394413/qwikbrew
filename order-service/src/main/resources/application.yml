server:
  port: 8083

spring:
  application:
    name: order-service
  datasource:
    url:      ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/orderdb}
    username: ${SPRING_DATASOURCE_USERNAME:qwikbrew}
    password: ${SPRING_DATASOURCE_PASSWORD:qwikbrew}
    hikari:
      maximum-pool-size: 15
      minimum-idle: 3
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer:   org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      retries: 3
    properties:
      security.protocol:  ${SPRING_KAFKA_PROPERTIES_SECURITY_PROTOCOL:PLAINTEXT}
      sasl.mechanism:     ${SPRING_KAFKA_PROPERTIES_SASL_MECHANISM:PLAIN}
      sasl.jaas.config:   ${SPRING_KAFKA_PROPERTIES_SASL_JAAS_CONFIG:}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

# ── Startup resilience ────────────────────────────────────────────────────────
# Prevents immediate crash if DB/Kafka not available at startup.
# Pods stay Running and retry — readiness probe fails until infra is ready.
spring:
  datasource:
    hikari:
      initialization-fail-timeout: -1    # never fail on pool init
      connection-timeout: 10000
      connection-test-query: SELECT 1
  jpa:
    properties:
      hibernate:
        connection:
          handling_mode: delayed_acquisition_and_release_after_transaction

---
spring:
  config:
    activate:
      on-profile: test
  datasource:
    url:      jdbc:h2:mem:orderdb;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
  flyway:
    enabled: false
  kafka:
    bootstrap-servers: localhost:9092
