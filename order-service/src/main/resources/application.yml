server:
  port: 8083

spring:
  application:
    name: order-service
  datasource:
    url:      ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/orderdb}
    username: ${SPRING_DATASOURCE_USERNAME:qwikbrew}
    password: ${SPRING_DATASOURCE_PASSWORD:qwikbrew}
    hikari:
      initialization-fail-timeout: -1  # never fail on pool init — retry in background
      maximum-pool-size: 15
      minimum-idle: 3
  jpa:
    defer-datasource-initialization: true  # defer until after context is ready
    hibernate:
      ddl-auto: none    # changed from validate — no DB contact at startup
    show-sql: false
    properties:
      hibernate:
        temp:
          use_jdbc_metadata_defaults: false  # prevents DB query for dialect detection
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: false
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer:   org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      retries: 3
    properties:
      security.protocol:  ${SPRING_KAFKA_PROPERTIES_SECURITY_PROTOCOL:PLAINTEXT}
      sasl.mechanism:     ${SPRING_KAFKA_PROPERTIES_SASL_MECHANISM:PLAIN}
      sasl.jaas.config:   ${SPRING_KAFKA_PROPERTIES_SASL_JAAS_CONFIG:}


management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  health:
    readinessstate:
      enabled: true
    livenessstate:
      enabled: true
    db:
      enabled: false
    kafka:
      enabled: false
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
    heapdump:
      access: read-only  # Spring Boot 3.5 defaults heapdump to NONE — re-enable

---
spring:
  config:
    activate:
      on-profile: test
  datasource:
    url:      jdbc:h2:mem:orderdb;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    defer-datasource-initialization: true  # defer until after context is ready
    hibernate:
      ddl-auto: create-drop
  flyway:
    enabled: false
  kafka:
    bootstrap-servers: localhost:9092
