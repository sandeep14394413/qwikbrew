# ═══════════════════════════════════════════════════════
#  QwikBrew — Kubernetes Deployments + Services
#  All 6 microservices in one manifest file
# ═══════════════════════════════════════════════════════

# ── Shared env helper (referenced via envFrom in each deployment) ─────────────

# ─────────────────────────────────────────────────────────────────────────────
# 1. API Gateway
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: qwikbrew
  labels: { app: api-gateway }
spec:
  replicas: 2
  selector: { matchLabels: { app: api-gateway } }
  template:
    metadata:
      labels: { app: api-gateway }
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/actuator/prometheus"
    spec:
      containers:
        - name: api-gateway
          image: ACCOUNT_ID.dkr.ecr.ap-south-1.amazonaws.com/qwikbrew/api-gateway:latest
          ports: [{ containerPort: 8080 }]
          envFrom:
            - configMapRef:  { name: qwikbrew-config }
            - secretRef:     { name: qwikbrew-secrets }
          resources:
            requests: { cpu: 250m, memory: 512Mi }
            limits:   { cpu: 500m, memory: 1Gi }
          readinessProbe:
            httpGet: { path: /actuator/health/readiness, port: 8080 }
            initialDelaySeconds: 30
          livenessProbe:
            httpGet: { path: /actuator/health/liveness, port: 8080 }
            initialDelaySeconds: 60
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: qwikbrew
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "external"
    service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"
    service.beta.kubernetes.io/aws-load-balancer-nlb-target-type: "ip"
spec:
  type: LoadBalancer
  selector: { app: api-gateway }
  ports: [{ port: 80, targetPort: 8080, name: http }]

---
# ─────────────────────────────────────────────────────────────────────────────
# 2. Service Discovery (Eureka)
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: service-discovery
  namespace: qwikbrew
spec:
  replicas: 1
  selector: { matchLabels: { app: service-discovery } }
  template:
    metadata: { labels: { app: service-discovery } }
    spec:
      containers:
        - name: service-discovery
          image: ACCOUNT_ID.dkr.ecr.ap-south-1.amazonaws.com/qwikbrew/service-discovery:latest
          ports: [{ containerPort: 8761 }]
          resources:
            requests: { cpu: 200m, memory: 384Mi }
            limits:   { cpu: 400m, memory: 768Mi }
          readinessProbe:
            httpGet: { path: /actuator/health, port: 8761 }
            initialDelaySeconds: 40
---
apiVersion: v1
kind: Service
metadata:
  name: service-discovery
  namespace: qwikbrew
spec:
  type: ClusterIP
  selector: { app: service-discovery }
  ports: [{ port: 8761, targetPort: 8761 }]

---
# ─────────────────────────────────────────────────────────────────────────────
# 3. User Service
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: qwikbrew
spec:
  replicas: 2
  selector: { matchLabels: { app: user-service } }
  strategy:
    type: RollingUpdate
    rollingUpdate: { maxSurge: 1, maxUnavailable: 0 }
  template:
    metadata:
      labels: { app: user-service }
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8081"
        prometheus.io/path: "/actuator/prometheus"
    spec:
      containers:
        - name: user-service
          image: ACCOUNT_ID.dkr.ecr.ap-south-1.amazonaws.com/qwikbrew/user-service:latest
          ports: [{ containerPort: 8081 }]
          envFrom:
            - configMapRef: { name: qwikbrew-config }
            - secretRef:    { name: qwikbrew-secrets }
          env:
            - name:  SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://RDS_ENDPOINT:5432/userdb"
            - name:  SPRING_DATASOURCE_USERNAME
              value: "qwikbrew"
            - name:  SPRING_DATASOURCE_PASSWORD
              valueFrom: { secretKeyRef: { name: qwikbrew-secrets, key: DB_PASSWORD } }
          resources:
            requests: { cpu: 250m, memory: 512Mi }
            limits:   { cpu: 500m, memory: 1Gi }
          readinessProbe:
            httpGet: { path: /actuator/health/readiness, port: 8081 }
            initialDelaySeconds: 40
          livenessProbe:
            httpGet: { path: /actuator/health/liveness, port: 8081 }
            initialDelaySeconds: 90
---
apiVersion: v1
kind: Service
metadata: { name: user-service, namespace: qwikbrew }
spec:
  type: ClusterIP
  selector: { app: user-service }
  ports: [{ port: 8081, targetPort: 8081 }]

---
