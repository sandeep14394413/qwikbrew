metadata:
  name: notification-service
  namespace: qwikbrew
spec:
  replicas: 1
  selector: { matchLabels: { app: notification-service } }
  template:
    metadata:
      labels: { app: notification-service }
      annotations:
        prometheus.io/scrape: "true"
