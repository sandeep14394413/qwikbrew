name: QwikBrew — Build, Push & Deploy to EKS

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main]

env:
  AWS_REGION: ap-south-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-south-1.amazonaws.com
  EKS_CLUSTER: qwikbrew-${{ github.ref_name == 'main' && 'prod' || 'staging' }}

jobs:
  # ── 1. Test ───────────────────────────────────────────────────────────────
  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env: { POSTGRES_USER: qwikbrew, POSTGRES_PASSWORD: test, POSTGRES_DB: testdb }
        options: --health-cmd pg_isready --health-interval 10s --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { java-version: '17', distribution: 'temurin', cache: 'maven' }
      - name: Run tests
        run: mvn test -Dspring.profiles.active=test

  # ── 2. Build & Push to ECR ────────────────────────────────────────────────
  build-push:
    name: Build & Push — ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    strategy:
      matrix:
        service:
          - api-gateway
          - user-service
          - menu-service
          - order-service
          - payment-service
          - notification-service
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/qwikbrew-github-actions
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: meta
        run: |
          SHA=$(echo ${{ github.sha }} | cut -c1-7)
          echo "tag=$SHA" >> $GITHUB_OUTPUT
          echo "image=$ECR_REGISTRY/qwikbrew/${{ matrix.service }}:$SHA" >> $GITHUB_OUTPUT

      - uses: actions/setup-java@v4
        with: { java-version: '17', distribution: 'temurin', cache: 'maven' }

      - name: Build JAR
        run: mvn -pl ${{ matrix.service }} package -DskipTests -q

      - name: Build & push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          build-args: SERVICE=${{ matrix.service }}
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}
            ${{ env.ECR_REGISTRY }}/qwikbrew/${{ matrix.service }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.meta.outputs.image }}
          severity: HIGH,CRITICAL
          exit-code: 1

  # ── 3. Deploy to EKS ─────────────────────────────────────────────────────
  deploy:
    name: Deploy to EKS (${{ github.ref_name == 'main' && 'prod' || 'staging' }})
    runs-on: ubuntu-latest
    needs: build-push
    environment: ${{ github.ref_name == 'main' && 'production' || 'staging' }}
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/qwikbrew-github-actions
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER }} --region ${{ env.AWS_REGION }}

      - name: Substitute image tags in manifests
        env:
          SHA: ${{ github.sha }}
          ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
          RDS_ENDPOINT: ${{ secrets.RDS_ENDPOINT }}
          REDIS_ENDPOINT: ${{ secrets.REDIS_ENDPOINT }}
          MSK_BROKERS: ${{ secrets.MSK_BOOTSTRAP_BROKERS }}
        run: |
          SHORT_SHA=$(echo $SHA | cut -c1-7)
          # Replace placeholders in k8s manifests
          find k8s/ -name '*.yaml' -exec sed -i \
            -e "s|ACCOUNT_ID|$ACCOUNT_ID|g" \
            -e "s|:latest|:$SHORT_SHA|g" \
            -e "s|RDS_ENDPOINT|$RDS_ENDPOINT|g" \
            -e "s|REDIS_ENDPOINT|$REDIS_ENDPOINT|g" \
            -e "s|MSK_BOOTSTRAP_BROKERS|$MSK_BROKERS|g" \
            {} \;

      - name: Apply Kubernetes manifests
        run: kubectl apply -f k8s/ --prune -l app.kubernetes.io/managed-by=github-actions

      - name: Wait for rollout
        run: |
          for svc in api-gateway user-service menu-service order-service payment-service notification-service; do
            kubectl rollout status deployment/$svc -n qwikbrew --timeout=300s
          done

      - name: Smoke test — health check
        run: |
          LB=$(kubectl get ingress qwikbrew-ingress -n qwikbrew -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
          curl -sf "https://$LB/actuator/health" | jq '.status' | grep -q '"UP"'
          echo "✅ Health check passed"

      - name: Notify Slack on success
        if: success()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {"text":"✅ QwikBrew deployed to *${{ github.ref_name == 'main' && 'PRODUCTION' || 'staging' }}* — commit `${{ github.sha }}`"}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Notify Slack on failure
        if: failure()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {"text":"🔴 QwikBrew deploy FAILED on *${{ github.ref_name }}* — <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View logs>"}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
