name: 🚀 QwikBrew — Ultra Fast CI/CD (10x Optimized)

on:
  push:
    branches: [main, staging, develop]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false   # ✅ avoid killing builds

env:
  AWS_REGION: ap-south-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-south-1.amazonaws.com

# ═══════════════════════════════════════════════════════════════
# 1. DETECT SERVICES
# ═══════════════════════════════════════════════════════════════
jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.set.outputs.services }}

    steps:
      - uses: actions/checkout@v4

      - name: 🔍 Detect Services
        id: set
        run: |
          SERVICES=("api-gateway" "user-service" "menu-service" "order-service" "payment-service" "notification-service")
          JSON=$(printf '%s\n' "${SERVICES[@]}" | jq -R . | jq -sc .)
          echo "services=$JSON" >> $GITHUB_OUTPUT

# ═══════════════════════════════════════════════════════════════
# 2. BUILD + PUSH (10x FAST)
# ═══════════════════════════════════════════════════════════════
  build:
    runs-on: ubuntu-latest
    needs: detect

    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.detect.outputs.services) }}

    steps:
      - uses: actions/checkout@v4

      # ✅ AWS AUTH
      - name: 🔐 Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: 🔍 Verify AWS
        run: aws sts get-caller-identity

      # ✅ FIXED ECR LOGIN
      - name: 🔑 Login to ECR
        run: |
          aws ecr get-login-password --region $AWS_REGION | \
          docker login --username AWS --password-stdin $ECR_REGISTRY

      # ✅ Buildx for caching
      - name: 🐳 Setup Buildx
        uses: docker/setup-buildx-action@v3

      # ✅ TAG
      - name: 🏷️ Generate Tag
        id: tag
        run: |
          TAG=${{ github.ref_name }}-$(echo ${{ github.sha }} | cut -c1-7)
          IMAGE=${{ env.ECR_REGISTRY }}/qwikbrew/${{ matrix.service }}
          echo "image=$IMAGE:$TAG" >> $GITHUB_OUTPUT

      # 🔥 ULTRA FAST BUILD
      - name: 🚀 Build & Push
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          file: ./${{ matrix.service }}/Dockerfile
          push: true
          tags: ${{ steps.tag.outputs.image }}

          # ⚡ PER SERVICE CACHE
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,scope=${{ matrix.service }},mode=max

# ═══════════════════════════════════════════════════════════════
# 3. SECURITY SCAN
# ═══════════════════════════════════════════════════════════════
  scan:
    runs-on: ubuntu-latest
    needs: build

    strategy:
      matrix:
        service: ${{ fromJson(needs.detect.outputs.services) }}

    steps:
      - name: 🔐 Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: 🔑 Login to ECR
        run: |
          aws ecr get-login-password --region $AWS_REGION | \
          docker login --username AWS --password-stdin $ECR_REGISTRY

      - name: 🔍 Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.ECR_REGISTRY }}/qwikbrew/${{ matrix.service }}:${{ github.ref_name }}-$(echo ${{ github.sha }} | cut -c1-7)
          severity: HIGH,CRITICAL
          exit-code: 0

# ═══════════════════════════════════════════════════════════════
# 4. DEPLOY TO EKS
# ═══════════════════════════════════════════════════════════════
  deploy:
    runs-on: ubuntu-latest
    needs: scan

    steps:
      - uses: actions/checkout@v4

      - name: 🔐 Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: ☸️ Connect to EKS
        run: aws eks update-kubeconfig --name qwikbrew --region $AWS_REGION

      - name: 🚀 Deploy to Kubernetes
        run: kubectl apply -f k8s/

      - name: ⏳ Wait for rollout
        run: |
          for svc in api-gateway user-service menu-service order-service payment-service notification-service
          do
            echo "⏳ Deploying $svc..."
            kubectl rollout status deployment/$svc -n qwikbrew --timeout=300s || true
          done

# ═══════════════════════════════════════════════════════════════
# 5. AUTO ROLLBACK
# ═══════════════════════════════════════════════════════════════
  rollback:
    runs-on: ubuntu-latest
    needs: deploy
    if: failure()

    steps:
      - name: 🔐 Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: ☸️ Connect
        run: aws eks update-kubeconfig --name qwikbrew --region $AWS_REGION

      - name: ⏪ Rollback
        run: |
          for svc in api-gateway user-service menu-service order-service payment-service notification-service
          do
            echo "⏪ Rolling back $svc..."
            kubectl rollout undo deployment/$svc -n qwikbrew
          done
