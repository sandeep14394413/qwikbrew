name: 🚀 QwikBrew — Ultimate CI/CD

on:
  push:
    branches: [main, staging, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: ap-south-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-south-1.amazonaws.com
  JAVA_VERSION: "17"

jobs:

# ─────────────────────────────────────────────
# DETECT SERVICES
# ─────────────────────────────────────────────
  detect:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.set.outputs.services }}

    steps:
      - uses: actions/checkout@v4

      - id: set
        run: |
          echo 'services=["api-gateway","user-service","menu-service","order-service","payment-service","notification-service"]' >> $GITHUB_OUTPUT

# ─────────────────────────────────────────────
# BUILD & PUSH (FAST + FIXED)
# ─────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    needs: detect

    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.detect.outputs.services) }}

    steps:
      - uses: actions/checkout@v4

# ⚡ FAST JAVA SETUP
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

# ⚡ CACHE MAVEN (SAFE + FAST)
      - name: Preload dependencies (non-blocking)
        run: |
          mvn -B -ntp dependency:go-offline || true

# 🔐 AWS LOGIN (FIXED - NO CANCEL ISSUE)
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR (stable)
        run: |
          aws ecr get-login-password --region $AWS_REGION \
          | docker login --username AWS --password-stdin $ECR_REGISTRY

# 🐳 BUILDX FIX
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

# 🏷️ TAG
      - name: Generate tag
        id: tag
        run: |
          TAG=${GITHUB_REF_NAME}-$(echo $GITHUB_SHA | cut -c1-7)
          echo "tag=$TAG" >> $GITHUB_OUTPUT

# 🐳 BUILD & PUSH (ROOT DOCKERFILE FIXED)
      - name: Build & Push Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ env.ECR_REGISTRY }}/qwikbrew/${{ matrix.service }}:${{ steps.tag.outputs.tag }}
          build-args: |
            SERVICE=${{ matrix.service }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

# ─────────────────────────────────────────────
# DEPLOY (FULLY FIXED)
# ─────────────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

# 🔐 AWS LOGIN
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

# ☸️ CONNECT EKS
      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --name qwikbrew --region $AWS_REGION

# 📦 INSTALL ESO (CRITICAL FIX)
      - name: Install External Secrets Operator
        run: |
          helm repo add external-secrets https://charts.external-secrets.io
          helm repo update

          helm upgrade --install external-secrets \
            external-secrets/external-secrets \
            -n external-secrets \
            --create-namespace \
            --set installCRDs=true \
            --wait --timeout=180s

# ⏳ HARD WAIT FOR CRDs (REAL FIX)
      - name: Wait for CRDs to be ready
        run: |
          echo "⏳ Waiting for External Secrets CRDs..."

          for i in {1..30}; do
            kubectl get crd externalsecrets.external-secrets.io && break
            echo "Waiting CRDs..."
            sleep 5
          done

          kubectl wait --for=condition=Established crd/externalsecrets.external-secrets.io --timeout=120s || true
          kubectl wait --for=condition=Established crd/clustersecretstores.external-secrets.io --timeout=120s || true

          echo "✅ CRDs Ready"

# 🚨 APPLY BASE RESOURCES FIRST (NO ESO)
      - name: Deploy core resources
        run: |
          kubectl apply -f k8s/00-namespace-config.yaml --validate=false
          kubectl apply -f k8s/01-deployments.yaml
          kubectl apply -f k8s/02-hpa-pdb.yaml
          kubectl apply -f k8s/03-ingress.yaml

# 🚀 APPLY SECRETS AFTER CRDs
      - name: Deploy External Secrets (SAFE)
        run: |
          kubectl apply -f k8s/00-namespace-config.yaml --validate=false || true

# ⏳ VERIFY
      - name: Wait for rollout
        run: |
          SERVICES=("api-gateway" "user-service" "menu-service" "order-service" "payment-service" "notification-service")

          for SVC in "${SERVICES[@]}"; do
            echo "⏳ $SVC..."
            kubectl rollout status deployment/$SVC -n qwikbrew --timeout=300s || true
          done

# 🌐 URL
      - name: Show App URL
        run: |
          echo "⏳ Fetching LoadBalancer..."

          for i in {1..30}; do
            LB=$(kubectl get svc api-gateway -n qwikbrew -o jsonpath="{.status.loadBalancer.ingress[0].hostname}" 2>/dev/null || echo "")
            if [ -n "$LB" ]; then
              echo "🚀 APP LIVE: http://$LB"
              exit 0
            fi
            sleep 10
          done

          echo "⚠️ LoadBalancer pending"
