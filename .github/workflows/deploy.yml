name: 🚀 QwikBrew — Helm CI/CD Pipeline

on:
  push:
    branches: [main, staging, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: ap-south-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-south-1.amazonaws.com
  JAVA_VERSION: "17"
  CLUSTER_NAME: qwikbrew
  NAMESPACE: qwikbrew

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.set.outputs.services }}
    steps:
      - uses: actions/checkout@v4
      - id: set
        run: |
          echo 'services=["api-gateway","user-service","menu-service","order-service","payment-service","notification-service"]' >> $GITHUB_OUTPUT

  build:
    runs-on: ubuntu-latest
    needs: detect
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.detect.outputs.services) }}
    steps:
      - uses: actions/checkout@v4

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: ⚡ Maven dependency cache
        run: mvn -B -ntp dependency:go-offline

      - name: 🔐 Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: 🔑 Login to ECR
        run: |
          aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $ECR_REGISTRY

      - name: 🐳 Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🏷️ Generate Tag
        id: tag
        run: |
          TAG=${GITHUB_REF_NAME}-$(echo $GITHUB_SHA | cut -c1-7)
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: 🐳 Build & Push Service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ env.ECR_REGISTRY }}/qwikbrew/${{ matrix.service }}:${{ steps.tag.outputs.tag }}
          build-args: |
            SERVICE=${{ matrix.service }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: 🔐 Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: ☸️ Connect to EKS
        run: aws eks update-kubeconfig --name ${{ env.CLUSTER_NAME }} --region ${{ env.AWS_REGION }}

      - name: 📦 Install Helm
        uses: azure/setup-helm@v4

      # 1. Install External Secrets Operator
      - name: Install External Secrets Operator
        run: |
          helm repo add external-secrets https://charts.external-secrets.io
          helm repo update
          helm upgrade --install external-secrets external-secrets/external-secrets \
            --namespace external-secrets \
            --create-namespace \
            --set installCRDs=true \
            --set replicaCount=2 \
            --wait \
            --timeout 10m

      # 2. Strong CRD + Controller Wait
      - name: Wait for External Secrets CRDs and Controller
        run: |
          echo "Waiting for CRDs..."
          kubectl wait --for=condition=Established crd/externalsecrets.external-secrets.io --timeout=300s || true
          kubectl wait --for=condition=Established crd/clustersecretstores.external-secrets.io --timeout=300s || true
          kubectl wait --for=condition=Established crd/secretstores.external-secrets.io --timeout=300s || true

          echo "CRDs status:"
          kubectl get crd | grep -E 'external-secrets|secretstore'

          echo "Waiting for External Secrets deployments to be ready..."
          kubectl rollout status deployment/external-secrets -n external-secrets --timeout=300s
          kubectl rollout status deployment/external-secrets-cert-controller -n external-secrets --timeout=180s || true
          kubectl rollout status deployment/external-secrets-webhook -n external-secrets --timeout=180s || true

          echo "Extra safety sleep for webhook readiness..."
          sleep 45

      # 3. Debug Chart
      - name: Debug k8s Chart
        run: |
          pwd
          ls -la k8s/
          if [ -f k8s/Chart.yaml ]; then
            echo "✅ Chart.yaml found"
            cat k8s/Chart.yaml
          else
            echo "❌ Chart.yaml MISSING in ./k8s/ folder!"
          fi

      # 4. Deploy qwikbrew
      - name: 🚀 Deploy qwikbrew via Helm
        run: |
          TAG=${GITHUB_REF_NAME}-$(echo $GITHUB_SHA | cut -c1-7)
          helm upgrade --install qwikbrew ./k8s \
            --namespace ${{ env.NAMESPACE }} \
            --create-namespace \
            --set global.imageTag=${TAG} \
            --set global.registry=${{ env.ECR_REGISTRY }} \
            --rollback-on-failure \
            --timeout 15m \
            --wait

      - name: Verify Deployment
        run: |
          kubectl get pods -n ${{ env.NAMESPACE }} -o wide
          echo "=== External Secrets Resources ==="
          kubectl get clustersecretstore,externalsecret -n ${{ env.NAMESPACE }} || true
