name: 🚀 QwikBrew — CI/CD Pipeline (Stable Final)

on:
  push:
    branches: [main, staging, develop]
  workflow_dispatch:

# ❗ FIX: prevent pipeline from getting killed mid-run
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: ap-south-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-south-1.amazonaws.com
  JAVA_VERSION: "17"
  MAVEN_OPTS: "-Xmx1g -XX:+UseG1GC"

jobs:

# ═══════════════════════════════════════════════════════════════
# 1. DETECT SERVICES
# ═══════════════════════════════════════════════════════════════
  detect:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.set.outputs.services }}

    steps:
      - uses: actions/checkout@v4

      - name: Set services
        id: set
        run: |
          SERVICES=("api-gateway" "user-service" "menu-service" "order-service" "payment-service" "notification-service")
          JSON=$(printf '%s\n' "${SERVICES[@]}" | jq -R . | jq -sc .)
          echo "services=$JSON" >> $GITHUB_OUTPUT

# ═══════════════════════════════════════════════════════════════
# 2. BUILD + PUSH DOCKER
# ═══════════════════════════════════════════════════════════════
  build:
    runs-on: ubuntu-latest
    needs: detect

    strategy:
      matrix:
        service: ${{ fromJson(needs.detect.outputs.services) }}

    steps:
      - uses: actions/checkout@v4

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: 🔨 Build JAR
        run: |
          mvn install -N -DskipTests -q
          mvn package -pl ${{ matrix.service }} -DskipTests

      - name: 🏷️ Generate Tag
        id: tag
        run: |
          TAG=${{ github.ref_name }}-$(echo ${{ github.sha }} | cut -c1-7)
          IMAGE=${{ env.ECR_REGISTRY }}/qwikbrew/${{ matrix.service }}
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "image=$IMAGE:$TAG" >> $GITHUB_OUTPUT

      - name: 🔐 Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # ✅ DEBUG STEP (very important)
      - name: 🔍 Verify AWS identity
        run: aws sts get-caller-identity

      # ❗ FIX: Replace failing ECR action
      - name: 🔑 Login to ECR (Stable)
        run: |
          for i in {1..3}; do
            aws ecr get-login-password --region $AWS_REGION | \
            docker login --username AWS --password-stdin $ECR_REGISTRY && break
            echo "Retrying ECR login..."
            sleep 5
          done

      - name: 🐳 Build & Push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.tag.outputs.image }}
          build-args: |
            SERVICE=${{ matrix.service }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

# ═══════════════════════════════════════════════════════════════
# 3. TRIVY SCAN
# ═══════════════════════════════════════════════════════════════
  scan:
    runs-on: ubuntu-latest
    needs: build

    strategy:
      matrix:
        service: ${{ fromJson(needs.detect.outputs.services) }}

    steps:
      - name: 🔐 Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: 🔑 Login to ECR
        run: |
          aws ecr get-login-password --region $AWS_REGION | \
          docker login --username AWS --password-stdin $ECR_REGISTRY

      - name: 🔍 Scan Image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.ECR_REGISTRY }}/qwikbrew/${{ matrix.service }}:${{ github.ref_name }}-$(echo ${{ github.sha }} | cut -c1-7)
          severity: HIGH,CRITICAL
          exit-code: 0

# ═══════════════════════════════════════════════════════════════
# 4. DEPLOY TO EKS
# ═══════════════════════════════════════════════════════════════
  deploy:
    runs-on: ubuntu-latest
    needs: scan

    steps:
      - uses: actions/checkout@v4

      - name: 🔐 Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: ☸️ Connect to EKS
        run: aws eks update-kubeconfig --name qwikbrew --region $AWS_REGION

      - name: 🚀 Deploy
        run: kubectl apply -f k8s/

      - name: ⏳ Wait for rollout
        run: |
          for svc in api-gateway user-service menu-service order-service payment-service notification-service
          do
            kubectl rollout status deployment/$svc -n qwikbrew --timeout=300s || true
          done

# ═══════════════════════════════════════════════════════════════
# 5. AUTO ROLLBACK
# ═══════════════════════════════════════════════════════════════
  rollback:
    runs-on: ubuntu-latest
    needs: deploy
    if: failure()

    steps:
      - name: 🔐 Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: ☸️ Connect
        run: aws eks update-kubeconfig --name qwikbrew --region $AWS_REGION

      - name: ⏪ Rollback
        run: |
          for svc in api-gateway user-service menu-service order-service payment-service notification-service
          do
            kubectl rollout undo deployment/$svc -n qwikbrew
          done
