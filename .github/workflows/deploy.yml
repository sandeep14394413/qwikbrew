name: 🏗️ Bootstrap — Provision All Infrastructure (AWS + Aiven)

# ─────────────────────────────────────────────────────────────────────────────
#  Run this ONCE from the GitHub Actions UI to provision everything.
#  After it completes, deploy.yml handles all future deployments automatically.
# ─────────────────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to bootstrap"
        required: true
        default: "staging"
        type: choice
        options: [staging, prod]
      action:
        description: "Terraform action"
        required: true
        default: "apply"
        type: choice
        options: [apply, plan-only, destroy]
      confirm_destroy:
        description: "Type DESTROY to confirm teardown (destroy only)"
        required: false
        default: ""

concurrency:
  group: bootstrap-${{ github.event.inputs.environment }}
  cancel-in-progress: false

env:
  AWS_REGION: ap-south-1
  TF_VERSION: 1.7.5
  TF_DIR: ./terraform
  EKS_VERSION: "1.34"
  EKS_VERSION: "1.33"

jobs:
  setup-aws-prerequisites:
    name: 🔐 Setup OIDC · IAM Role · S3 Backend
    runs-on: ubuntu-latest
    outputs:
      aws_account_id: ${{ steps.account.outputs.id }}
      tf_state_bucket: ${{ steps.backend.outputs.bucket }}

    steps:
      - uses: actions/checkout@v4

      - name: 🔐 Configure AWS credentials (bootstrap access keys)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: 🔍 Get AWS account ID
        id: account
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "id=$ACCOUNT_ID" >> $GITHUB_OUTPUT
          echo "✅ AWS Account: $ACCOUNT_ID"

      - name: 🌐 Create GitHub OIDC provider
        run: |
          EXISTS=$(aws iam list-open-id-connect-providers \
            --query "OIDCProviderList[?contains(Arn,'token.actions.githubusercontent.com')].Arn" \
            --output text)
          if [ -z "$EXISTS" ]; then
            aws iam create-open-id-connect-provider \
              --url "https://token.actions.githubusercontent.com" \
              --client-id-list "sts.amazonaws.com" \
              --thumbprint-list "6938fd4d98bab03faadb97b34396831e3780aea1"
            echo "✅ OIDC provider created"
          else
            echo "✅ OIDC provider already exists — skipping"
          fi

      - name: 👤 Create / update GitHub Actions IAM role
        env:
          ACCOUNT_ID: ${{ steps.account.outputs.id }}
        run: |
          ROLE_NAME="qwikbrew-github-actions"
          cat > /tmp/trust-policy.json <<TRUSTEOF
          {
            "Version": "2012-10-17",
            "Statement": [{
              "Effect": "Allow",
              "Principal": {
                "Federated": "arn:aws:iam::${ACCOUNT_ID}:oidc-provider/token.actions.githubusercontent.com"
              },
              "Action": "sts:AssumeRoleWithWebIdentity",
              "Condition": {
                "StringEquals": {
                  "token.actions.githubusercontent.com:aud": "sts.amazonaws.com"
                },
                "StringLike": {
                  "token.actions.githubusercontent.com:sub": "repo:${{ github.repository }}:*"
                }
              }
            }]
          }
          TRUSTEOF

          aws iam create-role \
            --role-name "$ROLE_NAME" \
            --assume-role-policy-document file:///tmp/trust-policy.json \
            --description "GitHub Actions OIDC role for QwikBrew CI/CD" 2>/dev/null || \
          aws iam update-assume-role-policy \
            --role-name "$ROLE_NAME" \
            --policy-document file:///tmp/trust-policy.json

          for POLICY_ARN in \
            "arn:aws:iam::aws:policy/AmazonEC2ContainerRegistryPowerUser" \
            "arn:aws:iam::aws:policy/AmazonEKSClusterPolicy" \
            "arn:aws:iam::aws:policy/AmazonVPCFullAccess" \
            "arn:aws:iam::aws:policy/AmazonElastiCacheFullAccess"; do
            aws iam attach-role-policy \
              --role-name "$ROLE_NAME" \
              --policy-arn "$POLICY_ARN" 2>/dev/null || true
          done

          cat > /tmp/inline-policy.json <<POLICYEOF
          {
            "Version": "2012-10-17",
            "Statement": [
              {
                "Sid": "EKSAccess",
                "Effect": "Allow",
                "Action": ["eks:*"],
                "Resource": "arn:aws:eks:${AWS_REGION}:${ACCOUNT_ID}:cluster/qwikbrew-*"
              },
              {
                "Sid": "SecretsManagerAccess",
                "Effect": "Allow",
                "Action": [
                  "secretsmanager:GetSecretValue",
                  "secretsmanager:CreateSecret",
                  "secretsmanager:UpdateSecret",
                  "secretsmanager:DescribeSecret",
                  "secretsmanager:DeleteSecret",
                  "secretsmanager:ListSecrets"
                ],
                "Resource": "arn:aws:secretsmanager:${AWS_REGION}:${ACCOUNT_ID}:secret:qwikbrew/*"
              },
              {
                "Sid": "TerraformState",
                "Effect": "Allow",
                "Action": ["s3:GetObject","s3:PutObject","s3:DeleteObject","s3:ListBucket"],
                "Resource": [
                  "arn:aws:s3:::qwikbrew-terraform-state-${ACCOUNT_ID}",
                  "arn:aws:s3:::qwikbrew-terraform-state-${ACCOUNT_ID}/*"
                ]
              },
              {
                "Sid": "TerraformLock",
                "Effect": "Allow",
                "Action": [
                  "dynamodb:GetItem","dynamodb:PutItem",
                  "dynamodb:DeleteItem","dynamodb:DescribeTable"
                ],
                "Resource": "arn:aws:dynamodb:${AWS_REGION}:${ACCOUNT_ID}:table/qwikbrew-tf-lock"
              },
              {
                "Sid": "ECRAccess",
                "Effect": "Allow",
                "Action": ["ecr:*"],
                "Resource": "*"
              }
            ]
          }
          POLICYEOF

          aws iam put-role-policy \
            --role-name "$ROLE_NAME" \
            --policy-name "qwikbrew-cicd-access" \
            --policy-document file:///tmp/inline-policy.json

          echo "✅ IAM role $ROLE_NAME ready"

      - name: 🪣 Create Terraform S3 backend + DynamoDB lock table
        id: backend
        env:
          ACCOUNT_ID: ${{ steps.account.outputs.id }}
        run: |
          BUCKET="qwikbrew-terraform-state-${ACCOUNT_ID}"
          TABLE="qwikbrew-tf-lock"
          if ! aws s3api head-bucket --bucket "$BUCKET" 2>/dev/null; then
            aws s3api create-bucket \
              --bucket "$BUCKET" \
              --region ${{ env.AWS_REGION }} \
              --create-bucket-configuration LocationConstraint=${{ env.AWS_REGION }}
            aws s3api put-bucket-versioning \
              --bucket "$BUCKET" \
              --versioning-configuration Status=Enabled
            aws s3api put-bucket-encryption \
              --bucket "$BUCKET" \
              --server-side-encryption-configuration \
              '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"}}]}'
            aws s3api put-public-access-block \
              --bucket "$BUCKET" \
              --public-access-block-configuration \
              "BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true"
          fi
          if ! aws dynamodb describe-table --table-name "$TABLE" 2>/dev/null; then
            aws dynamodb create-table \
              --table-name "$TABLE" \
              --attribute-definitions AttributeName=LockID,AttributeType=S \
              --key-schema AttributeName=LockID,KeyType=HASH \
              --billing-mode PAY_PER_REQUEST \
              --region ${{ env.AWS_REGION }}
          fi
          echo "bucket=$BUCKET" >> $GITHUB_OUTPUT

  terraform:
    name: 🏗️ Terraform — EKS + Aiven
    runs-on: ubuntu-latest
    needs: setup-aws-prerequisites
    environment: ${{ github.event.inputs.environment }}
    outputs:
      cluster_name: ${{ steps.outputs.outputs.cluster_name }}
      redis_endpoint: ${{ steps.outputs.outputs.redis_endpoint }}
      aiven_pg_host: ${{ steps.outputs.outputs.pg_host }}
      kafka_bootstrap: ${{ steps.outputs.outputs.kafka_bootstrap }}
    steps:
      - uses: actions/checkout@v4

      - name: 🔐 Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: 🔧 Setup Terraform ${{ env.TF_VERSION }}
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: 🗑️ Delete terraform.tfvars (if exists)
        working-directory: ${{ env.TF_DIR }}
        run: rm -f terraform.tfvars *.auto.tfvars

      - name: 📝 Write backend config
        working-directory: ${{ env.TF_DIR }}
        env:
          TF_STATE_BUCKET: ${{ needs.setup-aws-prerequisites.outputs.tf_state_bucket }}
        run: |
          ENV="${{ github.event.inputs.environment }}"
          cat > backend-override.tf <<BACKENDEOF
          terraform {
            backend "s3" {
              bucket         = "${TF_STATE_BUCKET}"
              key            = "eks/${ENV}/terraform.tfstate"
              region         = "${{ env.AWS_REGION }}"
              encrypt        = true
              dynamodb_table = "qwikbrew-tf-lock"
            }
          }
          BACKENDEOF

      - name: 🧹 Sanitize + validate Aiven credentials
        id: aiven
        env:
          RAW_TOKEN: ${{ secrets.AIVEN_API_TOKEN }}
          RAW_PROJECT: ${{ secrets.AIVEN_PROJECT_NAME }}
        run: |
          CLEAN_TOKEN=$(echo -n "$RAW_TOKEN" | tr -d '[:space:]' | tr -d '"' | tr -d "'")
          CLEAN_PROJECT=$(echo -n "$RAW_PROJECT" | tr -d '[:space:]' | tr -d '"' | tr -d "'")
          echo "token=$CLEAN_TOKEN" >> $GITHUB_OUTPUT
          echo "project=$CLEAN_PROJECT" >> $GITHUB_OUTPUT

      - name: 🔄 Terraform Init
        working-directory: ${{ env.TF_DIR }}
        run: terraform init -input=false

      - name: ✅ Terraform Validate
        working-directory: ${{ env.TF_DIR }}
        run: terraform validate

      - name: 📋 Terraform Plan
        working-directory: ${{ env.TF_DIR }}
        env:
          TF_VAR_aws_region: ${{ env.AWS_REGION }}
          TF_VAR_environment: ${{ github.event.inputs.environment }}
          TF_VAR_cluster_version: ${{ env.EKS_VERSION }}
          TF_VAR_aiven_api_token: ${{ steps.aiven.outputs.token }}
          TF_VAR_aiven_project: ${{ steps.aiven.outputs.project }}
          TF_VAR_aiven_cloud_region: "aws-${{ env.AWS_REGION }}"
        run: terraform plan -out=tfplan -input=false

      - name: 🚀 Terraform Apply
        if: github.event.inputs.action == 'apply'
        working-directory: ${{ env.TF_DIR }}
        env:
          TF_VAR_aws_region: ${{ env.AWS_REGION }}
          TF_VAR_environment: ${{ github.event.inputs.environment }}
          TF_VAR_cluster_version: ${{ env.EKS_VERSION }}
          TF_VAR_aiven_api_token: ${{ steps.aiven.outputs.token }}
          TF_VAR_aiven_project: ${{ steps.aiven.outputs.project }}
          TF_VAR_aiven_cloud_region: "aws-${{ env.AWS_REGION }}"
        run: terraform apply -auto-approve -input=false tfplan

      - name: 💥 Terraform Destroy
        if: |
          github.event.inputs.action == 'destroy' &&
          github.event.inputs.confirm_destroy == 'DESTROY'
        working-directory: ${{ env.TF_DIR }}
        env:
          TF_VAR_aws_region: ${{ env.AWS_REGION }}
          TF_VAR_environment: ${{ github.event.inputs.environment }}
          TF_VAR_cluster_version: ${{ env.EKS_VERSION }}
          TF_VAR_aiven_api_token: ${{ steps.aiven.outputs.token }}
          TF_VAR_aiven_project: ${{ steps.aiven.outputs.project }}
          TF_VAR_aiven_cloud_region: "aws-${{ env.AWS_REGION }}"
        run: terraform destroy -auto-approve -input=false

      - name: 📤 Capture Terraform outputs
        if: github.event.inputs.action == 'apply'
        id: outputs
        working-directory: ${{ env.TF_DIR }}
        run: |
          CLUSTER=$(terraform output -raw cluster_name 2>/dev/null || echo "qwikbrew-${{ github.event.inputs.environment }}")
          REDIS=$(terraform output -raw redis_endpoint 2>/dev/null || echo "")
          PG_HOST=$(terraform output -raw pg_host 2>/dev/null || echo "")
          PG_PORT=$(terraform output -raw pg_port 2>/dev/null || echo "5432")
          KAFKA=$(terraform output -raw kafka_bootstrap 2>/dev/null || echo "")
          echo "cluster_name=$CLUSTER" >> $GITHUB_OUTPUT
          echo "redis_endpoint=$REDIS" >> $GITHUB_OUTPUT
          echo "pg_host=$PG_HOST" >> $GITHUB_OUTPUT
          echo "pg_port=$PG_PORT" >> $GITHUB_OUTPUT
          echo "kafka_bootstrap=$KAFKA" >> $GITHUB_OUTPUT

  post-infra:
    name: ⚙️ Post-Infra — K8s Config
    runs-on: ubuntu-latest
    needs: [setup-aws-prerequisites, terraform]
    if: github.event.inputs.action == 'apply'
    steps:
      - uses: actions/checkout@v4

      - name: 🔐 Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: ☸️ Update kubeconfig
        run: |
          CLUSTER="${{ needs.terraform.outputs.cluster_name }}"
          aws eks update-kubeconfig --name "$CLUSTER" --region ${{ env.AWS_REGION }}

      - name: 🔐 Add OIDC IAM role to EKS aws-auth
        env:
          ACCOUNT_ID: ${{ needs.setup-aws-prerequisites.outputs.aws_account_id }}
        run: |
          ROLE_ARN="arn:aws:iam::${ACCOUNT_ID}:role/qwikbrew-github-actions"
          if ! kubectl get configmap aws-auth -n kube-system -o yaml 2>/dev/null | grep -q "$ROLE_ARN"; then
            EXISTING=$(kubectl get configmap aws-auth -n kube-system -o jsonpath='{.data.mapRoles}' 2>/dev/null || echo "")
            PATCH=$(python3 -c "import json,sys; r='$ROLE_ARN'; ex='''$EXISTING'''.strip(); e='- rolearn: '+r+'\n  username: github-actions\n  groups:\n  - system:masters'; m=(ex+'\n'+e) if ex else e; print(json.dumps({'data':{'mapRoles':m}}))")
            kubectl patch configmap aws-auth -n kube-system --type merge -p "$PATCH"
          fi

      - name: 📦 Install Helm Charts
        run: |
          helm repo add eks https://aws.github.io/eks-charts
          helm repo add external-secrets https://charts.external-secrets.io
          helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
          helm repo add autoscaler https://kubernetes.github.io/autoscaler
          helm repo update
          
          CLUSTER="${{ needs.terraform.outputs.cluster_name }}"
          
          helm upgrade --install aws-load-balancer-controller eks/aws-load-balancer-controller -n kube-system --set clusterName="$CLUSTER" --set serviceAccount.create=true --wait
          helm upgrade --install external-secrets external-secrets/external-secrets -n external-secrets --create-namespace --set installCRDs=true --wait
          helm upgrade --install kube-prometheus-stack prometheus-community/kube-prometheus-stack -n monitoring --create-namespace --set grafana.adminPassword=qwikbrew_admin --wait
          helm upgrade --install cluster-autoscaler autoscaler/cluster-autoscaler -n kube-system --set autoDiscovery.clusterName="$CLUSTER" --set awsRegion=${{ env.AWS_REGION }} --wait

      - name: 🌐 Apply K8s namespace + ExternalSecrets
        run: |
          ENV="${{ github.event.inputs.environment }}"
          REDIS="${{ needs.terraform.outputs.redis_endpoint }}"
          sed -i "s|qwikbrew/ENV/|qwikbrew/${ENV}/|g" k8s/00-namespace-config.yaml
          [ -n "$REDIS" ] && sed -i "s|REDIS_ENDPOINT|${REDIS}|g" k8s/01-deployments.yaml
          kubectl apply -f k8s/00-namespace-config.yaml

      - name: 🎉 Bootstrap complete
        run: echo "✅ EKS ${{ env.EKS_VERSION }} infrastructure is ready."
