name: 🚀 QwikBrew CI/CD (FINAL FIXED)

on:
  push:
    branches: [main, staging, develop]

concurrency:
  group: qwikbrew-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: ap-south-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-south-1.amazonaws.com

jobs:

# ─────────────────────────────
# 🔍 Detect Services
# ─────────────────────────────
  detect:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.set.outputs.services }}

    steps:
      - uses: actions/checkout@v4

      - id: set
        run: |
          echo 'services=["api-gateway","user-service","menu-service","order-service","payment-service","notification-service"]' >> $GITHUB_OUTPUT


# ─────────────────────────────
# 🐳 Build & Push
# ─────────────────────────────
  build:
    needs: detect
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        service: ${{ fromJson(needs.detect.outputs.services) }}

    steps:
      - uses: actions/checkout@v4

      # ✅ Java + cache
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: maven

      # ✅ Build service only
      - name: Build JAR
        run: |
          mvn -T 1C -pl ${{ matrix.service }} -am clean package -DskipTests

      # ✅ AWS login
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v1

      # ✅ Fix buildx
      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container

      # ✅ Tag
      - name: Generate Tag
        id: tag
        run: |
          SHORT=$(echo $GITHUB_SHA | cut -c1-7)
          echo "tag=main-$SHORT" >> $GITHUB_OUTPUT

      # 🚀 FINAL FIXED BUILD
      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: .                    # ✅ ROOT
          file: Dockerfile              # ✅ ROOT Dockerfile
          push: true

          tags: |
            ${{ env.ECR_REGISTRY }}/qwikbrew/${{ matrix.service }}:${{ steps.tag.outputs.tag }}

          build-args: |
            SERVICE=${{ matrix.service }}

          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}


# ─────────────────────────────
# 🚢 Deploy
# ─────────────────────────────
  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Connect to EKS
        run: |
          aws eks update-kubeconfig --name qwikbrew --region $AWS_REGION

      - name: Deploy
        run: |
          kubectl apply -f k8s/

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/api-gateway -n qwikbrew --timeout=300s
