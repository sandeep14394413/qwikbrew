name: 🚀 QwikBrew — Deploy to Staging

on:
  push:
    branches: [staging]          # Only trigger on staging branch

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: ap-south-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-south-1.amazonaws.com
  JAVA_VERSION: "17"
  CLUSTER_NAME: qwikbrew
  NAMESPACE: qwikbrew
  ENVIRONMENT: staging

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: ⚡ Maven dependency cache
        run: mvn -B -ntp dependency:go-offline

      - name: 🔐 Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: 🔑 Login to ECR
        run: |
          aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $ECR_REGISTRY

      - name: 🐳 Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🏷️ Generate Tag
        id: tag
        run: |
          TAG=${GITHUB_REF_NAME}-$(echo $GITHUB_SHA | cut -c1-7)
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: 🐳 Build & Push All Services
        run: |
          TAG=${{ steps.tag.outputs.tag }}
          for service in api-gateway user-service menu-service order-service payment-service notification-service; do
            echo "Building $service..."
            docker build \
              --build-arg SERVICE=$service \
              -t ${{ env.ECR_REGISTRY }}/qwikbrew/$service:$TAG \
              -f ./Dockerfile .
            
            docker push ${{ env.ECR_REGISTRY }}/qwikbrew/$service:$TAG
          done

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: 🔐 Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: ☸️ Connect to EKS
        run: aws eks update-kubeconfig --name ${{ env.CLUSTER_NAME }} --region ${{ env.AWS_REGION }}

      - name: 📦 Install Helm
        uses: azure/setup-helm@v4

      # Install External Secrets Operator
      - name: Install External Secrets Operator
        run: |
          helm repo add external-secrets https://charts.external-secrets.io
          helm repo update
          helm upgrade --install external-secrets external-secrets/external-secrets \
            --namespace external-secrets \
            --create-namespace \
            --set installCRDs=true \
            --set replicaCount=1 \          # lighter for staging
            --wait \
            --timeout 10m

      # Strong wait for CRDs + Controllers + Webhook
      - name: Wait for External Secrets to be Ready
        run: |
          echo "Waiting for CRDs..."
          kubectl wait --for=condition=Established crd/externalsecrets.external-secrets.io --timeout=300s || true
          kubectl wait --for=condition=Established crd/clustersecretstores.external-secrets.io --timeout=300s || true

          echo "Waiting for External Secrets pods..."
          kubectl rollout status deployment/external-secrets -n external-secrets --timeout=300s
          kubectl rollout status deployment/external-secrets-webhook -n external-secrets --timeout=180s || true

          echo "Extra wait for webhook readiness..."
          sleep 60

      # Debug
      - name: Debug Chart
        run: |
          ls -la k8s/
          if [ -f k8s/Chart.yaml ]; then
            echo "✅ Chart.yaml found"
          else
            echo "❌ Chart.yaml is missing!"
          fi

      # Deploy to Staging
      - name: 🚀 Deploy to Staging
        run: |
          TAG=${GITHUB_REF_NAME}-$(echo $GITHUB_SHA | cut -c1-7)
          helm upgrade --install qwikbrew ./k8s \
            --namespace ${{ env.NAMESPACE }} \
            --create-namespace \
            --set global.imageTag=${TAG} \
            --set global.registry=${{ env.ECR_REGISTRY }} \
            --set global.environment=${{ env.ENVIRONMENT }} \
            --rollback-on-failure \
            --timeout 15m \
            --wait

      - name: Verify Deployment
        run: |
          kubectl get pods -n ${{ env.NAMESPACE }} -o wide
          kubectl get clustersecretstore,externalsecret -n ${{ env.NAMESPACE }} || true
