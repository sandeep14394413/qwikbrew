name: 🚀 QwikBrew — CI/CD Pipeline

# ─────────────────────────────────────────────────────────────────────────────
#  Triggers automatically on every git push.
#  No local tools needed — just push your code.
#
#  Pipeline stages:
#    1. Detect changes  → figures out which of the 6 services changed
#    2. Test            → mvn test (PostgreSQL + Redis as service containers)
#    3. Build           → mvn package → docker build → push to ECR
#    4. Trivy scan      → blocks pipeline on HIGH/CRITICAL CVEs
#    5. Deploy staging  → kubectl apply (on push to staging/develop branch)
#    6. Deploy prod     → kubectl apply (on push to main, requires approval)
#    7. Rollback        → auto-triggers kubectl rollout undo on failure
#    8. Notify          → Slack success/failure + email on prod failure
#
#  Required GitHub secrets (all added after bootstrap.yml runs):
#    AWS_ACCOUNT_ID          — 12-digit AWS account number
#    STAGING_REDIS_ENDPOINT  — from bootstrap output
#    STAGING_ACM_CERT_ARN    — from AWS Certificate Manager
#    PROD_REDIS_ENDPOINT     — from prod bootstrap output
#    PROD_ACM_CERT_ARN       — from AWS Certificate Manager
#    SLACK_WEBHOOK_URL       — from Slack incoming webhooks
#    SMTP_USER               — AWS SES SMTP username
#    SMTP_PASS               — AWS SES SMTP password
#    ONCALL_EMAIL            — on-call engineer email
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [main, staging, develop]
  pull_request:
    branches: [main, staging]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "staging"
        type: choice
        options: [staging, prod]
      service:
        description: "Single service to deploy (blank = all changed services)"
        required: false
        default: ""

# Cancel any in-progress run for the same branch when a new push arrives
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION:   ap-south-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-south-1.amazonaws.com
  JAVA_VERSION: "17"
  MAVEN_OPTS:   "-Xmx1g -XX:+UseG1GC"

# ═══════════════════════════════════════════════════════════════════════════════
# JOB 1 — DETECT WHICH SERVICES CHANGED
# ═══════════════════════════════════════════════════════════════════════════════
jobs:
  detect-changes:
    name: 🔍 Detect Changed Services
    runs-on: ubuntu-latest
    outputs:
      services_json: ${{ steps.matrix.outputs.services_json }}
      environment:   ${{ steps.env.outputs.environment }}
      eks_cluster:   ${{ steps.env.outputs.eks_cluster }}

    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - name: Detect changed paths per service
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            api-gateway:
              - "api-gateway/**"
              - "pom.xml"
              - "Dockerfile"
            user-service:
              - "user-service/**"
              - "pom.xml"
              - "Dockerfile"
            menu-service:
              - "menu-service/**"
              - "pom.xml"
              - "Dockerfile"
            order-service:
              - "order-service/**"
              - "pom.xml"
              - "Dockerfile"
            payment-service:
              - "payment-service/**"
              - "pom.xml"
              - "Dockerfile"
            notification-service:
              - "notification-service/**"
              - "pom.xml"
              - "Dockerfile"

      - name: Build dynamic service matrix
        id: matrix
        run: |
          ALL_SERVICES=("api-gateway" "user-service" "menu-service" "order-service" "payment-service" "notification-service")

          # Always build all 6 services on every push.
          # Change to "smart" mode by replacing the line below with the
          # paths-filter logic (see git history) to only build changed services.
          SERVICES=("${ALL_SERVICES[@]}")

          # Manual trigger with a specific single service
          INPUT="${{ github.event.inputs.service }}"
          if [[ -n "$INPUT" && "$INPUT" != "all" ]]; then
            VALID=false
            for S in "${ALL_SERVICES[@]}"; do
              [[ "$INPUT" == "$S" ]] && VALID=true && break
            done
            if $VALID; then
              SERVICES=("$INPUT")
            else
              echo "⚠️  Unknown service '$INPUT' — building all services instead"
            fi
          fi

          JSON=$(echo -n "${SERVICES[@]}" | tr " " "\n" | jq -R . | jq -sc .)
          echo "services_json=$JSON" >> $GITHUB_OUTPUT
          echo "🎯 Services to build: $JSON"

      - name: Resolve target environment and EKS cluster name
        id: env
        run: |
          if [[ -n "${{ github.event.inputs.environment }}" ]]; then
            ENV="${{ github.event.inputs.environment }}"
          elif [[ "${{ github.ref_name }}" == "main" ]]; then
            ENV="staging"
          else
            ENV="staging"
          fi
          # Single cluster "qwikbrew" serves all environments.
          # Update to "qwikbrew-prod" when a dedicated prod cluster is provisioned.
          EKS_CLUSTER="qwikbrew"
          echo "environment=$ENV"          >> $GITHUB_OUTPUT
          echo "eks_cluster=$EKS_CLUSTER"  >> $GITHUB_OUTPUT
          echo "🌍 Environment: $ENV | Cluster: $EKS_CLUSTER"

# ═══════════════════════════════════════════════════════════════════════════════
# JOB 2 — TESTS (SKIPPED)
# Tests are disabled. Re-enable by removing "if: false" below.
# To run tests locally: mvn test -pl <service> -Dspring.profiles.active=test
# ═══════════════════════════════════════════════════════════════════════════════
  test:
    name: 🧪 Test — ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: detect-changes
    if: false   # ← tests skipped; remove this line to re-enable
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.services_json) }}

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER:     qwikbrew
          POSTGRES_PASSWORD: test_secret
          POSTGRES_DB:       testdb
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: ☕ Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version:  ${{ env.JAVA_VERSION }}
          distribution:  temurin
          cache:         maven

      - name: 🔨 Install parent POM
        run: mvn install -N -DskipTests -q

      - name: 🧪 Run tests — ${{ matrix.service }}
        run: |
          mvn test -pl ${{ matrix.service }} \
            -Dspring.profiles.active=test \
            -Dspring.datasource.url=jdbc:postgresql://localhost:5432/testdb \
            -Dspring.datasource.username=qwikbrew \
            -Dspring.datasource.password=test_secret \
            --no-transfer-progress
        env:
          MAVEN_OPTS: ${{ env.MAVEN_OPTS }}

      - name: 📊 Publish JUnit test results
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name:           "Tests — ${{ matrix.service }}"
          path:           "${{ matrix.service }}/target/surefire-reports/*.xml"
          reporter:       java-junit
          fail-on-error:  false
          fail-on-empty:  false

      - name: 📤 Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name:           "test-results-${{ matrix.service }}"
          path:           "${{ matrix.service }}/target/surefire-reports/"
          retention-days: 7
          if-no-files-found: ignore

# ═══════════════════════════════════════════════════════════════════════════════
# JOB 3 — BUILD JAR + DOCKER IMAGE + PUSH TO ECR
# Multi-stage Dockerfile: Maven build → distroless JRE 17 runtime image.
# ═══════════════════════════════════════════════════════════════════════════════
  build:
    name: 🐳 Build & Push — ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: detect-changes   # test job skipped — builds straight after change detection
    if: github.event_name != 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.services_json) }}

    permissions:
      id-token: write   # required for OIDC
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: ☕ Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version:  ${{ env.JAVA_VERSION }}
          distribution:  temurin
          cache:         maven

      - name: 🔨 Build JAR — ${{ matrix.service }}
        run: |
          mvn install -N -DskipTests -q
          mvn package -pl ${{ matrix.service }} \
            -DskipTests \
            -Dmaven.test.skip=true \
            --no-transfer-progress
        env:
          MAVEN_OPTS: ${{ env.MAVEN_OPTS }}

      - name: 🏷️ Generate image tag
        id: tag
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          BRANCH=$(echo "${{ github.ref_name }}" | sed 's/[^a-zA-Z0-9._-]/-/g')
          TAG="${BRANCH}-${SHORT_SHA}"
          IMAGE="${{ env.ECR_REGISTRY }}/qwikbrew/${{ matrix.service }}"
          echo "tag=$TAG"                     >> $GITHUB_OUTPUT
          echo "image_full=${IMAGE}:${TAG}"   >> $GITHUB_OUTPUT
          echo "image_latest=${IMAGE}:latest" >> $GITHUB_OUTPUT
          echo "🏷️ Image tag: $TAG"

      - name: 🔐 Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: 🔑 Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: 🐳 Set up Docker Buildx (layer cache support)
        uses: docker/setup-buildx-action@v3

      - name: 🐳 Build + push Docker image
        uses: docker/build-push-action@v5
        with:
          context:    .
          file:       Dockerfile
          build-args: |
            SERVICE=${{ matrix.service }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            VCS_REF=${{ github.sha }}
          push:       true
          tags: |
            ${{ steps.tag.outputs.image_full }}
            ${{ steps.tag.outputs.image_latest }}
          # GitHub Actions layer cache — dramatically speeds up repeated builds
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to:   type=gha,scope=${{ matrix.service }},mode=max
          provenance: true    # SLSA provenance attestation
          sbom:       true    # Software Bill of Materials

      - name: 💾 Save image reference for Trivy scan
        run: echo "${{ steps.tag.outputs.image_full }}" > /tmp/image-ref.txt

      - name: 📤 Upload image reference artifact
        uses: actions/upload-artifact@v4
        with:
          name:           "image-ref-${{ matrix.service }}"
          path:           /tmp/image-ref.txt
          retention-days: 1

# ═══════════════════════════════════════════════════════════════════════════════
# JOB 4 — TRIVY SECURITY SCAN
# Scans the built container image. Blocks the pipeline on HIGH or CRITICAL CVEs.
# Results uploaded to GitHub Security tab for tracking.
# ═══════════════════════════════════════════════════════════════════════════════
  trivy-scan:
    name: 🔒 Security Scan — ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: [detect-changes, build]
    continue-on-error: true          # NEVER block deployment on CVEs — informational only
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.services_json) }}

    permissions:
      id-token:        write
      contents:        read
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - name: 🔐 Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: 🔑 Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: 📥 Download image reference
        uses: actions/download-artifact@v4
        with:
          name: "image-ref-${{ matrix.service }}"
          path: /tmp/

      - name: 📌 Read image name
        id: img
        run: |
          IMAGE=$(cat /tmp/image-ref.txt)
          echo "name=$IMAGE" >> $GITHUB_OUTPUT
          echo "Scanning: $IMAGE"

      # ── Install Trivy directly from GitHub releases (verified checksum) ──────
      # aquasecurity/trivy-action was compromised in a supply chain attack on
      # 2026-03-19. All version tags 0.0.1-0.34.2 were force-pushed to malware
      # that stole CI/CD secrets. We install trivy binary directly instead.
      # See: https://github.com/aquasecurity/trivy/security/advisories/GHSA-69fq-xp46-6x23
      - name: 🔒 Install Trivy binary (direct, no action dependency)
        run: |
          TRIVY_VERSION="0.69.3"  # last known safe release before the attack
          echo "Installing Trivy v${TRIVY_VERSION}..."
          wget -q "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz" \
            -O /tmp/trivy.tar.gz
          tar -xzf /tmp/trivy.tar.gz -C /tmp trivy
          chmod +x /tmp/trivy
          /tmp/trivy --version

      - name: 🔒 Trivy — filesystem scan (informational)
        continue-on-error: true
        run: |
          /tmp/trivy fs             --severity HIGH,CRITICAL             --ignore-unfixed             --exit-code 0             --format table             "${{ matrix.service }}/" 2>/dev/null || true

      - name: 🔒 Trivy — container image scan (informational)
        continue-on-error: true
        run: |
          IMAGE=$(cat /tmp/image-ref.txt)
          /tmp/trivy image             --severity HIGH,CRITICAL             --ignore-unfixed             --exit-code 0             --format json             --output "trivy-report-${{ matrix.service }}.json"             --vuln-type os,library             "$IMAGE" 2>/dev/null || true
          echo "Scan complete — CVEs are informational and do not block deployment"
          # Print summary
          if [ -f "trivy-report-${{ matrix.service }}.json" ]; then
            CRITICAL=$(cat "trivy-report-${{ matrix.service }}.json" |               python3 -c "import sys,json; d=json.load(sys.stdin);               r=[v for res in d.get('Results',[]) for v in res.get('Vulnerabilities',[]) if v.get('Severity')=='CRITICAL'];               print(len(r))" 2>/dev/null || echo "?")
            HIGH=$(cat "trivy-report-${{ matrix.service }}.json" |               python3 -c "import sys,json; d=json.load(sys.stdin);               r=[v for res in d.get('Results',[]) for v in res.get('Vulnerabilities',[]) if v.get('Severity')=='HIGH'];               print(len(r))" 2>/dev/null || echo "?")
            echo "Results: CRITICAL=${CRITICAL} HIGH=${HIGH} (unfixed CVEs excluded)"
          fi

      - name: 📤 Upload Trivy report artifact
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name:           "trivy-report-${{ matrix.service }}"
          path:           "trivy-report-${{ matrix.service }}.json"
          retention-days: 14


  deploy-staging:
    name: 🚢 Deploy → Staging
    runs-on: ubuntu-latest
    needs: [detect-changes, trivy-scan]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    environment:
      name: staging
      url:  https://staging-api.qwikbrew.in

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: 🔐 Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: ☸️ Update kubeconfig
        run: |
          CLUSTER="${{ needs.detect-changes.outputs.eks_cluster }}"
          aws eks update-kubeconfig --name "$CLUSTER" --region ${{ env.AWS_REGION }}
          echo "✅ Connected to cluster: $CLUSTER"

      - name: 🌐 Ensure AWS Load Balancer Controller is installed
        run: |
          if kubectl get deployment aws-load-balancer-controller -n kube-system >/dev/null 2>&1; then
            echo "✅ AWS Load Balancer Controller already installed"
            kubectl get deployment aws-load-balancer-controller -n kube-system
          else
            echo "📦 Installing AWS Load Balancer Controller..."
            helm repo add eks https://aws.github.io/eks-charts
            helm repo update
            helm upgrade --install aws-load-balancer-controller \
              eks/aws-load-balancer-controller \
              -n kube-system \
              --set clusterName="${{ needs.detect-changes.outputs.eks_cluster }}" \
              --set serviceAccount.create=true \
              --wait --timeout=180s
            kubectl get deployment aws-load-balancer-controller -n kube-system
          fi

      - name: 🔐 Fix ELB IAM permissions + subnet tags
        run: |
          CLUSTER="${{ needs.detect-changes.outputs.eks_cluster }}"
          REGION="${{ env.AWS_REGION }}"

          # Find the actual IAM role attached to an EKS worker node instance.
          # This is more reliable than fuzzy role-name matching.
          NODE_INSTANCE_ID=$(kubectl get nodes -o jsonpath="{.items[0].spec.providerID}" 2>/dev/null | sed 's|.*/||' || echo "")
          NODE_ROLE=""
          if [ -n "$NODE_INSTANCE_ID" ]; then
            INSTANCE_PROFILE_ARN=$(aws ec2 describe-instances \
              --instance-ids "$NODE_INSTANCE_ID" \
              --region "$REGION" \
              --query "Reservations[0].Instances[0].IamInstanceProfile.Arn" \
              --output text 2>/dev/null || echo "")
            INSTANCE_PROFILE_NAME=$(basename "$INSTANCE_PROFILE_ARN" 2>/dev/null || echo "")
            if [ -n "$INSTANCE_PROFILE_NAME" ] && [ "$INSTANCE_PROFILE_NAME" != "None" ]; then
              NODE_ROLE=$(aws iam get-instance-profile \
                --instance-profile-name "$INSTANCE_PROFILE_NAME" \
                --query "InstanceProfile.Roles[0].RoleName" \
                --output text 2>/dev/null || echo "")
            fi
          fi

          # Fallback if node-instance lookup failed for any reason.
          if [ -z "$NODE_ROLE" ]; then
            NODE_ROLE=$(aws iam list-roles --output text \
              --query "Roles[].RoleName" 2>/dev/null \
              | tr '\t' '\n' | grep -Ei "node|qwikbrew" | head -1 || echo "")
          fi
          echo "Node IAM role: ${NODE_ROLE:-NOT FOUND}"

          if [ -n "$NODE_ROLE" ]; then
            printf '{"Version":"2012-10-17","Statement":[{"Effect":"Allow","Action":["elasticloadbalancing:*","ec2:Describe*","ec2:CreateSecurityGroup","ec2:DeleteSecurityGroup","ec2:CreateTags","ec2:DeleteTags","ec2:AuthorizeSecurityGroupIngress","ec2:RevokeSecurityGroupIngress","iam:CreateServiceLinkedRole","shield:GetSubscriptionState","wafv2:GetWebACLForResource","wafv2:GetWebACL","wafv2:AssociateWebACL","wafv2:DisassociateWebACL","tag:GetResources","tag:TagResources"],"Resource":"*"}]}' \
              > /tmp/elb-policy.json
            aws iam put-role-policy \
              --role-name "$NODE_ROLE" \
              --policy-name "QwikBrewELBAccess" \
              --policy-document file:///tmp/elb-policy.json \
              && echo "ELB policy attached" || echo "ELB policy may already exist"
          fi

          VPC_ID=$(aws eks describe-cluster \
            --name "$CLUSTER" --region "$REGION" \
            --query "cluster.resourcesVpcConfig.vpcId" \
            --output text)
          aws ec2 describe-subnets \
            --filters "Name=vpc-id,Values=$VPC_ID" \
            --output text \
            --region "$REGION" \
            --query "Subnets[?MapPublicIpOnLaunch==\`true\`].SubnetId" \
            | tr '\t' '\n' | while read S; do
            [ -z "$S" ] && continue
            aws ec2 create-tags --resources "$S" \
              --tags "Key=kubernetes.io/role/elb,Value=1" \
              --region "$REGION" && echo "  Tagged: $S" || true
          done

      - name: 📦 Ensure External Secrets Operator is installed
        run: |
          if ! kubectl get crd externalsecrets.external-secrets.io &>/dev/null; then
            echo "📦 Installing External Secrets Operator..."
            helm repo add external-secrets https://charts.external-secrets.io
            helm repo update
            helm upgrade --install external-secrets \
              external-secrets/external-secrets \
              -n external-secrets --create-namespace \
              --set installCRDs=true --wait --timeout=120s
            echo "✅ ESO installed"
          else
            echo "✅ ESO already installed"
          fi

      - name: 🔧 Substitute manifest placeholders
        run: |
          ACCOUNT_ID="${{ secrets.AWS_ACCOUNT_ID }}"
          CERT_ARN="${{ secrets.STAGING_ACM_CERT_ARN }}"
          ECR_REGISTRY="${ACCOUNT_ID}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com"

          echo "Account ID: ${ACCOUNT_ID}"
          echo "ECR Registry: ${ECR_REGISTRY}"

          # Substitute placeholders in all k8s manifests
          find k8s/ -name "*.yaml" | while read f; do
            sed -i \
              -e "s|ACCOUNT_ID|${ACCOUNT_ID}|g" \
              -e "s|CERT_ARN|${CERT_ARN:-placeholder-cert}|g" \
              -e "s|qwikbrew/ENV/|qwikbrew/staging/|g" \
              "$f"
          done

          # Verify substitution worked — no literal ACCOUNT_ID should remain
          if grep -r "ACCOUNT_ID" k8s/ 2>/dev/null; then
            echo "❌ ACCOUNT_ID placeholder still present after substitution!"
            exit 1
          fi
          echo "✅ All placeholders substituted successfully"

          echo "--- api-gateway image after substitution ---"
          grep "image:" k8s/01-deployments.yaml | head -5

      - name: 🔑 Ensure K8s secrets exist
        run: |
          kubectl create namespace qwikbrew --dry-run=client -o yaml | kubectl apply -f -

          if ! kubectl get secret aiven-credentials -n qwikbrew &>/dev/null; then
            kubectl create secret generic aiven-credentials -n qwikbrew \
              --from-literal=USERDB_JDBC_URL="jdbc:postgresql://placeholder:5432/userdb" \
              --from-literal=MENUDB_JDBC_URL="jdbc:postgresql://placeholder:5432/menudb" \
              --from-literal=ORDERDB_JDBC_URL="jdbc:postgresql://placeholder:5432/orderdb" \
              --from-literal=PAYMENTDB_JDBC_URL="jdbc:postgresql://placeholder:5432/paymentdb" \
              --from-literal=NOTIFICATIONDB_JDBC_URL="jdbc:postgresql://placeholder:5432/notificationdb" \
              --from-literal=DB_USERNAME="placeholder" \
              --from-literal=DB_PASSWORD="placeholder" \
              --from-literal=KAFKA_BOOTSTRAP_SERVERS="localhost:9092" \
              --from-literal=KAFKA_SECURITY_PROTOCOL="PLAINTEXT" \
              --from-literal=KAFKA_SASL_MECHANISM="PLAIN" \
              --from-literal=KAFKA_SASL_USERNAME="placeholder" \
              --from-literal=KAFKA_SASL_PASSWORD="placeholder"
            echo "✅ aiven-credentials created"
          fi

          if ! kubectl get secret app-secrets -n qwikbrew &>/dev/null; then
            kubectl create secret generic app-secrets -n qwikbrew \
              --from-literal=JWT_SECRET="placeholder-jwt-secret-min-64-chars-long-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx" \
              --from-literal=PAYMENT_GATEWAY_KEY_ID="placeholder" \
              --from-literal=PAYMENT_GATEWAY_SECRET="placeholder" \
              --from-literal=FCM_SERVER_KEY="placeholder" \
              --from-literal=SMTP_USER="placeholder" \
              --from-literal=SMTP_PASS="placeholder"
            echo "✅ app-secrets created"
          fi

      - name: 🔑 Login to ECR (frontend push)
        uses: aws-actions/amazon-ecr-login@v2

      - name: 🏗️  Ensure frontend ECR repo exists
        run: |
          aws ecr describe-repositories --repository-names qwikbrew/frontend \
            --region ${{ env.AWS_REGION }} 2>/dev/null || \
          aws ecr create-repository --repository-name qwikbrew/frontend \
            --region ${{ env.AWS_REGION }} \
            --image-scanning-configuration scanOnPush=false \
            --image-tag-mutability MUTABLE
          echo "✅ ECR repo ready"

      - name: 🐳 Build + push Frontend image
        run: |
          echo "🏗️  Building QwikCafe React UI..."
          ACCOUNT_ID=${{ secrets.AWS_ACCOUNT_ID }}
          FRONTEND_IMAGE="${ACCOUNT_ID}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/qwikbrew/frontend:latest"
          docker build -t "${FRONTEND_IMAGE}" ./frontend
          docker push "${FRONTEND_IMAGE}"
          echo "✅ Frontend image pushed: ${FRONTEND_IMAGE}"

      - name: 🔧 Verify k8s manifests exist
        run: |
          echo "📁 Repository contents:"
          ls -la
          echo ""
          echo "📁 k8s directory:"
          if [ -d "k8s/" ]; then
            ls -la k8s/
          else
            echo "❌ k8s/ directory NOT FOUND in repository!"
            echo ""
            echo "You need to commit the k8s/ directory to your repo:"
            echo "  git add k8s/"
            echo "  git commit -m 'add: kubernetes manifests'"
            echo "  git push origin main"
            exit 1
          fi



      - name: 🚀 Apply Kubernetes manifests
        run: |
          ACCOUNT_ID="${{ secrets.AWS_ACCOUNT_ID }}"
          REGION="${{ env.AWS_REGION }}"
          GW_IMAGE="${ACCOUNT_ID}.dkr.ecr.${REGION}.amazonaws.com/qwikbrew/api-gateway:latest"

          kubectl apply -f k8s/00-namespace-config.yaml || true

          # Always delete + recreate api-gateway service
          # kubectl apply CANNOT change spec.type — it silently ignores the change
          # so the service stays NodePort forever unless we force delete+recreate
          echo "Recreating api-gateway service as LoadBalancer..."
          kubectl delete svc api-gateway -n qwikbrew --ignore-not-found
          echo "Recreating frontend service as LoadBalancer..."
          kubectl delete svc frontend -n qwikbrew --ignore-not-found
          sleep 3

          # Apply deployments + services
          kubectl apply -f k8s/01-deployments.yaml -n qwikbrew
          kubectl apply -f k8s/02-hpa-pdb.yaml -n qwikbrew || true
          if [ -n "${{ secrets.STAGING_ACM_CERT_ARN }}" ]; then
            kubectl apply -f k8s/03-ingress.yaml -n qwikbrew || true
          else
            echo "Skipping ingress apply: STAGING_ACM_CERT_ARN is not set."
          fi

          # Set correct image explicitly (in case ACCOUNT_ID substitution missed anything)
          kubectl set image deployment/api-gateway             api-gateway="${GW_IMAGE}" -n qwikbrew 2>/dev/null || true

          # Restart api-gateway to pick up latest image + config
          kubectl rollout restart deployment/api-gateway -n qwikbrew
          echo "Manifests applied and api-gateway rollout started"

          # Show what service type was created
          sleep 3
          echo "api-gateway service:"
          kubectl get svc api-gateway -n qwikbrew

      - name: ⏳ Wait for deployments + collect crash logs
        run: |
          SERVICES='${{ needs.detect-changes.outputs.services_json }}'
          echo "$SERVICES" | jq -r ".[]" | while read SVC; do
            echo "⏳ $SVC..."
            kubectl rollout status deployment/$SVC -n qwikbrew --timeout=600s \
              && echo "✅ $SVC is live" \
              || echo "⚠️  $SVC rollout timed out"
          done

          echo ""
          kubectl get pods -n qwikbrew -o wide

          for POD in $(kubectl get pods -n qwikbrew -o jsonpath="{.items[*].metadata.name}" 2>/dev/null); do
            REASON=$(kubectl get pod/$POD -n qwikbrew \
              -o jsonpath="{.status.containerStatuses[0].state.waiting.reason}" 2>/dev/null)
            if [[ "$REASON" == "CrashLoopBackOff" || "$REASON" == "Error" ]]; then
              echo ""
              echo "=== $POD ($REASON) ==="
              kubectl logs $POD -n qwikbrew --tail=40 --previous 2>/dev/null \
                || kubectl logs $POD -n qwikbrew --tail=40 2>/dev/null \
                || echo "(no logs)"
              fi
          done

      - name: 🔎 External Secrets diagnostics
        if: always()
        run: |
          echo "━━━━ EXTERNAL SECRETS ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          kubectl get externalsecrets -n qwikbrew || true
          kubectl describe externalsecret aiven-credentials -n qwikbrew 2>/dev/null | grep -A8 "Status:" || true
          echo ""
          echo "━━━━ K8S SECRETS ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          kubectl get secrets -n qwikbrew | grep -E "aiven-credentials|app-secrets" || true

      - name: 🌐 Print external URL + full diagnostics
        run: |
          LB_HOST=$(kubectl get svc api-gateway -n qwikbrew -o jsonpath="{.status.loadBalancer.ingress[0].hostname}" 2>/dev/null || echo "")
          LB_IP=$(kubectl get svc api-gateway -n qwikbrew -o jsonpath="{.status.loadBalancer.ingress[0].ip}" 2>/dev/null || echo "")
          LB="${LB_HOST:-$LB_IP}"
          LB_FAILED="false"

          # ── Wait for LB hostname if not yet assigned ──────────────────────
          if [ -z "$LB" ]; then
            echo "⏳ Waiting for LoadBalancer hostname (up to 5 min)..."
            for i in $(seq 1 30); do
              LB_HOST=$(kubectl get svc api-gateway -n qwikbrew -o jsonpath="{.status.loadBalancer.ingress[0].hostname}" 2>/dev/null || echo "")
              LB_IP=$(kubectl get svc api-gateway -n qwikbrew -o jsonpath="{.status.loadBalancer.ingress[0].ip}" 2>/dev/null || echo "")
              LB="${LB_HOST:-$LB_IP}"
              [ -n "$LB" ] && break
              echo "  [$i/30] pending..."
              # If service already reports a hard AWS error, stop waiting and surface it now.
              LAST_WARN=$(kubectl get events -n qwikbrew \
                --field-selector involvedObject.kind=Service,involvedObject.name=api-gateway,type=Warning \
                --sort-by=.lastTimestamp \
                -o jsonpath="{.items[-1:].message}" 2>/dev/null || echo "")
              if [ -n "$LAST_WARN" ]; then
                echo "  ↳ service warning: $LAST_WARN"
                if echo "$LAST_WARN" | grep -Eiq "failed|error|denied|subnet|permission|quota|unsupported"; then
                  LB_FAILED="true"
                  break
                fi
              fi
              sleep 10
            done
          fi

          # ── Print live URL ─────────────────────────────────────────────────
          if [ -n "$LB" ]; then
            echo ""
            echo "==========================================="
            echo "  QWIKBREW IS LIVE"
            echo "  http://${LB}"
            echo "==========================================="
            echo "  GET  http://${LB}/actuator/health"
            echo "  GET  http://${LB}/api/v1/menu"
            echo "  POST http://${LB}/api/v1/users/register"
            echo "  POST http://${LB}/api/v1/users/login"
            echo "  POST http://${LB}/api/v1/orders"
            echo "==========================================="
            echo "## QwikBrew Live URL" >> $GITHUB_STEP_SUMMARY
            echo "**[http://${LB}](http://${LB})**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Endpoint | URL |" >> $GITHUB_STEP_SUMMARY
            echo "|---|---|" >> $GITHUB_STEP_SUMMARY
            echo "| Health     | [/actuator/health](http://${LB}/actuator/health) |" >> $GITHUB_STEP_SUMMARY
            echo "| Menu       | [/api/v1/menu](http://${LB}/api/v1/menu) |" >> $GITHUB_STEP_SUMMARY
            echo "| Register   | /api/v1/users/register |" >> $GITHUB_STEP_SUMMARY
            echo "| Login      | /api/v1/users/login |" >> $GITHUB_STEP_SUMMARY
          else
            echo "WARNING: LB hostname not assigned after 5 min"
            if [ "$LB_FAILED" = "true" ]; then
              echo "LoadBalancer provisioning reported an explicit warning; stopped waiting early."
            fi
            echo "Collecting service/controller diagnostics..."
            echo ""
            echo ">> api-gateway service details:"
            kubectl describe svc api-gateway -n qwikbrew || true
            echo ""
            echo ">> aws-load-balancer-controller logs (last 120 lines):"
            kubectl logs -n kube-system deployment/aws-load-balancer-controller --tail=120 2>/dev/null || true
            echo ""
            echo ">> events in qwikbrew namespace (latest 50):"
            kubectl get events -n qwikbrew --sort-by=.lastTimestamp | tail -50 || true
            echo ""
            echo "Falling back to NodePort for smoke testing..."
            kubectl patch svc api-gateway -n qwikbrew -p '{"spec":{"type":"NodePort"}}' || true
            NODE_PORT=$(kubectl get svc api-gateway -n qwikbrew -o jsonpath="{.spec.ports[0].nodePort}" 2>/dev/null || echo "")
            NODE_IP=$(kubectl get nodes -o jsonpath="{.items[0].status.addresses[?(@.type=='ExternalIP')].address}" 2>/dev/null || echo "")
            if [ -z "$NODE_IP" ]; then
              NODE_IP=$(kubectl get nodes -o jsonpath="{.items[0].status.addresses[?(@.type=='InternalIP')].address}" 2>/dev/null || echo "")
            fi
            if [ -n "$NODE_IP" ] && [ -n "$NODE_PORT" ]; then
              echo "Temporary NodePort URL: http://${NODE_IP}:${NODE_PORT}"
              echo "## QwikBrew Temporary URL (NodePort fallback)" >> $GITHUB_STEP_SUMMARY
              echo "**http://${NODE_IP}:${NODE_PORT}**" >> $GITHUB_STEP_SUMMARY
            else
              echo "NodePort fallback unavailable (missing node IP or nodePort)."
            fi
          fi

          # Print frontend URL when frontend Service is public.
          FRONTEND_LB=$(kubectl get svc frontend -n qwikbrew -o jsonpath="{.status.loadBalancer.ingress[0].hostname}" 2>/dev/null || echo "")
          if [ -z "$FRONTEND_LB" ]; then
            FRONTEND_LB=$(kubectl get svc frontend -n qwikbrew -o jsonpath="{.status.loadBalancer.ingress[0].ip}" 2>/dev/null || echo "")
          fi
          if [ -n "$FRONTEND_LB" ]; then
            echo ""
            echo "Frontend UI: http://${FRONTEND_LB}"
            echo "## QwikBrew Frontend URL" >> $GITHUB_STEP_SUMMARY
            echo "**[http://${FRONTEND_LB}](http://${FRONTEND_LB})**" >> $GITHUB_STEP_SUMMARY
          else
            echo ""
            echo "Frontend service has no external endpoint yet (type may still be ClusterIP)."
          fi

          # ── Full diagnostics (always runs) ────────────────────────────────
          echo ""
          echo "━━━━ POD STATUS ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          kubectl get pods -n qwikbrew -o wide

          echo ""
          echo "━━━━ SERVICE + ENDPOINTS ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          kubectl get svc -n qwikbrew
          echo ""
          kubectl get endpoints -n qwikbrew

          echo ""
          echo "━━━━ HEALTH CHECK ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          if [ -n "$LB" ]; then
            sleep 15
            HTTP=$(curl -s -o /tmp/health.json -w "%{http_code}"               "http://${LB}/actuator/health" --max-time 15 || echo "000")
            echo "HTTP $HTTP"
            cat /tmp/health.json 2>/dev/null || true

            if [ "$HTTP" != "200" ]; then
              echo ""
              echo "━━━━ LB NOT HEALTHY — DIAGNOSING ━━━━━━━━━━━━━━━━━━━━━━━"

              echo ""
              echo ">> api-gateway pod readiness:"
              kubectl get pods -n qwikbrew -l app=api-gateway -o wide

              echo ""
              echo ">> api-gateway pod describe (events):"
              kubectl describe pods -n qwikbrew -l app=api-gateway                 | grep -A20 "Events:" | head -25

              echo ""
              echo ">> api-gateway logs (last 60 lines):"
              GW_POD=$(kubectl get pods -n qwikbrew -l app=api-gateway                 -o jsonpath="{.items[0].metadata.name}" 2>/dev/null || echo "")
              if [ -n "$GW_POD" ]; then
                kubectl logs "$GW_POD" -n qwikbrew --tail=60 2>/dev/null ||                 kubectl logs "$GW_POD" -n qwikbrew --tail=60 --previous 2>/dev/null ||                 echo "(no logs)"
              fi

              echo ""
              echo ">> LB describe (check target health):"
              LB_NAME=$(echo "$LB" | cut -d'-' -f1-8 | sed 's/\..*//')
              aws elb describe-instance-health                 --load-balancer-name "$LB_NAME"                 --region ${{ env.AWS_REGION }} 2>/dev/null || true

              echo ""
              echo ">> Node security groups:"
              kubectl get nodes -o jsonpath="{.items[0].spec.providerID}" |                 sed 's|.*/||' |                 xargs -I{} aws ec2 describe-instances                   --instance-ids {}                   --query "Reservations[0].Instances[0].SecurityGroups"                   --output table                   --region ${{ env.AWS_REGION }} 2>/dev/null || true
            else
              echo "Application is healthy and responding"
            fi
          fi

# ═══════════════════════════════════════════════════════════════════════════════
# JOB 6 — DEPLOY TO PRODUCTION
# Fires on push to 'main'. Pauses for manual approval (GitHub Environment rule).
# ═══════════════════════════════════════════════════════════════════════════════
  deploy-prod:
    name: 🏭 Deploy → Production
    runs-on: ubuntu-latest
    needs: [detect-changes, trivy-scan]
    if: false   # disabled — no dedicated prod cluster yet; re-enable when qwikbrew-prod is provisioned
    environment:
      name: production          # ← pauses here — requires your manual approval
      url:  https://api.qwikbrew.in

    permissions:
      id-token: write
      contents: write           # needed to create release tags

    steps:
      - uses: actions/checkout@v4

      - name: 🔐 Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: ☸️ Update kubeconfig for Production EKS
        run: |
          CLUSTER="${{ needs.detect-changes.outputs.eks_cluster }}"
          aws eks update-kubeconfig --name "$CLUSTER" --region ${{ env.AWS_REGION }}
          echo "✅ Connected to cluster: $CLUSTER"

      - name: 🔧 Substitute manifest placeholders
        env:
          SHORT_SHA:      ${{ github.sha }}
          ACCOUNT_ID:     ${{ secrets.AWS_ACCOUNT_ID }}
          REDIS_ENDPOINT: ${{ secrets.PROD_REDIS_ENDPOINT }}
          CERT_ARN:       ${{ secrets.PROD_ACM_CERT_ARN }}
        run: |
          TAG="main-$(echo $SHORT_SHA | cut -c1-7)"
          echo "📦 Deploying image tag: $TAG"

          find k8s/ -name "*.yaml" -exec sed -i \
            -e "s|ACCOUNT_ID|${ACCOUNT_ID}|g" \
            -e "s|REDIS_ENDPOINT|${REDIS_ENDPOINT}|g" \
            -e "s|CERT_ARN|${CERT_ARN}|g" \
            -e "s|qwikbrew/ENV/|qwikbrew/prod/|g" \
            {} \;

      - name: 🚀 Apply Kubernetes manifests — Production
        run: |
          kubectl apply -f k8s/00-namespace-config.yaml -n qwikbrew || true
          kubectl apply -f k8s/01-deployments.yaml -n qwikbrew
          kubectl apply -f k8s/02-hpa-pdb.yaml -n qwikbrew
          kubectl apply -f k8s/03-ingress.yaml -n qwikbrew
          echo "✅ Manifests applied"

      - name: ⏳ Wait for rolling deployments (10 min timeout)
        run: |
          SERVICES='${{ needs.detect-changes.outputs.services_json }}'
          echo "$SERVICES" | jq -r ".[]" | while read SVC; do
            echo "⏳ Waiting for $SVC..."
            kubectl rollout status deployment/$SVC \
              -n qwikbrew \
              --timeout=600s
            echo "✅ $SVC deployed to production"
          done

      - name: 🏥 Production smoke tests
        run: |
          sleep 20
          BASE="https://api.qwikbrew.in"
          ALL_PASS=true

          check() {
            STATUS=$(curl -sk -o /dev/null -w "%{http_code}" "$1" || echo "000")
            if [[ "$STATUS" =~ ^(200|401|403)$ ]]; then
              echo "✅  $2 → HTTP $STATUS"
            else
              echo "❌ $2 → HTTP $STATUS (unexpected)"
              ALL_PASS=false
            fi
          }

          check "$BASE/actuator/health"      "Gateway health"
          check "$BASE/api/v1/menu"          "Menu service"
          check "$BASE/api/v1/users/health"  "User service"
          check "$BASE/api/v1/orders/health" "Order service"

          $ALL_PASS && echo "🎉 All production smoke tests passed" || exit 1

      - name: 🏷️ Create release tag in GitHub
        uses: actions/github-script@v7
        with:
          script: |
            const sha   = context.sha.substring(0, 7)
            const today = new Date().toISOString().slice(0, 10)
            const tag   = `prod-${today}-${sha}`
            await github.rest.git.createRef({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              ref:   `refs/tags/${tag}`,
              sha:   context.sha,
            })
            console.log(`✅ Release tagged: ${tag}`)

# ═══════════════════════════════════════════════════════════════════════════════
# JOB 7 — AUTO-ROLLBACK
# Triggers automatically if deploy-staging or deploy-prod fails.
# Runs kubectl rollout undo for every service that was being deployed.
# ═══════════════════════════════════════════════════════════════════════════════
  rollback:
    name: ⏪ Auto-Rollback
    runs-on: ubuntu-latest
    needs: [detect-changes, deploy-staging, deploy-prod]
    if: |
      always() && (
        needs.deploy-staging.result == 'failure' ||
        needs.deploy-prod.result    == 'failure'
      )

    permissions:
      id-token: write
      contents: read

    steps:
      - name: 🔐 Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: ☸️ Update kubeconfig
        run: |
          CLUSTER="${{ needs.detect-changes.outputs.eks_cluster }}"
          aws eks update-kubeconfig --name "$CLUSTER" --region ${{ env.AWS_REGION }}
          echo "🔄 Rolling back on cluster: $CLUSTER"

      - name: ⏪ Rollback all deployed services to previous version
        run: |
          SERVICES='${{ needs.detect-changes.outputs.services_json }}'
          echo "$SERVICES" | jq -r ".[]" | while read SVC; do
            echo "⏪ Rolling back $SVC..."
            kubectl rollout undo deployment/$SVC -n qwikbrew
            kubectl rollout status deployment/$SVC \
              -n qwikbrew \
              --timeout=120s
            echo "✅ $SVC rolled back"
          done

      - name: 🔍 Print pod status after rollback
        run: |
          echo "─── Pod status after rollback ──────────────────────"
          kubectl get pods -n qwikbrew -o wide
          echo "────────────────────────────────────────────────────"

# ═══════════════════════════════════════════════════════════════════════════════
# JOB 8 — NOTIFY
# Sends Slack message on success and failure.
# Sends email alert to on-call engineer on production failure.
# ═══════════════════════════════════════════════════════════════════════════════
  notify:
    name: 📣 Notify Team
    runs-on: ubuntu-latest
    needs: [detect-changes, deploy-staging, deploy-prod, rollback]
    if: |
      always() && (
        github.ref_name == 'main'    ||
        github.ref_name == 'staging' ||
        github.ref_name == 'develop'
      )

    steps:
      - name: 🟢 Slack — Deploy success
        if: |
          needs.deploy-prod.result    == 'success' ||
          needs.deploy-staging.result == 'success'
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "blocks": [{
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "✅ *QwikBrew deployed successfully!*\n*Environment:* `${{ needs.detect-changes.outputs.environment }}`\n*Commit:* `${{ github.sha }}`\n*Branch:* `${{ github.ref_name }}`\n*Triggered by:* @${{ github.actor }}\n*<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Pipeline Run>*"
                }
              }]
            }
        env:
          SLACK_WEBHOOK_URL:  ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: 🔴 Slack — Deploy failure + rollback triggered
        if: |
          needs.deploy-prod.result    == 'failure' ||
          needs.deploy-staging.result == 'failure'
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "blocks": [{
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "🔴 *QwikBrew deploy FAILED — auto-rollback triggered*\n*Environment:* `${{ needs.detect-changes.outputs.environment }}`\n*Commit:* `${{ github.sha }}`\n*Branch:* `${{ github.ref_name }}`\n*Triggered by:* @${{ github.actor }}\n*<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|🔍 View Logs & Debug>*"
                }
              }]
            }
        env:
          SLACK_WEBHOOK_URL:  ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: 📧 Email — Production failure alert to on-call
        if: needs.deploy-prod.result == 'failure'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port:    587
          username:       ${{ secrets.SMTP_USER }}
          password:       ${{ secrets.SMTP_PASS }}
          to:             ${{ secrets.ONCALL_EMAIL }}
          from:           "QwikBrew CI/CD <noreply@qwikbrew.in>"
          subject:        "🔴 PRODUCTION DEPLOY FAILED — QwikBrew (${{ github.sha }})"
          body: |
            Production deployment failed. Auto-rollback was triggered.

            Environment : Production
            Commit      : ${{ github.sha }}
            Branch      : ${{ github.ref_name }}
            Actor       : ${{ github.actor }}
            Pipeline    : ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Please investigate immediately.

            — QwikBrew CI/CD
