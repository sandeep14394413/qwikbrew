name: 🚀 QwikBrew — Helm CI/CD Pipeline

on:
  push:
    branches: [main, staging, develop]
  pull_request:
    branches: [main, staging]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: ap-south-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-south-1.amazonaws.com
  JAVA_VERSION: "17"
  MAVEN_OPTS: "-Xmx1g -XX:+UseG1GC"
  NAMESPACE: qwikbrew

jobs:
  detect-changes:
    name: 🔍 Detect Changed Services
    runs-on: ubuntu-latest
    outputs:
      services_json: ${{ steps.matrix.outputs.services_json }}
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            api-gateway: ["api-gateway/**", "pom.xml", "Dockerfile"]
            user-service: ["user-service/**", "pom.xml", "Dockerfile"]
            menu-service: ["menu-service/**", "pom.xml", "Dockerfile"]
            order-service: ["order-service/**", "pom.xml", "Dockerfile"]
            payment-service: ["payment-service/**", "pom.xml", "Dockerfile"]
            notification-service: ["notification-service/**", "pom.xml", "Dockerfile"]

      - name: Build service matrix
        id: matrix
        run: |
          SERVICES=("api-gateway" "user-service" "menu-service" "order-service" "payment-service" "notification-service")
          JSON=$(echo -n "${SERVICES[@]}" | tr " " "\n" | jq -R . | jq -sc .)
          echo "services_json=$JSON" >> $GITHUB_OUTPUT

  build:
    name: 🐳 Build & Push — ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: detect-changes
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.services_json) }}
    steps:
      - uses: actions/checkout@v4
      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven
      - name: Maven dependency cache
        run: mvn -B -ntp dependency:go-offline
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Login to ECR
        run: aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $ECR_REGISTRY
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Generate Tag
        id: tag
        run: |
          TAG=${GITHUB_REF_NAME}-$(echo $GITHUB_SHA | cut -c1-7)
          echo "tag=$TAG" >> $GITHUB_OUTPUT
      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ env.ECR_REGISTRY }}/qwikbrew/${{ matrix.service }}:${{ steps.tag.outputs.tag }}
          build-args: SERVICE=${{ matrix.service }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-staging:
    name: 🚢 Deploy → Staging
    runs-on: ubuntu-latest
    needs: [detect-changes, build]
    if: github.ref_name == 'staging' || github.ref_name == 'develop'

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Connect to EKS
        run: aws eks update-kubeconfig --name qwikbrew --region ap-south-1

      - name: Install Helm
        uses: azure/setup-helm@v4

      # ── Install External Secrets Operator FIRST ──
      - name: Install External Secrets Operator + CRDs
        run: |
          helm repo add external-secrets https://charts.external-secrets.io
          helm repo update
          helm upgrade --install external-secrets external-secrets/external-secrets \
            --namespace external-secrets \
            --create-namespace \
            --set installCRDs=true \
            --wait \
            --timeout=5m

      - name: Wait for CRDs & Webhook
        run: |
          kubectl wait --for=condition=Established crd/externalsecrets.external-secrets.io --timeout=180s || true
          kubectl wait --for=condition=Established crd/clustersecretstores.external-secrets.io --timeout=180s || true
          kubectl rollout status deployment/external-secrets-webhook -n external-secrets --timeout=180s || true
          sleep 45

      - name: Deploy qwikbrew
        run: |
          TAG=${GITHUB_REF_NAME}-$(echo $GITHUB_SHA | cut -c1-7)
          helm upgrade --install qwikbrew ./k8s \
            --namespace qwikbrew \
            --create-namespace \
            --set global.imageTag=$TAG \
            --set global.registry=${{ env.ECR_REGISTRY }} \
            --rollback-on-failure \
            --timeout 10m \
            --wait

      - name: Verify
        run: kubectl get pods -n qwikbrew -o wide

  deploy-prod:
    name: 🚢 Deploy → Production
    runs-on: ubuntu-latest
    needs: [detect-changes, build]
    if: github.ref_name == 'main'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Connect to EKS
        run: aws eks update-kubeconfig --name qwikbrew --region ap-south-1

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Install External Secrets Operator + CRDs
        run: |
          helm repo add external-secrets https://charts.external-secrets.io
          helm repo update
          helm upgrade --install external-secrets external-secrets/external-secrets \
            --namespace external-secrets \
            --create-namespace \
            --set installCRDs=true \
            --wait \
            --timeout=5m

      - name: Wait for CRDs & Webhook
        run: |
          kubectl wait --for=condition=Established crd/externalsecrets.external-secrets.io --timeout=180s || true
          kubectl wait --for=condition=Established crd/clustersecretstores.external-secrets.io --timeout=180s || true
          kubectl rollout status deployment/external-secrets-webhook -n external-secrets --timeout=180s || true
          sleep 45

      - name: Deploy qwikbrew (Production)
        run: |
          TAG=${GITHUB_REF_NAME}-$(echo $GITHUB_SHA | cut -c1-7)
          helm upgrade --install qwikbrew ./k8s \
            --namespace qwikbrew \
            --create-namespace \
            --set global.imageTag=$TAG \
            --set global.registry=${{ env.ECR_REGISTRY }} \
            --rollback-on-failure \
            --timeout 10m \
            --wait

      - name: Verify
        run: kubectl get pods -n qwikbrew -o wide
