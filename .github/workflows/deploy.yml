name: 🚀 QwikBrew — CI/CD Pipeline

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "staging"
        type: choice
        options: [staging, prod]
      service:
        description: "Single service to deploy (blank = all changed services)"
        required: false
        default: ""

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: ap-south-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-south-1.amazonaws.com
  JAVA_VERSION: "17"
  MAVEN_OPTS: "-Xmx1g -XX:+UseG1GC"

jobs:

# 🔍 DETECT CHANGES
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      services_json: ${{ steps.matrix.outputs.services_json }}
      environment:   ${{ steps.env.outputs.environment }}
      eks_cluster:   ${{ steps.env.outputs.eks_cluster }}

    steps:
      - uses: actions/checkout@v4

      - name: Build service list
        id: matrix
        run: |
          SERVICES=("api-gateway" "user-service" "menu-service" "order-service" "payment-service" "notification-service")
          JSON=$(echo -n "${SERVICES[@]}" | tr " " "\n" | jq -R . | jq -sc .)
          echo "services_json=$JSON" >> $GITHUB_OUTPUT

      - name: Set environment
        id: env
        run: |
          echo "environment=staging" >> $GITHUB_OUTPUT
          echo "eks_cluster=qwikbrew" >> $GITHUB_OUTPUT

# 🧪 TEST (SKIPPED)
  test:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: false   # ❌ Disabled

# 🐳 BUILD
  build:
    runs-on: ubuntu-latest
    needs: detect-changes
    strategy:
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.services_json) }}

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Build JAR
        run: |
          mvn install -N -DskipTests
          mvn package -pl ${{ matrix.service }} -DskipTests

      - name: Tag image
        id: tag
        run: |
          TAG=$(echo "${{ github.sha }}" | cut -c1-7)
          IMAGE=${{ env.ECR_REGISTRY }}/qwikbrew/${{ matrix.service }}
          echo "image=${IMAGE}:${TAG}" >> $GITHUB_OUTPUT

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2

      - name: Build & Push
        run: |
          docker build -t ${{ steps.tag.outputs.image }} .
          docker push ${{ steps.tag.outputs.image }}

      - run: echo "${{ steps.tag.outputs.image }}" > image.txt

      - uses: actions/upload-artifact@v4
        with:
          name: image-${{ matrix.service }}
          path: image.txt

# 🔒 TRIVY
  trivy-scan:
    runs-on: ubuntu-latest
    needs: [detect-changes, build]
    strategy:
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.services_json) }}

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: image-${{ matrix.service }}

      - id: img
        run: echo "image=$(cat image.txt)" >> $GITHUB_OUTPUT

      - uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.img.outputs.image }}
          severity: HIGH,CRITICAL
          exit-code: 0

# 🚢 DEPLOY STAGING
  deploy-staging:
    runs-on: ubuntu-latest
    needs: [detect-changes, trivy-scan]
    if: github.ref_name == 'develop' || github.ref_name == 'staging'

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - run: aws eks update-kubeconfig --name qwikbrew --region $AWS_REGION

      - run: kubectl apply -f k8s/

# ❌ PRODUCTION DISABLED
  deploy-prod:
    runs-on: ubuntu-latest
    needs: [detect-changes, trivy-scan]
    if: false   # 🚫 Disabled

# ⏪ ROLLBACK (ONLY STAGING)
  rollback:
    runs-on: ubuntu-latest
    needs: [detect-changes, deploy-staging]
    if: always() && needs.deploy-staging.result == 'failure'

    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - run: aws eks update-kubeconfig --name qwikbrew --region $AWS_REGION

      - run: |
          SERVICES='${{ needs.detect-changes.outputs.services_json }}'
          echo "$SERVICES" | jq -r ".[]" | while read SVC; do
            kubectl rollout undo deployment/$SVC -n qwikbrew
          done

# 📣 NOTIFY
  notify:
    runs-on: ubuntu-latest
    needs: [detect-changes, deploy-staging, rollback]
    if: always()

    steps:
      - name: Success
        if: needs.deploy-staging.result == 'success'
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: '{"text":"✅ Staging Deploy Success"}'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Failure
        if: needs.deploy-staging.result == 'failure'
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: '{"text":"🔴 Deploy Failed + Rollback Triggered"}'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
