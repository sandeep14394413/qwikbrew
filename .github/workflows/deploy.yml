name: 🚀 QwikBrew — CI/CD Pipeline

on:
  push:
    branches: [main, staging, develop]
  pull_request:
    branches: [main, staging]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: ap-south-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-south-1.amazonaws.com
  JAVA_VERSION: "17"

# ─────────────────────────────────────────────────────────────
# JOB 1 — DETECT SERVICES
# ─────────────────────────────────────────────────────────────
jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.set.outputs.services }}
      cluster: qwikbrew

    steps:
      - uses: actions/checkout@v4

      - id: set
        run: |
          SERVICES='["api-gateway","user-service","menu-service","order-service","payment-service","notification-service"]'
          echo "services=$SERVICES" >> $GITHUB_OUTPUT

# ─────────────────────────────────────────────────────────────
# JOB 2 — BUILD & PUSH BACKEND
# ─────────────────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    needs: detect-changes
    strategy:
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.services) }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin
          cache: maven

      - name: Build JAR
        run: |
          mvn install -N -DskipTests
          mvn package -pl ${{ matrix.service }} -DskipTests

      - name: Generate tag
        id: tag
        run: |
          TAG=${GITHUB_SHA::7}
          IMAGE=$ECR_REGISTRY/qwikbrew/${{ matrix.service }}
          echo "image=$IMAGE:$TAG" >> $GITHUB_OUTPUT

      - name: AWS Login
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: ECR Login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & Push
        run: |
          docker build -t ${{ steps.tag.outputs.image }} .
          docker push ${{ steps.tag.outputs.image }}

# ─────────────────────────────────────────────────────────────
# JOB 3 — TRIVY SCAN
# ─────────────────────────────────────────────────────────────
  scan:
    runs-on: ubuntu-latest
    needs: [build, detect-changes]
    strategy:
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.services) }}

    steps:
      - name: Scan image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.ECR_REGISTRY }}/qwikbrew/${{ matrix.service }}:${{ github.sha }}
          severity: HIGH,CRITICAL
          exit-code: 0

# ─────────────────────────────────────────────────────────────
# JOB 4 — DEPLOY STAGING
# ─────────────────────────────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: [scan, detect-changes]

    steps:
      - uses: actions/checkout@v4

      - name: AWS Login
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --name qwikbrew --region ap-south-1

      # ✅ FIXED — FRONTEND IMAGE PUSH
      - name: ECR Login for frontend
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & Push Frontend
        id: frontend
        run: |
          TAG=${GITHUB_SHA::7}
          IMAGE=$ECR_REGISTRY/qwikbrew/frontend:$TAG

          docker build -t $IMAGE ./frontend
          docker push $IMAGE

          echo "image=$IMAGE" >> $GITHUB_OUTPUT

      - name: Deploy to Kubernetes
        run: |
          kubectl apply -f k8s/

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/api-gateway -n qwikbrew --timeout=300s

# ─────────────────────────────────────────────────────────────
# JOB 5 — ROLLBACK
# ─────────────────────────────────────────────────────────────
  rollback:
    runs-on: ubuntu-latest
    needs: deploy
    if: failure()

    steps:
      - name: AWS Login
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Rollback
        run: |
          aws eks update-kubeconfig --name qwikbrew
          kubectl rollout undo deployment/api-gateway -n qwikbrew

# ─────────────────────────────────────────────────────────────
# JOB 6 — NOTIFY
# ─────────────────────────────────────────────────────────────
  notify:
    runs-on: ubuntu-latest
    needs: [deploy, rollback]
    if: always()

    steps:
      - name: Slack Notification
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "🚀 QwikBrew Pipeline: ${{ job.status }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
