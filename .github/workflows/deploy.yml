name: 🚀 QwikBrew — Ultimate CI/CD

on:
  push:
    branches: [main, staging, develop]

env:
  AWS_REGION: ap-south-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-south-1.amazonaws.com
  JAVA_VERSION: "17"

jobs:
# ─────────────────────────────────────────────
# DETECT SERVICES
# ─────────────────────────────────────────────
  detect:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.set.outputs.services }}

    steps:
      - uses: actions/checkout@v4

      - id: set
        run: |
          echo 'services=["api-gateway","user-service","menu-service","order-service","payment-service","notification-service"]' >> $GITHUB_OUTPUT

# ─────────────────────────────────────────────
# BUILD + PUSH (FIXED)
# ─────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    needs: detect

    strategy:
      matrix:
        service: ${{ fromJson(needs.detect.outputs.services) }}

    steps:
      - uses: actions/checkout@v4

# ⚡ FAST JAVA SETUP (CACHED)
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

# ⚡ PRE-DOWNLOAD DEPENDENCIES (10x speed)
      - name: Cache dependencies
        run: mvn -B -ntp dependency:go-offline

# 🔐 AWS LOGIN (FIXED TIMEOUT ISSUE)
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region $AWS_REGION \
          | docker login --username AWS --password-stdin $ECR_REGISTRY

# ⚡ SETUP BUILDX (FIX CACHE ERROR)
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container

# 🏷️ TAG
      - name: Tag
        id: tag
        run: |
          TAG=${GITHUB_REF_NAME}-$(echo $GITHUB_SHA | cut -c1-7)
          echo "tag=$TAG" >> $GITHUB_OUTPUT

# 🐳 BUILD (CRITICAL FIX HERE)
      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: .                     # ✅ ROOT context
          file: ./Dockerfile             # ✅ ROOT Dockerfile
          push: true
          tags: ${{ env.ECR_REGISTRY }}/qwikbrew/${{ matrix.service }}:${{ steps.tag.outputs.tag }}
          build-args: |
            SERVICE=${{ matrix.service }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false   # faster

# ─────────────────────────────────────────────
# DEPLOY
# ─────────────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Connect to EKS
        run: aws eks update-kubeconfig --name qwikbrew --region $AWS_REGION

      - name: Deploy
        run: |
          kubectl apply -f k8s/
