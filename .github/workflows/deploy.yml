name: 🚀 QwikBrew Ultra-Fast CI/CD

on:
  push:
    branches: [main, staging, develop]

env:
  AWS_REGION: ap-south-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-south-1.amazonaws.com
  JAVA_VERSION: "17"

jobs:

# ─────────────────────────────────────────────
# 🔍 Detect Services
# ─────────────────────────────────────────────
  detect:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.set.outputs.services }}

    steps:
      - uses: actions/checkout@v4

      - id: set
        run: |
          echo 'services=["api-gateway","user-service","menu-service","order-service","payment-service","notification-service"]' >> $GITHUB_OUTPUT

# ─────────────────────────────────────────────
# 🐳 Build & Push (FAST)
# ─────────────────────────────────────────────
  build:
    needs: detect
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service: ${{ fromJson(needs.detect.outputs.services) }}

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      # ⚡ Java + Maven cache
      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      # ⚡ Pre-download dependencies (huge speed boost)
      - name: ⚡ Maven Dependency Cache Warmup
        run: mvn -B -q dependency:go-offline

      # 🔐 AWS login (FIXED stable version)
      - name: 🔐 Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: 🔑 Login to ECR (FIXED)
        uses: aws-actions/amazon-ecr-login@v1

      # ⚡ Buildx FIX (removes cache error)
      - name: 🐳 Setup Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container

      # 🏷️ Tag
      - name: 🏷️ Generate Tag
        id: tag
        run: |
          SHORT=$(echo $GITHUB_SHA | cut -c1-7)
          echo "tag=main-$SHORT" >> $GITHUB_OUTPUT

      # 🚀 BUILD (FAST + FIXED)
      - name: 🚀 Build & Push
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          file: ./${{ matrix.service }}/Dockerfile   # ✅ FIXED
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/qwikbrew/${{ matrix.service }}:${{ steps.tag.outputs.tag }}

          # ⚡ 10x speed caching
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

# ─────────────────────────────────────────────
# 🚢 Deploy (Staging)
# ─────────────────────────────────────────────
  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: 🔐 Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: ☸️ Connect to EKS
        run: |
          aws eks update-kubeconfig --name qwikbrew --region $AWS_REGION

      - name: 🚀 Deploy
        run: |
          kubectl apply -f k8s/

      - name: ⏳ Wait for rollout
        run: |
          kubectl rollout status deployment/api-gateway -n qwikbrew
