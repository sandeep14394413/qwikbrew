name: 🚀 QwikBrew — CI/CD Pipeline

on:
  push:
    branches: [main, staging, develop]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "staging"
        type: choice
        options: [staging, prod]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: ap-south-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-south-1.amazonaws.com
  JAVA_VERSION: "17"

jobs:
  # 1. Detect Changes
  detect-changes:
    name: 🔍 Detect Services
    runs-on: ubuntu-latest
    outputs:
      services_json: ${{ steps.matrix.outputs.services_json }}
      eks_cluster: "qwikbrew"
    steps:
      - uses: actions/checkout@v4
      - id: matrix
        run: |
          SERVICES=("api-gateway" "user-service" "menu-service" "order-service" "payment-service" "notification-service")
          JSON=$(echo -n "${SERVICES[@]}" | tr " " "\n" | jq -R . | jq -sc .)
          echo "services_json=$JSON" >> $GITHUB_OUTPUT

  # 2. Build and Push
  build:
    name: 🐳 Build — ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: detect-changes
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.services_json) }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'
      
      - name: Build JAR
        run: |
          mvn install -N -DskipTests -q
          mvn package -pl ${{ matrix.service }} -DskipTests -am

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & Push Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          build-args: SERVICE=${{ matrix.service }}
          push: true
          tags: ${{ env.ECR_REGISTRY }}/qwikbrew/${{ matrix.service }}:latest

  # 3. Deploy to Staging
  deploy-staging:
    name: 🚢 Deploy → Staging
    runs-on: ubuntu-latest
    needs: [detect-changes, build]
    environment:
      name: staging
      url: https://staging.qwikbrew.in
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update Kubeconfig
        run: aws eks update-kubeconfig --name qwikbrew --region ${{ env.AWS_REGION }}

      - name: Substitute Manifests
        run: |
          find k8s/ -name "*.yaml" -exec sed -i \
            -e "s|ACCOUNT_ID|${{ secrets.AWS_ACCOUNT_ID }}|g" \
            -e "s|REDIS_ENDPOINT|${{ secrets.STAGING_REDIS_ENDPOINT }}|g" \
            -e "s|CERT_ARN|${{ secrets.STAGING_ACM_CERT_ARN }}|g" \
            -e "s|qwikbrew/ENV/|qwikbrew/staging/|g" \
            {} \;

      - name: Apply Manifests
        run: |
          kubectl apply -f k8s/00-namespace-config.yaml
          kubectl apply -f k8s/01-deployments.yaml
          kubectl apply -f k8s/02-hpa-pdb.yaml
          kubectl apply -f k8s/03-ingress.yaml

      - name: 🗺️ Update Route53 DNS
        run: |
          echo "⏳ Waiting for ALB Hostname..."
          ALB=""
          for i in {1..20}; do
            ALB=$(kubectl get ingress qwikbrew-api-ingress -n qwikbrew -o jsonpath="{.status.loadBalancer.ingress[0].hostname}" 2>/dev/null || echo "")
            [ -n "$ALB" ] && break
            sleep 15
          done

          if [ -z "$ALB" ]; then echo "ALB not found"; exit 1; fi

          # Mumbai ALB Zone ID is fixed: ZP97D6O53SNC
          cat << EOF > dns-change.json
          {
            "Changes": [
              {"Action": "UPSERT", "ResourceRecordSet": {"Name": "staging.qwikbrew.in", "Type": "A", "AliasTarget": {"HostedZoneId": "ZP97D6O53SNC", "DNSName": "$ALB", "EvaluateTargetHealth": true}}},
              {"Action": "UPSERT", "ResourceRecordSet": {"Name": "staging-api.qwikbrew.in", "Type": "A", "AliasTarget": {"HostedZoneId": "ZP97D6O53SNC", "DNSName": "$ALB", "EvaluateTargetHealth": true}}}
            ]
          }
          EOF
          aws route53 change-resource-record-sets --hosted-zone-id ${{ secrets.AWS_HOSTED_ZONE_ID }} --change-batch file://dns-change.json

      - name: 🏥 Health Check Loop
        run: |
          ALB=$(kubectl get ingress qwikbrew-api-ingress -n qwikbrew -o jsonpath="{.status.loadBalancer.ingress[0].hostname}")
          echo "Checking Health for ALB: $ALB"
          
          MAX_RETRIES=10
          SUCCESS=false

          for i in $(seq 1 $MAX_RETRIES); do
            echo "Attempt $i/$MAX_RETRIES..."
            # Check the API via the Host header on the ALB
            STATUS=$(curl -sk -o /dev/null -w "%{http_code}" -H "Host: staging-api.qwikbrew.in" "http://$ALB/actuator/health" || echo "000")
            
            if [ "$STATUS" == "200" ]; then
              echo "✅ QwikBrew API is Live!"
              SUCCESS=true
              break
            fi
            sleep 20
          done

          if [ "$SUCCESS" = false ]; then
            echo "❌ Health check failed."
            kubectl get pods -n qwikbrew
            exit 1
          fi

      - name: 🚀 Deployment Summary
        run: |
          echo "### 🚀 QwikBrew is Live!" >> $GITHUB_STEP_SUMMARY
          echo "- **Frontend:** https://staging.qwikbrew.in" >> $GITHUB_STEP_SUMMARY
          echo "- **API Health:** https://staging-api.qwikbrew.in/actuator/health" >> $GITHUB_STEP_SUMMARY
