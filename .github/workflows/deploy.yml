name: 🚀 QwikBrew — CI/CD Pipeline (FAANG Level)

on:
  push:
    branches: [main, staging, develop]
  pull_request:
    branches: [main, staging]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: ap-south-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-south-1.amazonaws.com
  JAVA_VERSION: "17"

# ─────────────────────────────────────────────
# JOB 1 — DETECT CHANGES
# ─────────────────────────────────────────────
jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.matrix.outputs.services }}

    steps:
      - uses: actions/checkout@v4

      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            api-gateway: ["api-gateway/**"]
            user-service: ["user-service/**"]
            menu-service: ["menu-service/**"]
            order-service: ["order-service/**"]
            payment-service: ["payment-service/**"]
            notification-service: ["notification-service/**"]

      - id: matrix
        run: |
          SERVICES=()

          for S in api-gateway user-service menu-service order-service payment-service notification-service; do
            if [[ "${{ steps.filter.outputs[S] }}" == "true" ]]; then
              SERVICES+=("$S")
            fi
          done

          if [ ${#SERVICES[@]} -eq 0 ]; then
            SERVICES=(api-gateway user-service menu-service order-service payment-service notification-service)
          fi

          JSON=$(printf '%s\n' "${SERVICES[@]}" | jq -R . | jq -cs .)
          echo "services=$JSON" >> $GITHUB_OUTPUT

# ─────────────────────────────────────────────
# JOB 2 — TEST
# ─────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    needs: detect-changes
    strategy:
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.services) }}

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: testdb
        ports: ["5432:5432"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin
          cache: maven

      - run: mvn install -N -DskipTests

      - run: |
          mvn test -pl ${{ matrix.service }} \
          -Dspring.datasource.url=jdbc:postgresql://localhost:5432/testdb \
          -Dspring.datasource.username=test \
          -Dspring.datasource.password=test

# ─────────────────────────────────────────────
# JOB 3 — BUILD & PUSH
# ─────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    needs: [detect-changes, test]
    strategy:
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.services) }}

    permissions:
      id-token
