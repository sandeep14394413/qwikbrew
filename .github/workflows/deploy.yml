name: QwikBrew Deployment

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Connect to EKS
        run: aws eks update-kubeconfig --name qwikbrew --region ap-south-1

      - name: Install Helm
        uses: azure/setup-helm@v4

      # 1. Install External Secrets Operator FIRST
      - name: Install External Secrets Operator + CRDs
        run: |
          helm repo add external-secrets https://charts.external-secrets.io
          helm repo update

          echo "Installing External Secrets Operator..."
          helm upgrade --install external-secrets external-secrets/external-secrets \
            --namespace external-secrets \
            --create-namespace \
            --set installCRDs=true \
            --wait \
            --timeout=5m

      # 2. Wait for CRDs
      - name: Wait for CRDs
        run: |
          echo "Waiting for CRDs..."
          kubectl wait --for=condition=Established crd/externalsecrets.external-secrets.io --timeout=180s || true
          kubectl wait --for=condition=Established crd/clustersecretstores.external-secrets.io --timeout=180s || true
          sleep 30

      # 3. Deploy qwikbrew
      - name: Deploy qwikbrew
        run: |
          TAG=${GITHUB_REF_NAME}-$(echo $GITHUB_SHA | cut -c1-7)
          echo "Deploying qwikbrew with tag: $TAG"

          helm upgrade --install qwikbrew ./k8s \
            --namespace qwikbrew \
            --create-namespace \
            --set global.imageTag=${TAG} \
            --set global.registry=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-south-1.amazonaws.com \
            --rollback-on-failure \
            --timeout 10m \
            --wait
            
