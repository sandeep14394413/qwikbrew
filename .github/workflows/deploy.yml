name: Deploy qwikbrew to Kubernetes

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  workflow_dispatch:

env:
  NAMESPACE: qwikbrew

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up kubectl and Helm
        uses: azure/setup-helm@v4
        with:
          version: latest

      - name: Configure Kubernetes (add your kubeconfig setup here)
        run: |
          # Example: If using kubeconfig secret
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > $HOME/.kube/config
          kubectl version --short
          helm version

      - name: Install External Secrets Operator (with CRDs)
        run: |
          echo "Installing External Secrets Operator..."
          helm repo add external-secrets https://charts.external-secrets.io
          helm repo update
          
          helm upgrade --install external-secrets external-secrets/external-secrets \
            --namespace external-secrets \
            --create-namespace \
            --set installCRDs=true \
            --set webhook.create=true \
            --wait \
            --timeout=3m

          echo "Waiting for External Secrets Operator to be ready..."
          kubectl wait --for=condition=available deployment/external-secrets-webhook -n external-secrets --timeout=120s
          kubectl get crd | grep external-secrets

      - name: Deploy qwikbrew Application
        run: |
          TAG=${GITHUB_REF_NAME}-$(echo $GITHUB_SHA | cut -c1-7)
          echo "Deploying qwikbrew with tag: $TAG"

          helm upgrade --install qwikbrew ./chart/qwikbrew \
            --namespace ${{ env.NAMESPACE }} \
            --create-namespace \
            --set image.tag=$TAG \
            --wait \
            --timeout=5m

      - name: Verify Deployment
        run: |
          echo "Checking deployment status..."
          kubectl get pods -n ${{ env.NAMESPACE }}
          kubectl get externalsecret -n ${{ env.NAMESPACE }}
          kubectl get clustersecretstore -A || true
