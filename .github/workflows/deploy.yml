name: 🚀 QwikBrew — CI/CD Pipeline

on:
  push:
    branches: [main, staging, develop]
  pull_request:
    branches: [main, staging]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: ap-south-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-south-1.amazonaws.com
  JAVA_VERSION: "17"
  MAVEN_OPTS: "-Xmx1g -XX:+UseG1GC"

jobs:

# ─────────────────────────────────────────────
# DETECT SERVICES
# ─────────────────────────────────────────────
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.set.outputs.services }}
      cluster: qwikbrew

    steps:
      - uses: actions/checkout@v4

      - id: set
        run: |
          echo 'services=["api-gateway","user-service","menu-service","order-service","payment-service","notification-service"]' >> $GITHUB_OUTPUT

# ─────────────────────────────────────────────
# BUILD BACKEND SERVICES
# ─────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: github.event_name != 'pull_request'

    strategy:
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.services) }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin
          cache: maven

      - name: Build JAR
        run: |
          mvn install -N -DskipTests
          mvn package -pl ${{ matrix.service }} -DskipTests

      - name: Generate tag
        id: tag
        run: |
          SHORT_SHA=${GITHUB_SHA::7}
          BRANCH=$(echo "${GITHUB_REF_NAME}" | sed 's/[^a-zA-Z0-9._-]/-/g')
          TAG="${BRANCH}-${SHORT_SHA}"
          IMAGE=$ECR_REGISTRY/qwikbrew/${{ matrix.service }}

          echo "image_full=$IMAGE:$TAG" >> $GITHUB_OUTPUT
          echo "image_latest=$IMAGE:latest" >> $GITHUB_OUTPUT

      - name: AWS Login
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: ECR Login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & Push Docker
        run: |
          docker build -t ${{ steps.tag.outputs.image_full }} .
          docker push ${{ steps.tag.outputs.image_full }}

# ─────────────────────────────────────────────
# TRIVY SCAN
# ─────────────────────────────────────────────
  trivy:
    runs-on: ubuntu-latest
    needs: [build, detect-changes]

    strategy:
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.services) }}

    steps:
      - name: Scan Image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.ECR_REGISTRY }}/qwikbrew/${{ matrix.service }}:${{ github.sha }}
          severity: HIGH,CRITICAL
          exit-code: 0

# ─────────────────────────────────────────────
# DEPLOY TO STAGING
# ─────────────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: [trivy, detect-changes]
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: AWS Login
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --name qwikbrew --region ap-south-1

# 🔥 FIXED FRONTEND PIPELINE
      - name: ECR Login (Frontend)
        uses: aws-actions/amazon-ecr-login@v2

      - name: Generate frontend tag
        id: frontend-tag
        run: |
          SHORT_SHA=${GITHUB_SHA::7}
          BRANCH=$(echo "${GITHUB_REF_NAME}" | sed 's/[^a-zA-Z0-9._-]/-/g')
          TAG="${BRANCH}-${SHORT_SHA}"
          IMAGE=$ECR_REGISTRY/qwikbrew/frontend

          echo "image_full=$IMAGE:$TAG" >> $GITHUB_OUTPUT
          echo "image_latest=$IMAGE:latest" >> $GITHUB_OUTPUT

      - name: Build & Push Frontend
        run: |
          docker build -t ${{ steps.frontend-tag.outputs.image_full }} ./frontend
          docker push ${{ steps.frontend-tag.outputs.image_full }}

          docker tag ${{ steps.frontend-tag.outputs.image_full }} ${{ steps.frontend-tag.outputs.image_latest }}
          docker push ${{ steps.frontend-tag.outputs.image_latest }}

# ─────────────────────────────────────────────
# K8S DEPLOY
# ─────────────────────────────────────────────
      - name: Deploy to Kubernetes
        run: |
          kubectl apply -f k8s/

      - name: Wait rollout
        run: |
          kubectl rollout status deployment/api-gateway -n qwikbrew --timeout=300s

# ─────────────────────────────────────────────
# ROLLBACK
# ─────────────────────────────────────────────
  rollback:
    runs-on: ubuntu-latest
    needs: deploy
    if: failure()

    steps:
      - name: AWS Login
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Rollback
        run: |
          aws eks update-kubeconfig --name qwikbrew
          kubectl rollout undo deployment/api-gateway -n qwikbrew

# ─────────────────────────────────────────────
# NOTIFY
# ─────────────────────────────────────────────
  notify:
    runs-on: ubuntu-latest
    needs: [deploy, rollback]
    if: always()

    steps:
      - name: Slack
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "🚀 QwikBrew Pipeline: ${{ job.status }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
