name: 🚀 QwikBrew — Helm CI/CD Pipeline

on:
  push:
    branches: [main, staging, develop]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: ap-south-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-south-1.amazonaws.com
  CLUSTER_NAME: qwikbrew
  NAMESPACE: qwikbrew

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: 🔐 Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: ☸️ Connect to EKS
        run: aws eks update-kubeconfig --name ${{ env.CLUSTER_NAME }} --region ${{ env.AWS_REGION }}

      - name: 📦 Install Helm
        uses: azure/setup-helm@v4

      # ==================== 1. EXTERNAL SECRETS OPERATOR (CRITICAL) ====================
      - name: Install External Secrets Operator + CRDs
        run: |
          helm repo add external-secrets https://charts.external-secrets.io
          helm repo update

          echo "🛠️ Installing External Secrets Operator with CRDs..."
          helm upgrade --install external-secrets external-secrets/external-secrets \
            --namespace external-secrets \
            --create-namespace \
            --set installCRDs=true \
            --set replicaCount=2 \
            --set webhook.create=true \
            --wait \
            --timeout=5m

          echo "✅ External Secrets Operator installed."

      # ==================== 2. STRONG WAIT FOR CRDs ====================
      - name: Wait for CRDs and Webhook Readiness
        run: |
          echo "Waiting for CRDs..."
          kubectl wait --for=condition=Established crd/externalsecrets.external-secrets.io --timeout=180s || echo "CRD wait timed out - continuing"
          kubectl wait --for=condition=Established crd/clustersecretstores.external-secrets.io --timeout=180s || echo "CRD wait timed out - continuing"
          kubectl wait --for=condition=Established crd/secretstores.external-secrets.io --timeout=180s || echo "CRD wait timed out - continuing"

          echo "Waiting for deployments..."
          kubectl rollout status deployment/external-secrets -n external-secrets --timeout=300s
          kubectl rollout status deployment/external-secrets-webhook -n external-secrets --timeout=180s || true

          echo "Safety delay for webhook..."
          sleep 60

      # ==================== 3. DEPLOY QWIKBREW ====================
      - name: 🚀 Deploy qwikbrew
        run: |
          TAG=${GITHUB_REF_NAME}-$(echo $GITHUB_SHA | cut -c1-7)
          echo "Deploying qwikbrew with tag: $TAG"

          helm upgrade --install qwikbrew ./k8s \
            --namespace ${{ env.NAMESPACE }} \
            --create-namespace \
            --set global.imageTag=${TAG} \
            --set global.registry=${{ env.ECR_REGISTRY }} \
            --rollback-on-failure \
            --timeout 10m \
            --wait

      - name: Verify Deployment
        run: |
          echo "=== Pods ==="
          kubectl get pods -n ${{ env.NAMESPACE }} -o wide
          echo "=== External Secrets Resources ==="
          kubectl get clustersecretstore,externalsecret -n ${{ env.NAMESPACE }} || true
