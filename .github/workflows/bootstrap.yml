name: 🏗️ Bootstrap Infrastructure

on:
  workflow_dispatch:
    inputs:
      environment:
        required: true
        default: staging
        type: choice
        options: [staging, prod]

env:
  AWS_REGION: ap-south-1
  TF_DIR: ./terraform
  TF_VERSION: 1.7.5

jobs:
  bootstrap:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # 🔐 Initial AWS auth (only for bootstrap)
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # 🔍 Get Account ID
      - name: Get AWS account ID
        id: account
        run: |
          echo "id=$(aws sts get-caller-identity --query Account --output text)" >> $GITHUB_OUTPUT

      # 🌐 Create OIDC provider (safe if exists)
      - name: Create OIDC provider
        run: |
          aws iam create-open-id-connect-provider \
            --url https://token.actions.githubusercontent.com \
            --client-id-list sts.amazonaws.com \
            --thumbprint-list 6938fd4d98bab03faadb97b34396831e3780aea1 \
          || echo "OIDC already exists"

      # 👤 Create IAM role
      - name: Create IAM role
        env:
          ACCOUNT_ID: ${{ steps.account.outputs.id }}
        run: |
          cat > trust.json <<EOF
{
  "Version": "2012-10-17",
  "Statement": [{
    "Effect": "Allow",
    "Principal": {
      "Federated": "arn:aws:iam::${ACCOUNT_ID}:oidc-provider/token.actions.githubusercontent.com"
    },
    "Action": "sts:AssumeRoleWithWebIdentity",
    "Condition": {
      "StringEquals": {
        "token.actions.githubusercontent.com:aud": "sts.amazonaws.com"
      }
    }
  }]
}
EOF

          aws iam create-role \
            --role-name github-actions-role \
            --assume-role-policy-document file://trust.json \
          || echo "Role exists"

      # 🪣 S3 backend
      - name: Create S3 backend
        env:
          ACCOUNT_ID: ${{ steps.account.outputs.id }}
        run: |
          BUCKET="tf-state-${ACCOUNT_ID}"

          aws s3 mb s3://$BUCKET --region $AWS_REGION || true

      # 🔧 Setup Terraform
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: ${{ env.TF_DIR }}
        run: terraform init

      - name: Terraform Apply
        working-directory: ${{ env.TF_DIR }}
        env:
          TF_VAR_environment: ${{ github.event.inputs.environment }}
          TF_VAR_aiven_api_token: ${{ secrets.AIVEN_API_TOKEN }}
          TF_VAR_aiven_project: ${{ secrets.AIVEN_PROJECT_NAME }}
        run: terraform apply -auto-approve

      # ☸️ Configure kubectl
      - name: Configure kubeconfig
        run: |
          CLUSTER=$(terraform -chdir=terraform output -raw cluster_name)
          aws eks update-kubeconfig --name $CLUSTER --region $AWS_REGION

      # 🔐 Fix aws-auth (SAFE VERSION)
      - name: Add IAM role to aws-auth
        run: |
          ROLE_ARN="arn:aws:iam::${{ steps.account.outputs.id }}:role/github-actions-role"

          read -r -d '' ENTRY <<EOF
- rolearn: ${ROLE_ARN}
  username: github-actions
  groups:
    - system:masters
EOF

          kubectl patch configmap aws-auth -n kube-system \
            --type merge \
            -p "{\"data\":{\"mapRoles\":\"$ENTRY\"}}"

      - name: ✅ Done
        run: echo "Bootstrap complete"
