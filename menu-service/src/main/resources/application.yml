server:
  port: 8082

spring:
  application:
    name: menu-service
  datasource:
    url:      ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/menudb}
    username: ${SPRING_DATASOURCE_USERNAME:qwikbrew}
    password: ${SPRING_DATASOURCE_PASSWORD:qwikbrew}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: false
    locations: classpath:db/migration
  cache:
    type: simple   # in-memory cache — no Redis needed on free tier
    # Upgrade to type: redis with ElastiCache when moving to paid tier

eureka:
  client:
    enabled: false                  # disabled — no Eureka server in K8s; gateway routes directly
    register-with-eureka: false
    fetch-registry: false
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://service-discovery:8761/eureka/}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

---
spring:
  config:
    activate:
      on-profile: test
  datasource:
    url:      jdbc:h2:mem:menudb;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
  flyway:
    enabled: false
  cache:
    type: simple
