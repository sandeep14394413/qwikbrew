server:
  port: 8082

spring:
  application:
    name: menu-service
  datasource:
    url:      ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/menudb}
    username: ${SPRING_DATASOURCE_USERNAME:qwikbrew}
    password: ${SPRING_DATASOURCE_PASSWORD:qwikbrew}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
  cache:
    type: simple   # in-memory cache — no Redis needed on free tier
    # Upgrade to type: redis with ElastiCache when moving to paid tier

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

# ── Startup resilience ────────────────────────────────────────────────────────
# Prevents immediate crash if DB/Kafka not available at startup.
# Pods stay Running and retry — readiness probe fails until infra is ready.
spring:
  datasource:
    hikari:
      initialization-fail-timeout: -1    # never fail on pool init
      connection-timeout: 10000
      connection-test-query: SELECT 1
  jpa:
    properties:
      hibernate:
        connection:
          handling_mode: delayed_acquisition_and_release_after_transaction

---
spring:
  config:
    activate:
      on-profile: test
  datasource:
    url:      jdbc:h2:mem:menudb;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
  flyway:
    enabled: false
  cache:
    type: simple
