# HPA — scale pods on CPU utilization
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata: { name: api-gateway-hpa, namespace: qwikbrew }
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: api-gateway }
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource: { name: cpu, target: { type: Utilization, averageUtilization: 60 } }
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata: { name: user-service-hpa, namespace: qwikbrew }
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: user-service }
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource: { name: cpu, target: { type: Utilization, averageUtilization: 65 } }
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata: { name: menu-service-hpa, namespace: qwikbrew }
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: menu-service }
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource: { name: cpu, target: { type: Utilization, averageUtilization: 65 } }
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata: { name: order-service-hpa, namespace: qwikbrew }
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: order-service }
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource: { name: cpu, target: { type: Utilization, averageUtilization: 60 } }
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata: { name: payment-service-hpa, namespace: qwikbrew }
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: payment-service }
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource: { name: cpu, target: { type: Utilization, averageUtilization: 60 } }

---
# PDB — ensure at least 1 pod is always available during rolling updates
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata: { name: api-gateway-pdb, namespace: qwikbrew }
spec: { minAvailable: 1, selector: { matchLabels: { app: api-gateway } } }
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata: { name: user-service-pdb, namespace: qwikbrew }
spec: { minAvailable: 1, selector: { matchLabels: { app: user-service } } }
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata: { name: order-service-pdb, namespace: qwikbrew }
spec: { minAvailable: 1, selector: { matchLabels: { app: order-service } } }
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata: { name: payment-service-pdb, namespace: qwikbrew }
spec: { minAvailable: 1, selector: { matchLabels: { app: payment-service } } }
