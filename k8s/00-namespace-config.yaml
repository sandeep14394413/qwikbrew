apiVersion: v1
kind: Namespace
metadata:
  name: qwikbrew

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: qwikbrew-config
  namespace: qwikbrew
data:
  SPRING_PROFILES_ACTIVE:                    "aws"
  EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:      "http://service-discovery:8761/eureka/"
  MENU_CACHE_TTL_MINUTES:                    "15"
  JWT_ACCESS_EXPIRY_MINUTES:                 "60"
  JWT_REFRESH_EXPIRY_DAYS:                   "30"
  ORDER_NUMBER_PREFIX:                       "QBR"
  SPRING_KAFKA_CONSUMER_AUTO_OFFSET_RESET:   "earliest"
  SPRING_KAFKA_CONSUMER_GROUP_ID:            "qwikbrew-group"

---
# ClusterSecretStore — authenticates to AWS Secrets Manager via IRSA (OIDC)
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secretsmanager
spec:
  provider:
    aws:
      service: SecretsManager
      region:  ap-south-1
      auth:
        jwt:
          serviceAccountRef:
            name:      external-secrets-sa
            namespace: external-secrets

---
# Pulls Aiven PG JDBC URLs + Kafka SASL credentials into a K8s Secret.
# ENV placeholder is replaced by the pipeline with 'staging' or 'prod'.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: aiven-credentials
  namespace: qwikbrew
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name:           aiven-credentials
    creationPolicy: Owner
  data:
    - secretKey: USERDB_JDBC_URL
      remoteRef: { key: "qwikbrew/ENV/aiven-credentials", property: USERDB_URL }
    - secretKey: MENUDB_JDBC_URL
      remoteRef: { key: "qwikbrew/ENV/aiven-credentials", property: MENUDB_URL }
    - secretKey: ORDERDB_JDBC_URL
      remoteRef: { key: "qwikbrew/ENV/aiven-credentials", property: ORDERDB_URL }
    - secretKey: PAYMENTDB_JDBC_URL
      remoteRef: { key: "qwikbrew/ENV/aiven-credentials", property: PAYMENTDB_URL }
    - secretKey: NOTIFICATIONDB_JDBC_URL
      remoteRef: { key: "qwikbrew/ENV/aiven-credentials", property: NOTIFICATIONDB_URL }
    - secretKey: DB_USERNAME
      remoteRef: { key: "qwikbrew/ENV/aiven-credentials", property: PG_USER }
    - secretKey: DB_PASSWORD
      remoteRef: { key: "qwikbrew/ENV/aiven-credentials", property: PG_PASSWORD }
    - secretKey: KAFKA_BOOTSTRAP_SERVERS
      remoteRef: { key: "qwikbrew/ENV/aiven-credentials", property: KAFKA_BOOTSTRAP_SERVERS }
    - secretKey: KAFKA_SECURITY_PROTOCOL
      remoteRef: { key: "qwikbrew/ENV/aiven-credentials", property: KAFKA_SECURITY_PROTOCOL }
    - secretKey: KAFKA_SASL_MECHANISM
      remoteRef: { key: "qwikbrew/ENV/aiven-credentials", property: KAFKA_SASL_MECHANISM }
    - secretKey: KAFKA_SASL_USERNAME
      remoteRef: { key: "qwikbrew/ENV/aiven-credentials", property: KAFKA_SASL_USERNAME }
    - secretKey: KAFKA_SASL_PASSWORD
      remoteRef: { key: "qwikbrew/ENV/aiven-credentials", property: KAFKA_SASL_PASSWORD }

---
# Pulls JWT secret, Redis token, payment gateway keys, SMTP creds
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: app-secrets
  namespace: qwikbrew
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name:           app-secrets
    creationPolicy: Owner
  data:
    - secretKey: JWT_SECRET
      remoteRef: { key: "qwikbrew/ENV/app-secrets", property: JWT_SECRET }
    - secretKey: PAYMENT_GATEWAY_KEY_ID
      remoteRef: { key: "qwikbrew/ENV/app-secrets", property: PAYMENT_GATEWAY_KEY_ID }
    - secretKey: PAYMENT_GATEWAY_SECRET
      remoteRef: { key: "qwikbrew/ENV/app-secrets", property: PAYMENT_GATEWAY_SECRET }
    - secretKey: FCM_SERVER_KEY
      remoteRef: { key: "qwikbrew/ENV/app-secrets", property: FCM_SERVER_KEY }
    - secretKey: SMTP_USER
      remoteRef: { key: "qwikbrew/ENV/app-secrets", property: SMTP_USER }
    - secretKey: SMTP_PASS
      remoteRef: { key: "qwikbrew/ENV/app-secrets", property: SMTP_PASS }
