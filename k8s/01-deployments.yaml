# ═══════════════════════════════════════════════════════════════════════════════
#  QwikBrew — K8s Deployments (all 6 microservices)
#
#  Database URLs and Kafka credentials come from the 'aiven-credentials'
#  K8s Secret, which is synced from AWS Secrets Manager by External Secrets.
#  No connection strings are hardcoded anywhere.
#
#  Placeholders replaced by deploy.yml pipeline:
#    ACCOUNT_ID      → AWS account ID
#    :latest         → branch-shortSHA image tag (e.g. staging-a3f7c12)
#    REDIS_ENDPOINT  → ElastiCache primary endpoint
#    CERT_ARN        → ACM certificate ARN
# ═══════════════════════════════════════════════════════════════════════════════

# ── Shared helper: Kafka SASL_SSL env block used by order, notification ───────
# (copy this block into any service that produces/consumes Kafka)
# - SPRING_KAFKA_BOOTSTRAP_SERVERS     → from aiven-credentials secret
# - SPRING_KAFKA_PROPERTIES_SECURITY_PROTOCOL → SASL_SSL
# - SPRING_KAFKA_PROPERTIES_SASL_MECHANISM    → PLAIN
# - SPRING_KAFKA_PROPERTIES_SASL_JAAS_CONFIG  → PlainLoginModule with user/pass

# ── 1. API Gateway ─────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: qwikbrew
  labels: { app: api-gateway }
spec:
  replicas: 1
  progressDeadlineSeconds: 600
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1    # kill old pod immediately — don't wait for new pod to be ready first
  selector: { matchLabels: { app: api-gateway } }
  progressDeadlineSeconds: 600
  strategy: { type: RollingUpdate, rollingUpdate: { maxSurge: 1, maxUnavailable: 0 } }
  template:
    metadata:
      labels: { app: api-gateway }
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port:   "8080"
        prometheus.io/path:   "/actuator/prometheus"
    spec:
      containers:
        - name: api-gateway
          image: ACCOUNT_ID.dkr.ecr.ap-south-1.amazonaws.com/qwikbrew/api-gateway:latest
          imagePullPolicy: Always
          ports: [{ containerPort: 8080 }]
          envFrom:
            - configMapRef: { name: qwikbrew-config }
            - secretRef:    { name: app-secrets }
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits:   { cpu: 300m, memory: 512Mi }
          readinessProbe: { httpGet: { path: /actuator/health/liveness, port: 8080 }, initialDelaySeconds: 60 }
          livenessProbe:  { httpGet: { path: /actuator/health/liveness,  port: 8080 }, initialDelaySeconds: 120 }
---
# api-gateway — exposed via LoadBalancer with NodePort fallback.
# AWS Classic LB is created automatically from the LoadBalancer type.
# If EXTERNAL-IP stays <pending>, run the fix-lb.sh script (see repo root).
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: qwikbrew
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "classic"
    service.beta.kubernetes.io/aws-load-balancer-cross-zone-load-balancing-enabled: "true"
spec:
  type: LoadBalancer
  selector: { app: api-gateway }
  ports:
    - name: http
      port: 80
      targetPort: 8080
      nodePort: 30080
      protocol: TCP

---
# ── 2. User Service ────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: qwikbrew
  labels: { app: user-service }
spec:
  replicas: 1
  progressDeadlineSeconds: 600
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1    # kill old pod immediately — don't wait for new pod to be ready first
  selector: { matchLabels: { app: user-service } }
  progressDeadlineSeconds: 600
  strategy: { type: RollingUpdate, rollingUpdate: { maxSurge: 1, maxUnavailable: 0 } }
  template:
    metadata:
      labels: { app: user-service }
      annotations: { prometheus.io/scrape: "true", prometheus.io/port: "8081", prometheus.io/path: "/actuator/prometheus" }
    spec:
      containers:
        - name: user-service
          image: ACCOUNT_ID.dkr.ecr.ap-south-1.amazonaws.com/qwikbrew/user-service:latest
          imagePullPolicy: Always
          ports: [{ containerPort: 8081 }]
          envFrom:
            - configMapRef: { name: qwikbrew-config }
            - secretRef:    { name: app-secrets }
          env:
            - name:  SPRING_DATASOURCE_URL
              valueFrom: { secretKeyRef: { name: aiven-credentials, key: USERDB_JDBC_URL } }
            - name:  SPRING_DATASOURCE_USERNAME
              valueFrom: { secretKeyRef: { name: aiven-credentials, key: DB_USERNAME } }
            - name:  SPRING_DATASOURCE_PASSWORD
              valueFrom: { secretKeyRef: { name: aiven-credentials, key: DB_PASSWORD } }
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits:   { cpu: 300m, memory: 512Mi }
          readinessProbe: { httpGet: { path: /actuator/health/liveness, port: 8081 }, initialDelaySeconds: 60 }
          livenessProbe:  { httpGet: { path: /actuator/health/liveness,  port: 8081 }, initialDelaySeconds: 120 }
---
apiVersion: v1
kind: Service
metadata: { name: user-service, namespace: qwikbrew }
spec: { type: ClusterIP, selector: { app: user-service }, ports: [{ port: 8081, targetPort: 8081 }] }

