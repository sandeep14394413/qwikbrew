            - name:  SPRING_DATASOURCE_PASSWORD
              valueFrom: { secretKeyRef: { name: aiven-credentials, key: DB_PASSWORD } }
            - name:  SPRING_KAFKA_BOOTSTRAP_SERVERS
              valueFrom: { secretKeyRef: { name: aiven-credentials, key: KAFKA_BOOTSTRAP_SERVERS } }
            - name:  SPRING_KAFKA_PROPERTIES_SECURITY_PROTOCOL
              valueFrom: { secretKeyRef: { name: aiven-credentials, key: KAFKA_SECURITY_PROTOCOL } }
            - name:  SPRING_KAFKA_PROPERTIES_SASL_MECHANISM
