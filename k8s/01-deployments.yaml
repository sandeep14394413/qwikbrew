# ── 4. Order Service ───────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: qwikbrew
  labels: { app: order-service }
spec:
  replicas: 1
  progressDeadlineSeconds: 600
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1    # kill old pod immediately — don't wait for new pod to be ready first
  selector: { matchLabels: { app: order-service } }
  progressDeadlineSeconds: 600
  strategy: { type: RollingUpdate, rollingUpdate: { maxSurge: 1, maxUnavailable: 0 } }
  template:
    metadata:
      labels: { app: order-service }
      annotations: { prometheus.io/scrape: "true", prometheus.io/port: "8083", prometheus.io/path: "/actuator/prometheus" }
    spec:
      containers:
        - name: order-service
          image: ACCOUNT_ID.dkr.ecr.ap-south-1.amazonaws.com/qwikbrew/order-service:latest
          imagePullPolicy: Always
          ports: [{ containerPort: 8083 }]
          envFrom:
            - configMapRef: { name: qwikbrew-config }
            - secretRef:    { name: app-secrets }
          env:
            - name:  SPRING_DATASOURCE_URL
              valueFrom: { secretKeyRef: { name: aiven-credentials, key: ORDERDB_JDBC_URL } }
            - name:  SPRING_DATASOURCE_USERNAME
              valueFrom: { secretKeyRef: { name: aiven-credentials, key: DB_USERNAME } }
            - name:  SPRING_DATASOURCE_PASSWORD
              valueFrom: { secretKeyRef: { name: aiven-credentials, key: DB_PASSWORD } }
            - name:  SPRING_KAFKA_BOOTSTRAP_SERVERS
              valueFrom: { secretKeyRef: { name: aiven-credentials, key: KAFKA_BOOTSTRAP_SERVERS } }
            - name:  SPRING_KAFKA_PROPERTIES_SECURITY_PROTOCOL
              valueFrom: { secretKeyRef: { name: aiven-credentials, key: KAFKA_SECURITY_PROTOCOL } }
            - name:  SPRING_KAFKA_PROPERTIES_SASL_MECHANISM
              valueFrom: { secretKeyRef: { name: aiven-credentials, key: KAFKA_SASL_MECHANISM } }
            - name:  KAFKA_SASL_USERNAME
              valueFrom: { secretKeyRef: { name: aiven-credentials, key: KAFKA_SASL_USERNAME } }
            - name:  KAFKA_SASL_PASSWORD
              valueFrom: { secretKeyRef: { name: aiven-credentials, key: KAFKA_SASL_PASSWORD } }
            - name:  SPRING_KAFKA_PROPERTIES_SASL_JAAS_CONFIG
              value: "org.apache.kafka.common.security.plain.PlainLoginModule required username='$(KAFKA_SASL_USERNAME)' password='$(KAFKA_SASL_PASSWORD)';"
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits:   { cpu: 300m, memory: 512Mi }
          readinessProbe: { httpGet: { path: /actuator/health/liveness, port: 8083 }, initialDelaySeconds: 60 }
          livenessProbe:  { httpGet: { path: /actuator/health/liveness,  port: 8083 }, initialDelaySeconds: 120 }
---
apiVersion: v1
kind: Service
metadata: { name: order-service, namespace: qwikbrew }
spec: { type: ClusterIP, selector: { app: order-service }, ports: [{ port: 8083, targetPort: 8083 }] }

