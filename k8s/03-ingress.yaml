apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: qwikbrew-api-ingress
  namespace: qwikbrew
  annotations:
    kubernetes.io/ingress.class:                            alb
    alb.ingress.kubernetes.io/group.name:                   qwikbrew
    alb.ingress.kubernetes.io/group.order:                  "10"
    alb.ingress.kubernetes.io/scheme:                       internet-facing
    alb.ingress.kubernetes.io/target-type:                  ip
    alb.ingress.kubernetes.io/listen-ports:                 '[{"HTTP":80,"HTTPS":443}]'
    alb.ingress.kubernetes.io/ssl-redirect:                 "443"
    alb.ingress.kubernetes.io/certificate-arn:              "CERT_ARN"
    alb.ingress.kubernetes.io/healthcheck-path:             /actuator/health
    alb.ingress.kubernetes.io/healthcheck-interval-seconds: "15"
spec:
  ingressClassName: alb
  rules:
    - host: staging-api.qwikbrew.in
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service: { name: api-gateway, port: { number: 80 } }
          - path: /actuator
            pathType: Prefix
            backend:
              service: { name: api-gateway, port: { number: 80 } }
    - host: api.qwikbrew.in
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service: { name: api-gateway, port: { number: 80 } }
          - path: /actuator
            pathType: Prefix
            backend:
              service: { name: api-gateway, port: { number: 80 } }
    - host: staging.qwikbrew.in
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service: { name: api-gateway, port: { number: 80 } }
          - path: /actuator
            pathType: Prefix
            backend:
              service: { name: api-gateway, port: { number: 80 } }
    - host: qwikbrew.in
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service: { name: api-gateway, port: { number: 80 } }
          - path: /actuator
            pathType: Prefix
            backend:
              service: { name: api-gateway, port: { number: 80 } }
    - host: www.qwikbrew.in
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service: { name: api-gateway, port: { number: 80 } }
          - path: /actuator
            pathType: Prefix
            backend:
              service: { name: api-gateway, port: { number: 80 } }
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: qwikbrew-frontend-ingress
  namespace: qwikbrew
  annotations:
    kubernetes.io/ingress.class:                            alb
    alb.ingress.kubernetes.io/group.name:                   qwikbrew
    alb.ingress.kubernetes.io/group.order:                  "20"
    alb.ingress.kubernetes.io/scheme:                       internet-facing
    alb.ingress.kubernetes.io/target-type:                  ip
    alb.ingress.kubernetes.io/listen-ports:                 '[{"HTTP":80,"HTTPS":443}]'
    alb.ingress.kubernetes.io/ssl-redirect:                 "443"
    alb.ingress.kubernetes.io/certificate-arn:              "CERT_ARN"
    alb.ingress.kubernetes.io/healthcheck-path:             /
    alb.ingress.kubernetes.io/healthcheck-interval-seconds: "15"
spec:
  ingressClassName: alb
  rules:
    - host: staging.qwikbrew.in
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service: { name: frontend, port: { number: 80 } }
    - host: qwikbrew.in
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service: { name: frontend, port: { number: 80 } }
    - host: www.qwikbrew.in
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service: { name: frontend, port: { number: 80 } }
